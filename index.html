function renderGoalsPage() {
  const subNav = renderGoalsSubTabs();
  if ((state.goalsTab || 'annual') === 'monthly') {
    return subNav + renderMonthlyGoalsPage();
  }

  const VACATION_GOAL = 1986100; // sum of all 5 locations' 2026 monthly goals
  const now = new Date();
  const currentMonthIdx = now.getMonth();
  const allLocs = ['waunakee','eastmad','verona','goninjaW','goninjaV'];
  const MFULL = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const MSHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Read monthly goals from financials (same source as financials table)
  function getFinGoal(loc, m) {
    const finLoc = (state.financials || {})[loc] || {};
    const fd = finLoc[MFULL[m]] || finLoc[MSHORT[m]] || {};
    return parseFloat(fd.goal) || 0;
  }

  // Build month-by-month data
  let cumulativeActual = 0, cumulativePlanned = 0;
  const monthData = [];
  let latestWithData = -1;

  for (let m = 0; m < 12; m++) {
    let monthActual = 0, monthPlanned = 0;
    allLocs.forEach(loc => {
      monthActual  += getGoalActualRevenue(loc, m);
      monthPlanned += getFinGoal(loc, m);
    });
    cumulativeActual  += monthActual;
    cumulativePlanned += monthPlanned;
    const pace = monthActual - monthPlanned; // this month's +/-
    const ahead = cumulativeActual - cumulativePlanned; // cumulative +/-
    const hasData = monthActual > 0;
    if (hasData) latestWithData = m;
    monthData.push({ actual: monthActual, planned: monthPlanned, pace, cumActual: cumulativeActual, cumPlanned: cumulativePlanned, ahead, hasData });
  }

  const ytdActual   = latestWithData >= 0 ? monthData[latestWithData].cumActual : 0;
  const remaining   = Math.max(VACATION_GOAL - ytdActual, 0);
  const pct         = Math.min(Math.round(ytdActual / VACATION_GOAL * 100), 100);
  const monthsLeft  = 12 - currentMonthIdx;
  const curPace     = latestWithData >= 0 ? monthData[latestWithData].pace : 0;
  const cumPace     = latestWithData >= 0 ? monthData[latestWithData].ahead : 0;
  const won         = ytdActual >= VACATION_GOAL;

  let html = '<div class="section">';

  // Hero
  html += '<div class="goal-hero">';
  html += '<div class="goal-hero-main">';
  html += '<div class="goal-hero-title">🏖️ 2026 Team Vacation — Revenue Goal</div>';
  html += '<div class="goal-hero-sub">Hit $' + VACATION_GOAL.toLocaleString() + ' in total revenue across all 5 locations and the team earns a vacation.</div>';

  if (won) {
    html += '<div class="goal-hero-amount" style="color:var(--green)">🎉 Goal Reached!</div>';
  } else {
    html += '<div class="goal-hero-amount">' + fmtCurrency(remaining) + '</div>';
    html += '<div class="goal-hero-target">remaining to unlock the vacation</div>';
  }

  html += '<div class="goal-progress-wrap" style="margin-top:14px"><div class="goal-progress-fill" style="width:' + pct + '%"></div><span class="goal-progress-label">' + pct + '%</span></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray-500);margin-top:4px"><span>' + fmtCurrency(ytdActual) + ' earned</span><span>' + fmtCurrency(VACATION_GOAL) + ' goal</span></div>';
  html += '</div>';

  // Stats
  html += '<div class="goal-hero-stats">';
  html += '<div class="goal-stat"><div class="goal-stat-num" style="color:' + (curPace >= 0 ? 'var(--green)' : 'var(--red)') + '">' + (curPace >= 0 ? '+' : '') + fmtCurrency(curPace) + '</div><div class="goal-stat-label">This Month vs Goal</div></div>';
  html += '<div class="goal-stat"><div class="goal-stat-num" style="color:' + (cumPace >= 0 ? 'var(--green)' : 'var(--red)') + '">' + (cumPace >= 0 ? '+' : '') + fmtCurrency(cumPace) + '</div><div class="goal-stat-label">Cumulative Pace</div></div>';
  html += '<div class="goal-stat"><div class="goal-stat-num">' + monthsLeft + '</div><div class="goal-stat-label">Months Left</div></div>';
  html += '<div class="goal-stat"><div class="goal-stat-num">' + pct + '%</div><div class="goal-stat-label">Goal Complete</div></div>';
  html += '</div>';
  html += '</div>';

  // Monthly grid
  html += '<div style="padding:4px 20px 0;font-size:12px;color:var(--gray-500);font-weight:600;letter-spacing:0.3px">Monthly Pace — actual vs goal (cumulative)</div>';
  html += '<div class="goal-grid">';
  MONTHS_SHORT.forEach((mon, i) => {
    const md = monthData[i];
    const isCurrent = i === currentMonthIdx;
    let cls = 'goal-month';
    if (md.hasData) cls += ' has-value';
    if (isCurrent) cls += ' is-current';
    html += '<div class="' + cls + '">';
    html += '<div class="month-label">' + mon + (isCurrent ? ' ●' : '') + '</div>';
    if (md.hasData) {
      const paceColor = md.pace >= 0 ? 'var(--green)' : 'var(--red)';
      const cumColor  = md.ahead >= 0 ? 'var(--green)' : 'var(--red)';
      html += '<div style="font-size:14px;font-weight:800;color:' + paceColor + ';padding:4px 0">' + (md.pace >= 0 ? '+' : '') + fmtCurrency(md.pace) + '</div>';
      html += '<div style="font-size:10px;color:var(--gray-500)">Goal: ' + fmtCurrency(md.planned) + '</div>';
      html += '<div style="font-size:10px;color:var(--gray-500)">Actual: ' + fmtCurrency(md.actual) + '</div>';
      html += '<div style="font-size:10px;font-weight:700;color:' + cumColor + ';margin-top:3px">' + (md.ahead >= 0 ? '+' : '') + fmtCurrency(md.ahead) + ' YTD</div>';
    } else if (md.planned > 0) {
      html += '<div style="font-size:12px;color:var(--gray-600);padding:4px 0">—</div>';
      html += '<div style="font-size:10px;color:var(--gray-600)">Goal: ' + fmtCurrency(md.planned) + '</div>';
    } else {
      html += '<div style="font-size:12px;color:var(--gray-700);padding:4px 0">—</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';

  return subNav + html;
}

const FRONTDESK_EMP_IDS = new Set(['sueK','andyR','marioS']);
function isFrontDesk(empId){return FRONTDESK_EMP_IDS.has(empId);}
function getDailyTasks(empId){return EMP_DAILY[empId]||(isFrontDesk(empId)?FRONTDESK_DAILY:LVLUP_DAILY);}
function getWeeklyRec(empId){return EMP_WEEKLY[empId]||(isFrontDesk(empId)?FRONTDESK_WEEKLY:LVLUP_WEEKLY_REC);}

function getCycleChecklistKey(){
  const c=getCurrentCycleInfo();
  if(!c)return 'cycle-current';
  const yr=(c.startDate||String(new Date().getFullYear())).substring(0,4);
  return yr+'-C'+c.cycleNum;
}
function getTaskMonthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function getGoalsFields(locId){return isGoNinja(locId)?GONINJA_GOALS_FIELDS:LVLUP_GOALS_FIELDS;}
function getTaskWeekKey(dateStr){
  const d=new Date(dateStr+'T12:00:00');const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);
  const yr=mon.getFullYear();const oneJan=new Date(yr,0,1);
  const days=Math.floor((mon-oneJan)/86400000);
  const wk=Math.ceil((days+oneJan.getDay()+1)/7);
  return yr+'-W'+String(wk).padStart(2,'0');
}
function getWeekMonday(weekKey){
  const [yr,wStr]=weekKey.split('-W');const year=parseInt(yr),week=parseInt(wStr);
  const jan4=new Date(year,0,4);const jan4dow=jan4.getDay()||7;
  const mon=new Date(jan4);mon.setDate(jan4.getDate()-(jan4dow-1)+(week-1)*7);
  return mon;
}
function getWeekSunday(weekKey){const mon=getWeekMonday(weekKey);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return sun;}
function isWeekLocked(weekKey){
  const sun=getWeekSunday(weekKey);sun.setHours(23,59,59,0);
  return new Date()>sun;
}
function getMonthWeekKeys(year,month){
  // Weeks where Monday falls in the given month (1-indexed)
  const weeks=[];const d=new Date(year,month-1,1);
  const dow=d.getDay()||7;if(dow!==1)d.setDate(d.getDate()+(8-dow));
  while(d.getMonth()===month-1){weeks.push(getTaskWeekKey(d.toISOString().split('T')[0]));d.setDate(d.getDate()+7);}
  return weeks;
}

/*  -  -  Tasks Firebase Listeners  -  -  */
function empPath(empId){return 'tasks/emp/'+empId;}
function listenTasks(){
  const emp=state.tasksLoc,dateKey=state.tasksDate,weekKey=getTaskWeekKey(dateKey);
  const base=empPath(emp);
  const dailyRef=fbRef(base+'/daily/'+dateKey);
  dailyRef.on('value',snap=>{
    if(!state.tasksData[emp])state.tasksData[emp]={};
    if(!state.tasksData[emp].daily)state.tasksData[emp].daily={};
    state.tasksData[emp].daily[dateKey]=snap.val()||{};render();
  });activeListeners.push({ref:dailyRef,event:'value'});
  const weeklyRef=fbRef(base+'/weekly/'+weekKey);
  weeklyRef.on('value',snap=>{
    if(!state.tasksData[emp])state.tasksData[emp]={};
    if(!state.tasksData[emp].weekly)state.tasksData[emp].weekly={};
    state.tasksData[emp].weekly[weekKey]=snap.val()||{};render();
  });activeListeners.push({ref:weeklyRef,event:'value'});
  const _isGN=isGoNinja(emp);
  const cycleKey=getCycleChecklistKey();
  const cycleRef=_isGN?fbRef(base+'/cycle/'+weekKey):fbRef(base+'/cycle_checklist/'+cycleKey);
  cycleRef.on('value',snap=>{
    if(!state.tasksData[emp])state.tasksData[emp]={};
    if(_isGN){
      if(!state.tasksData[emp].cycle)state.tasksData[emp].cycle={};
      state.tasksData[emp].cycle[weekKey]=snap.val()||{};
    }else{
      if(!state.tasksData[emp].cycle_checklist)state.tasksData[emp].cycle_checklist={};
      state.tasksData[emp].cycle_checklist[cycleKey]=snap.val()||{};
    }
    render();
  });activeListeners.push({ref:cycleRef,event:'value'});
  const monthKey=getTaskMonthKey();
  const monthlyRef=fbRef(base+'/monthly/'+monthKey);
  monthlyRef.on('value',snap=>{
    if(!state.tasksData[emp])state.tasksData[emp]={};
    if(!state.tasksData[emp].monthly)state.tasksData[emp].monthly={};
    state.tasksData[emp].monthly[monthKey]=snap.val()||{};render();
  });activeListeners.push({ref:monthlyRef,event:'value'});
  [['daily',dateKey],['weekly',weekKey],['monthly',monthKey]].forEach(([section,sKey])=>{
    const cRef=fbRef(base+'/custom_'+section+'/'+sKey);
    cRef.on('value',snap=>{
      if(!state.tasksData[emp])state.tasksData[emp]={};
      const key='custom_'+section;
      if(!state.tasksData[emp][key])state.tasksData[emp][key]={};
      state.tasksData[emp][key][sKey]=snap.val()||{};render();
    });activeListeners.push({ref:cRef,event:'value'});
  });
  const dnwRef=fbRef(base+'/did_not_work');
  dnwRef.on('value',snap=>{if(!state.tasksData[emp])state.tasksData[emp]={};state.tasksData[emp].did_not_work=snap.val()||{};render();});
  activeListeners.push({ref:dnwRef,event:'value'});
  const signoffRef=fbRef(base+'/weekly_signoff');
  signoffRef.on('value',snap=>{if(!state.tasksData[emp])state.tasksData[emp]={};state.tasksData[emp].weekly_signoff=snap.val()||{};render();});
  activeListeners.push({ref:signoffRef,event:'value'});
  const exLogRef=fbRef(base+'/exception_log/'+dateKey);
  exLogRef.on('value',snap=>{if(!state.tasksData[emp])state.tasksData[emp]={};if(!state.tasksData[emp].exception_log)state.tasksData[emp].exception_log={};state.tasksData[emp].exception_log[dateKey]=snap.val()||'';render();});
  activeListeners.push({ref:exLogRef,event:'value'});
}

/*  -  -  History View Helpers  -  -  */
function hMondayOf(weekOff){
  const now=new Date();
  const dow=now.getDay()||7; // Mon=1…Sun=7
  const mon=new Date(now);
  mon.setHours(12,0,0,0);
  mon.setDate(now.getDate()-(dow-1)+(weekOff*7));
  return mon;
}
function hWeekDays(weekOff){
  const mon=hMondayOf(weekOff);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split('T')[0];});
}
function hMonthDays(year,month){
  const last=new Date(year,month,0).getDate();
  return Array.from({length:last},(_,i)=>year+'-'+String(month).padStart(2,'0')+'-'+String(i+1).padStart(2,'0'));
}
function hIsFuture(dateKey){return dateKey>new Date().toISOString().split('T')[0];}
function hPctClass(info){
  if(info===undefined||info==='loading')return 'loading';
  if(info===null)return 'pct-0';
  if(info.dayOff)return 'day-off';
  if(info.total===0)return 'pct-0';
  const p=info.done/info.total;
  if(p>=1)return 'pct-100';
  if(p>=0.75)return 'pct-75';
  if(p>=0.5)return 'pct-50';
  if(p>0)return 'pct-low';
  return 'pct-0';
}
function hPctLabel(info){
  if(info===undefined||info==='loading')return '…';
  if(info===null)return '0%';
  if(info.dayOff)return 'Off';
  if(info.total===0)return '—';
  return Math.round(info.done/info.total*100)+'%';
}
function loadHistoryDate(empId,dateKey){
  const key=empId+'|'+dateKey;
  if(state.historyData[key]!==undefined)return;
  state.historyData[key]='loading';
  const isSat=new Date(dateKey+'T12:00:00').getDay()===6;
  const tasks=getDailyTasks(empId).filter(t=>!(isSat&&(t.id==='spray_mats'||t.id==='j_spray')));
  const total=tasks.length;
  Promise.all([
    fbRef(empPath(empId)+'/daily/'+dateKey).once('value'),
    fbRef(empPath(empId)+'/did_not_work/'+dateKey).once('value')
  ]).then(([dailySnap,dnwSnap])=>{
    const dayOff=!!dnwSnap.val();
    let done=0;
    if(!dayOff){const dd=dailySnap.val()||{};tasks.forEach(t=>{if(dd[t.id])done++;});}
    state.historyData[key]={done,total,dayOff};
    render();
  }).catch(()=>{state.historyData[key]=null;render();});
}
function loadHistorySign(empId,weekKey){
  const key=empId+'|'+weekKey;
  if(state.historySigns[key]!==undefined)return;
  state.historySigns[key]='loading';
  fbRef(empPath(empId)+'/weekly_signoff/'+weekKey).once('value').then(snap=>{
    const v=snap.val();
    state.historySigns[key]=v?{signed:true,initials:v.initials||''}:{signed:false};
    render();
  }).catch(()=>{state.historySigns[key]={signed:false};render();});
}
function loadHistoryWeekData(weekOff){
  const days=hWeekDays(weekOff);
  const weekKey=getTaskWeekKey(days[0]);
  const todayKey=new Date().toISOString().split('T')[0];
  TASK_EMPLOYEES.forEach(emp=>{
    days.forEach(dk=>{if(dk<=todayKey)loadHistoryDate(emp.id,dk);});
    loadHistorySign(emp.id,weekKey);
  });
}
function loadHistoryMonthData(year,month){
  const days=hMonthDays(year,month);
  const todayKey=new Date().toISOString().split('T')[0];
  TASK_EMPLOYEES.forEach(emp=>{days.forEach(dk=>{if(dk<=todayKey)loadHistoryDate(emp.id,dk);});});
}

}

  html+='<button class="loc-btn'+(state.tasksTab==='history'?' active':'')+'" onclick="state.tasksTab=\'history\';render()" style="margin-left:auto;flex-shrink:0;'+(state.tasksTab==='history'?'background:var(--accent);color:#fff':'')+'">📊 History</button>';

  // Bonus tracker

      for(let i=monthWeeks.length;i<4;i++){
        html+='<div class="bonus-week-card future"><div class="bwc-label">Week '+(i+1)+'</div><div class="bwc-status">🔜</div><div class="bwc-dates">Upcoming</div></div>';

  const customWeekly=(locData['custom_weekly']||{})[weekKey]||{};

      dnwBar='<div style="display:flex;align-items:center;gap:10px;padding:10px 20px;background:#f0fdf4;border-radius:10px;margin-bottom:8px;border:1.5px solid var(--green);">';
      dnwBar+='<span style="font-size:20px;">😴</span><span style="font-weight:700;font-size:13px;color:var(--green);flex:1;">Day off marked by '+esc(locDnw[dateKey].initials)+'</span>';
      dnwBar+='<button onclick="undoDidNotWork(\''+dateKey+'\')" style="font-size:12px;padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;color:var(--gray-600);">Undo</button>';
      dnwBar+='</div>';
    }else{
      dnwBar='<div style="display:flex;justify-content:flex-end;margin-bottom:6px;">';
      dnwBar+='<button onclick="markDidNotWork()" style="font-size:12px;padding:6px 14px;border:1px solid var(--gray-200);border-radius:8px;background:#fff;cursor:pointer;color:var(--gray-600);font-weight:600;">😴 Did not work today</button></div>';
    }
  }
  const isFD=isFrontDesk(loc);

  }
  html+=dnwBar;
  html+=renderTaskSection('daily',isFD?'⬇️ Priority Queue':'Daily Checklist',dailyTasks,dayOff?{}:dailyData,customDaily,dailyLocked||dayOff);
  // ── Daily Exception Log ──────────────────────────────────────────────────
  if(!dayOff){
    const exLog=((locData.exception_log)||{})[dateKey]||'';
    if(dailyLocked){
      if(exLog) html+='<div style="margin:4px 0 8px;padding:10px 16px;background:#fefce8;border-radius:10px;border:1.5px solid #fde68a;font-size:13px;color:#92400e;"><span style="font-weight:700;">📝 Exception Log:</span> '+esc(exLog)+'</div>';
    }else{
      html+='<div style="margin:4px 0 8px;padding:10px 16px;background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200);">';
      html+='<div style="font-size:12px;font-weight:700;color:var(--gray-500);margin-bottom:6px;">📝 Daily Exception Log</div>';
      html+='<div style="font-size:12px;color:var(--gray-400);margin-bottom:6px;">If any task above was left blank, add a one-sentence explanation before clocking out.</div>';
      html+='<input id="exceptionLogInput" value="'+esc(exLog)+'" placeholder=\'e.g. "Skipped postcards today because of a 20-min parent meeting after the 6 PM class."\' maxlength="300" onchange="saveExceptionLog(this.value)" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid var(--gray-200);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;outline:none;color:var(--gray-700);" />';
      html+='</div>';

function renderTaskSection(section,title,tasks,completionData,customTasksObj,locked){
  const key=section,collapsed=state.collapsedSections[key];
  const empId=state.tasksLoc;
  const customArr=Object.entries(customTasksObj||{}).map(([id,v])=>({id,text:v.text,custom:true}));
  // Apply saved drag order to the main task list
  const orderedTasks=applyTaskOrder(empId,section,tasks);
  const allTasks=[...orderedTasks,...customArr];
  const completed=allTasks.filter(t=>completionData[t.id]).length,total=allTasks.length;
  const pillCls=completed===total&&total>0?'complete':completed>0?'partial':'empty';
  let html='<div class="task-section">';
  const lockBadge=locked?'<span style="font-size:11px;background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:999px;margin-left:8px;">🔒 Locked</span>':'';
  html+='<div class="task-section-header" onclick="toggleSection(\''+key+'\')"><h3><span class="chevron '+(collapsed?'':'open')+'">&#9654;</span>'+title+lockBadge+'</h3><span class="progress-pill '+pillCls+'">'+completed+'/'+total+'</span></div>';
  html+='<div class="task-list '+(collapsed?'collapsed':'')+'" data-sort-tasks="'+section+'" data-sort-emp="'+empId+'" data-sort-locked="'+(locked?'true':'false')+'">';
  let _lastCat='';
  orderedTasks.forEach(t=>{
    if(t.cat&&t.cat!==_lastCat){html+='<div class="task-cat">'+esc(t.cat)+'</div>';_lastCat=t.cat;}
    html+=renderTaskItem(section,t,completionData[t.id],false,locked);
  });
  if(customArr.length>0){
    html+='<div class="task-cat">Added</div>';
    customArr.forEach(t=>{html+=renderTaskItem(section,t,completionData[t.id],true,locked);});
  }
  if(!locked){
    html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-top:1px solid var(--gray-100);background:var(--gray-50)">';
    html+='<input id="customTaskInput_'+section+'" placeholder="Add a task…" maxlength="120" onkeydown="if(event.key===\'Enter\')addCustomTask(\''+section+'\')" style="flex:1;padding:7px 10px;border:1px solid var(--gray-200);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;outline:none" />';
    html+='<button onclick="addCustomTask(\''+section+'\')" style="padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">+ Add</button>';
    html+='</div>';
  }
  html+='</div></div>';return html;
}

function deleteCustomTask(section,taskId){
  const dateKey=state.tasksDate,weekKey=getTaskWeekKey(dateKey),monthKey=getTaskMonthKey();
  const sKey=section==='monthly'?monthKey:section==='weekly'?weekKey:dateKey;

      let weekLabel=w===0?'🔁 Ongoing — Any Time This Cycle':'Week '+w;
      let badge='';

      else if(isFuture)badge=' <span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:999px;margin-left:6px;">Upcoming</span>';

function renderTaskItem(section,task,doneData,isCustom,locked){
  const isDone=!!doneData;

  let html='<div class="'+cls+'" data-task-id="'+task.id+'"'+(blockStyle?(' style="'+blockStyle+'"'):'')+'>';
  // Top row: drag handle + checkbox + text + extras
  html+='<div style="display:flex;align-items:flex-start;gap:10px">';
  if(!locked&&!isCustom){html+='<span class="drag-handle" title="Drag to reorder">⠿</span>';}
  if(isDone){
    html+='<div class="task-check checked"'+(locked?'':' onclick="undoTask(\''+section+'\',\''+task.id+'\')" title="Click to undo"')+'>✓</div>';
  }else{
    const completeFn=hasNotes?'completeTaskWithNotes(\''+section+'\',\''+task.id+'\')':'completeTask(\''+section+'\',\''+task.id+'\')';
    html+='<div class="task-check"'+(locked?'':' onclick="'+completeFn+'" title="Click to complete"')+'></div>';
  }
  html+='<span class="task-text" style="flex:1">'+esc(task.text)+'</span>';

    html+='<button onclick="openTaskPlaybook(\''+task.playbook+'\')" title="Open playbook" style="background:var(--blue-light);border:none;border-radius:6px;cursor:pointer;color:var(--blue);font-size:10px;font-weight:700;padding:3px 8px;white-space:nowrap;flex-shrink:0">📖 Playbook</button>';
  }

    }
  }
  html+='</div>';return html;
}

  return html;

/*  -  -  L10 Meeting Page  -  -  */
function getL10WeekKey(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
  const mon = new Date(new Date(now).setDate(diff));
  return mon.getFullYear() + '-' + String(mon.getMonth()+1).padStart(2,'0') + '-' + String(mon.getDate()).padStart(2,'0');
}

function getL10WeekLabel(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
  const mon = new Date(new Date(now).setDate(diff));
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[mon.getMonth()] + ' ' + mon.getDate();
}

function setL10Week(offset) { state.l10WeekOffset = offset; render(); }

function getL10Data(weekKey) { return state.l10[weekKey] || {}; }

function updateL10Field(weekKey, section, index, field, value) {
  fbDebounce('l10/' + weekKey + '/' + section + '/' + index + '/' + field, value);
}

function addL10Row(weekKey, section) {
  const data = getL10Data(weekKey);
  const arr = data[section] || [];
  const newIdx = arr.length;
  fbSet('l10/' + weekKey + '/' + section + '/' + newIdx, section === 'todos' ? { who: '', task: '', status: '' } : section === 'issues' ? { priority: '', issue: '' } : { text: '' });
}

function removeL10Row(weekKey, section, index) {
  const data = getL10Data(weekKey);
  const arr = Array.isArray(data[section]) ? [...data[section]] : [];
  arr.splice(index, 1);
  fbSet('l10/' + weekKey + '/' + section, arr.length ? arr : null);
}

function updateL10Note(weekKey, field, value) {
  fbDebounce('l10/' + weekKey + '/' + field, value);
}

function copyL10FromPrevious(weekKey) {
  const prevKey = getL10WeekKey(state.l10WeekOffset - 1);
  const prevData = getL10Data(prevKey);
  if (!prevData || (!prevData.todos && !prevData.issues)) { alert('No previous week data to copy.'); return; }
  const newData = {};
  if (prevData.todos) {
    newData.todos = prevData.todos.map(t => ({ who: t.who || '', task: t.task || '', status: '' }));
  }
  if (prevData.issues) {
    newData.issues = prevData.issues.filter(i => i && i.issue).map(i => ({ priority: i.priority || '', issue: i.issue }));
  }
  fbSet('l10/' + weekKey, newData);
}

function renderL10Page() {
  const currentOffset = state.l10WeekOffset;
  const weekKey = getL10WeekKey(currentOffset);
  const data = getL10Data(weekKey);

  // Generate week tabs: 8 past + current + 2 future
  let tabsHtml = '<div class="l10-week-tabs">';
  for (let i = -8; i <= 2; i++) {
    const label = getL10WeekLabel(i);
    const cls = i === currentOffset ? 'active' : (i > 0 ? 'future' : '');
    tabsHtml += '<button class="l10-week-tab ' + cls + '" onclick="setL10Week(' + i + ')">' + label + '</button>';
  }
  tabsHtml += '</div>';

  // Meeting date display
  const meetDate = new Date(weekKey + 'T00:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = dayNames[meetDate.getDay()] + ', ' + monthNames[meetDate.getMonth()] + ' ' + meetDate.getDate() + ', ' + meetDate.getFullYear();

  let html = tabsHtml;
  html += '<div class="l10-header-bar">';
  html += '<div class="l10-date-display">LVLUP Weekly Agenda \u2014 ' + dateStr + '</div>';
  const hasData = data && (data.todos || data.issues || data.headlines || data.segue);
  if (!hasData) {
    html += '<button class="l10-print-btn" onclick="copyL10FromPrevious(\'' + weekKey + '\')">Copy from Previous Week</button>';
  }
  html += '</div>';

  // 1. Segue (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">1</span>Segue</h3><span class="l10-duration">5 min</span></div>';
  html += '<div style="padding:12px 20px;font-size:13px;color:var(--gray-500)">Personal &amp; Business Bests</div>';
  html += '<div style="padding:0 20px 16px"><textarea style="width:100%;min-height:60px;border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Share personal and business wins..." onchange="updateL10Note(\'' + weekKey + '\',\'segue\',this.value)">' + esc(data.segue || '') + '</textarea></div></div>';

  // 2. Scorecard Review (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">2</span>Scorecard Review</h3><span class="l10-duration">5 min</span></div>';
  html += '<div style="padding:12px 20px;font-size:13px;color:var(--gray-500)">Review weekly scorecard numbers. <a href="#" onclick="event.preventDefault();setSection(\'scorecard\')" style="color:var(--blue);font-weight:600">Go to Scorecard \u2192</a></div></div>';

  // 3. Rock Review (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">3</span>Rock Review</h3><span class="l10-duration">5 min</span></div>';
  html += '<div style="padding:12px 20px;font-size:13px;color:var(--gray-500)">On Track / Off Track. <a href="#" onclick="event.preventDefault();setSection(\'rocks\')" style="color:var(--blue);font-weight:600">Go to Rocks \u2192</a></div></div>';

  // 4. Customer / Employee Headlines (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">4</span>Customer / Employee Headlines</h3><span class="l10-duration">5 min</span></div>';
  const headlines = Array.isArray(data.headlines) ? data.headlines : [];
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="l10-table"><thead><tr><th class="drag-col"></th><th>Good / Bad</th><th>Headline</th><th class="del-col"></th></tr></thead><tbody data-sort-l10="headlines" data-sort-week="' + weekKey + '">';
  headlines.forEach((h, i) => {
    if (!h) return;
    html += '<tr data-row-idx="' + i + '"><td class="drag-col"><span class="drag-handle" title="Drag to reorder">\u283f</span></td><td style="width:100px"><select onchange="updateL10Field(\'' + weekKey + '\',\'headlines\',' + i + ',\'type\',this.value)"><option value="">--</option><option value="good"' + (h.type === 'good' ? ' selected' : '') + '>Good</option><option value="bad"' + (h.type === 'bad' ? ' selected' : '') + '>Bad</option></select></td>';
    html += '<td><input value="' + esc(h.text || '') + '" placeholder="Headline..." onchange="updateL10Field(\'' + weekKey + '\',\'headlines\',' + i + ',\'text\',this.value)" /></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'headlines\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'headlines\')">+ Add Headline</button></div>';

  // 5. To-Do List (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">5</span>To-Do List</h3><span class="l10-duration">5 min</span></div>';
  const todos = Array.isArray(data.todos) ? data.todos : [];
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="l10-table"><thead><tr><th class="drag-col"></th><th class="who-col">Who</th><th>To-Do</th><th class="status-col">Done / Not Done</th><th class="del-col"></th></tr></thead><tbody data-sort-l10="todos" data-sort-week="' + weekKey + '">';
  todos.forEach((t, i) => {
    if (!t) return;
    const statusCls = t.status === 'done' ? 'l10-status-done' : t.status === 'notdone' ? 'l10-status-notdone' : '';
    html += '<tr data-row-idx="' + i + '"><td class="drag-col"><span class="drag-handle" title="Drag to reorder">\u283f</span></td><td class="who-col"><input value="' + esc(t.who || '') + '" placeholder="Name..." onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'who\',this.value)" /></td>';
    html += '<td><input value="' + esc(t.task || '') + '" placeholder="Task description..." onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'task\',this.value)" /></td>';
    html += '<td class="status-col"><select class="' + statusCls + '" onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'status\',this.value)"><option value="">--</option><option value="done"' + (t.status === 'done' ? ' selected' : '') + '>Done</option><option value="notdone"' + (t.status === 'notdone' ? ' selected' : '') + '>Not Done</option></select></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'todos\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'todos\')">+ Add To-Do</button></div>';

  // 6. Issues List (IDS - 60 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">6</span>Issues List</h3><span class="l10-duration">60 min</span></div>';
  html += '<div style="padding:8px 20px 0;font-size:12px;color:var(--gray-400);font-weight:600">IDS: Identify, Discuss, Solve</div>';
  const issues = Array.isArray(data.issues) ? data.issues : [];
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="l10-table"><thead><tr><th class="drag-col"></th><th class="priority-col">Priority</th><th>Issue</th><th class="del-col"></th></tr></thead><tbody data-sort-l10="issues" data-sort-week="' + weekKey + '">';
  issues.forEach((is, i) => {
    if (!is) return;
    html += '<tr data-row-idx="' + i + '"><td class="drag-col"><span class="drag-handle" title="Drag to reorder">\u283f</span></td><td class="priority-col"><input value="' + esc(is.priority || '') + '" placeholder="#" style="width:50px;text-align:center" onchange="updateL10Field(\'' + weekKey + '\',\'issues\',' + i + ',\'priority\',this.value)" /></td>';
    html += '<td><input value="' + esc(is.issue || '') + '" placeholder="Issue description..." onchange="updateL10Field(\'' + weekKey + '\',\'issues\',' + i + ',\'issue\',this.value)" /></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'issues\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'issues\')">+ Add Issue</button></div>';

  // 7. Conclude (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">7</span>Conclude</h3><span class="l10-duration">5 min</span></div>';
  html += '<ul class="l10-conclude-list"><li><strong>Recap To-Do List</strong> \u2014 Review all action items assigned today</li><li><strong>Cascading Messages</strong> \u2014 Communicate out to other team members or community</li></ul>';
  html += '<div style="padding:0 20px 16px"><textarea style="width:100%;min-height:50px;border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Cascading messages and notes..." onchange="updateL10Note(\'' + weekKey + '\',\'conclude\',this.value)">' + esc(data.conclude || '') + '</textarea></div></div>';

  return html;
}

  { id:'mop_mats', role:'all', category:'Facility & Operations', icon:'🧹', title:'Mopping the Mats', tagline:'Clean mats = healthy students = no liability.',
    checklist:[
      'Gather: mop, bucket, approved mat cleaner, clean mop head',
      'Dilute cleaner per label (usually 1–2 oz per gallon)',
      'Dry-sweep mats first to remove debris',

        avoid:['Too little cleaner (not sanitizing) or too much (leaves sticky residue)','Using unapproved or unknown cleaning products'] },
      { title:'Dry Pass First',
        detail:'Before wet mopping, sweep the mats with a dry mop or push broom to remove dirt, hair, and debris. Mopping over debris just moves it around.',
        points:['Hit the edges and corners — that\'s where debris concentrates','Spot-treat visible stains before the wet pass'],
        avoid:['Skipping the dry pass when you\'re in a rush'] },
      { title:'Wet Mop Technique',

      { title:'Dry Time & Inspection',
        detail:'Mats must be fully dry before any student is on them — typically 10–15 minutes. Run a fan to speed it up. Walk the surface and feel for sticky spots — wipe and re-dry if found.',

        avoid:['Letting students on damp mats — serious fall risk','Assuming it\'s dry without physically checking'] },

  },

  { id:'mat_dots', role:'instructor', category:'Facility & Operations', icon:'⚫', title:'Removing & Replacing Mat Dots (Set Points)', tagline:'Properly configured floor — every single class.',
    checklist:[

        detail:'Replace dots when they are: peeling at edges, completely missing, no longer adhering, or faded beyond recognition. Don\'t wait — a half-stuck dot is a trip hazard.',

        avoid:['Leaving a partially-detached dot — it\'ll come loose mid-class','Assuming someone else will handle it'] },
      { title:'Removing Old Dots',
        detail:'Use a hair dryer or heat gun on low for 20–30 seconds to warm the adhesive. Peel from one edge, slowly and evenly. If adhesive residue remains, clean it with isopropyl alcohol on a cloth.',
        points:['Let the surface cool before applying a new dot','Warm adhesive peels clean — cold adhesive tears and leaves residue'],
        avoid:['Using a razor blade or sharp tool — it damages the mat surface','Applying a new dot on top of old adhesive residue — it won\'t bond properly'] },
      { title:'Applying New Dots',

      { h: 'Session Selection', p: 'Before processing a batch of check-ins, staff can select a specific class or session. All subsequent check-ins are automatically recorded under that session. For gyms without a formal schedule, enable "attendance tracking with no schedule/classes" in Settings → Attendance so members can still check in without selecting a class.' },
      { h: 'Privacy & Attendance Reports', p: 'You can hide the member list during check-ins via Settings → Attendance Tracking → Show recent check-ins. When disabled, members authenticate by code or name only — recommended for privacy. View all attendance history and visual graphs under Members → Attendance. This also shows each member\'s progress toward rank promotions.' }

      { q: 'What must be enabled before Front Desk Mode check-ins will work?', opts: ['POS integration', 'SMS messaging', 'Attendance tracking in Member Settings', 'Family accounts'], ans: 2, why: 'Attendance tracking must be turned on under Member Settings → Attendance as a prerequisite for any check-in to record.' },
      { q: 'A member forgot their check-in code. Where do you find it?', opts: ['It is emailed to the member automatically', 'It is visible below their name in their member profile', 'It is in Billing → Payments', 'It cannot be retrieved — a new one must be generated'], ans: 1, why: 'Every member has a unique numeric code shown directly below their name in their profile at all times.' },
      { q: 'A member wants to check in to a specific class. What should you do before they scan in?', opts: ['Nothing — the system auto-detects the class', 'Ask them to select it from the mobile app', 'Select the session first so all subsequent check-ins record under it', 'Create a manual attendance entry after class'], ans: 2, why: 'Staff selects the session before processing check-ins so all attendees are automatically recorded under the correct class.' }

  { id: 'gd_members', title: 'Member Profiles & Accounts', icon: '👤', desc: 'Navigating member profiles, editing info, managing payments, and family accounts.',

      { h: 'Editing Member Information and Notes', p: 'Click the Edit button in the sidebar to update any contact details. Notes are private by default but can be configured to display as a message on the check-in screen when the member checks in. Notes can also include tasks for follow-up. Use notes to track anything important about the member — injury history, preferences, follow-up reminders.' },

  { id: 'gd_leads', title: 'Memberships, Trials & Leads', icon: '🎯', desc: 'Setting up trial memberships, managing the lead pipeline, and converting prospects.',
    content: [
      { h: 'How Memberships Work', p: 'Memberships are assigned directly from a member\'s profile. When you assign a membership, the system auto-generates recurring payment schedules. You can adjust the start date, payment date, proration, cost, sign-up fees, and tax settings at the time of assignment. Up to 6 upcoming scheduled payments are visible in the member\'s Memberships section — you can modify dates, amounts, or payment methods, cancel future payments, or undo changes.' },
      { h: 'Trial Memberships', p: 'To set up a trial, go to Members → Memberships → Add Membership Option. Name it clearly (e.g., "2-Week Trial"), attach any waivers, and select Trial as the pricing type. Free trials use $0.00; paid trials use a one-time intro rate. Set Limited Duration for a time-based trial. You can configure trials to automatically convert to a full membership when they expire. Access can be unlimited, session-based (e.g., 3 classes), or day-based. Keep online availability checked to let new leads register themselves.' },
      { h: 'The Lead Pipeline — 6 Stages', p: 'GymDesk has a built-in CRM. Every potential customer is a Lead with one of six statuses: New (no contact yet), Conversation (engaged with staff or automations), Booked (trial scheduled), Contact Later (not ready now), Cold (unresponsive), or Spam. Leads enter through website capture forms, session bookings, or manual staff entry via Create Lead. Your job is to move leads forward — from New → Conversation → Booked → Attended → Member.' },
      { h: 'Lead Profile Actions', p: 'Inside a lead record you can send email or text messages, view automation activity, add notes, create tasks, and see the full activity feed. Two key buttons: "Invite to Sign-up" sends an email invitation to complete registration, and "Convert to member" converts the lead directly to a full member. You can also trigger automations manually from the lead profile if needed.' },
      { h: 'The Marketing Dashboard', p: 'Go to Marketing → Dashboard to see the Acquisition Funnel — it tracks how many leads were captured, how many booked a trial, and how many attended. This is your conversion rate data. It also shows lead generation by source (website, referrals, social media) and latest referrals. Important: the Marketing Dashboard only tracks Leads — not existing members. Existing member bookings appear in Bookings View and Data Exports.' }
    ],
    quiz: [
      { q: 'What are the 6 lead statuses in order from new to inactive?', opts: ['Interested, Contacted, Scheduled, Attended, Member, Lost', 'New, Conversation, Booked, Contact Later, Cold, Spam', 'Lead, Prospect, Trial, Active, Inactive, Closed', 'Open, Engaged, Scheduled, Visited, Converted, Churned'], ans: 1, why: 'The 6 GymDesk lead statuses are: New, Conversation, Booked, Contact Later, Cold, and Spam.' },
      { q: 'How do you officially convert a lead into a member?', opts: ['Change their status to Active', 'Use the Convert to member button inside the lead profile', 'Assign them a membership from Billing → Memberships', 'They convert automatically after attending a class'], ans: 1, why: 'The Convert to member button directly inside the lead profile is the correct way to officially convert a prospect.' },
      { q: 'You set up a 2-Week Trial membership. Someone signs up — where do they appear in GymDesk?', opts: ['Members list', 'Visitors list', 'Leads list', 'Billing → Pending'], ans: 1, why: 'Trial enrollees are listed as Visitors, not Members, until they convert to a paid full membership.' },
      { q: 'What does the "Invite to Sign-up" button do in a lead record?', opts: ['Schedules a trial class automatically', 'Sends an email invitation to the lead to complete their registration', 'Converts the lead to a member immediately', 'Adds them to an automation sequence'], ans: 1, why: 'Invite to Sign-up sends the lead an email with a link to complete their own registration — staff does not have to do it for them.' }
    ]
  },
  { id: 'gd_billing', title: 'Billing & Payments', icon: '💳', desc: 'Reading the billing dashboard, handling overdue payments, refunds, and discounts.',
    content: [
      { h: 'The Billing Dashboard', p: 'Go to Billing → Overview for a visual snapshot of the month: upcoming payments, processed payments, overdue payments, and 12 months of revenue history. The Overdue Payments section shows the 5 most recent overdue payments with a Change link to modify them. Recently Processed shows the 5 most recent successful payments. Click through for full lists. GymDesk has 5 payment statuses: Paid (done), Scheduled (future-dated), Pending (bank debit posted, processing takes 5–7 days), Overdue (unpaid), and Refunded.' },
      { h: 'Handling Overdue Payments', p: 'Go to Billing → Payments → Overdue tab. From here you can view the invoice, mark as paid or cancel the charge, edit details (amount, description, late fee, tax, discount, date, method), and bulk-clear using "mark all as paid." Late fees are configured in Billing Settings and are automatically added to overdue payments when they are paid past the set timeframe — but only apply to future overdue payments, not historical ones.' },
      { h: 'Refunds', p: 'Refunds are issued from the invoice screen. Open the relevant payment, find the invoice, and submit a refund. Partial refunds are supported — just adjust the amount before submitting. You can issue multiple partial refunds up to the full original amount. Important: if the original payment was recorded as manual (cash or check), GymDesk will not send any funds — you must refund the customer yourself outside the system.' },
      { h: 'Discounts', p: 'Find discounts under Billing → Discounts. When creating one, configure: the title (appears on invoices), whether it is a percentage or fixed amount, whether it is for sign-up only or all payments, which memberships it applies to, an optional public code (e.g., "SUMMER25"), limited redemptions, and an expiration date. Staff can apply internal discounts from a dropdown during payment processing. Members enter public codes during sign-up.' },
      { h: 'Custom Recurring Payments', p: 'Custom recurring payments are different from membership payments — they are manually created in Billing → Recurring, are NOT tied to a membership, and do NOT grant class access. Use them for things like private lesson packages or seminar fees. Configure the amount, frequency, description, first payment date, and whether to email an invoice. These show up separately from membership charges in the member\'s billing history.' }

    quiz: [

      { q: 'A member paid cash last month and wants a refund. What is the correct process?', opts: ['Issue the refund through GymDesk — it handles all payment types', 'Issue the refund in GymDesk and GymDesk will mail a check', 'Record the refund in GymDesk for tracking, but return the cash to the member yourself — GymDesk cannot send funds for manual payments', 'Manual payments cannot be refunded in GymDesk'], ans: 2, why: 'For manual payments (cash/check), GymDesk will not send funds. You must return the money directly — but you can still record it in the system.' },

      { q: 'Can a discount code be applied to a POS (in-person retail) transaction?', opts: ['Yes, enter it in the discount code field at checkout', 'No — discount codes only work in the online store; use a manual discount at POS checkout', 'Only if the discount was created as a POS discount', 'Yes, but only for member accounts'], ans: 1, why: 'Discount codes cannot be applied in POS — only in the online store. At the POS, staff manually add a discount via the + Discount button.' }

    content: [
      { h: 'Creating a Sale', p: 'Go to Sales in the main menu → Create Sale. Add products via the Add to Sale buttons. For products with variants (like size or color), change the selector before adding. Use Add line item for custom items not set up as products. Taxes apply automatically based on your billing settings. Apply a manual discount using the + Discount button — remember, discount codes from Billing do NOT work in POS.' },
      { h: 'Payment Options', p: 'GymDesk supports four payment methods in POS: (1) Card payment — manually enter card details or swipe via a connected card reader. (2) Member account — search the member by name and select from their saved payment methods (cards or bank accounts); manually entering card info bypasses saved methods. (3) Manual payment — record cash, check, or third-party processing without running it in-system. (4) Invoice — defer payment by creating an invoice; member invoices appear in their online account for self-payment.' },
      { h: 'Managing Completed Sales', p: 'Find all transactions under Sales → Sales tab. Each record shows the customer name, which staff member processed it, any discount codes applied, the payment method, item description, and total. You can search by customer name or filter by invoice number, transaction ID, date range, staff member, product, sale type, or status. Click Receipt to issue a refund, cancel a manual sale, resend the receipt by email, or print it.' },

      { q: 'A walk-in customer wants to pay cash for a hoodie. Which payment method do you choose?', opts: ['Card payment', 'Member account', 'Manual payment', 'Invoice'], ans: 2, why: 'Manual payment is used to record cash, check, or third-party transactions without running them through GymDesk\'s payment processor.' },
      { q: 'Where do you go to see who processed a specific sale and what discount was applied?', opts: ['Members → Payment History', 'Billing → Payments', 'Sales → Sales tab — each record shows staff, discount, method, and total', 'Reports → Transactions'], ans: 2, why: 'The Sales → Sales tab shows each transaction with the customer name, staff who processed it, discount codes, payment method, and total.' },
      { q: 'You add a new t-shirt to the product catalog with inventory tracking enabled. Stock hits zero. What happens?', opts: ['Staff are notified by email', 'The product becomes unavailable for purchase automatically', 'Nothing — inventory tracking is informational only', 'The product is deleted from the catalog'], ans: 1, why: 'When inventory tracking is enabled, the product automatically becomes unavailable when stock reaches zero — preventing overselling.' }
