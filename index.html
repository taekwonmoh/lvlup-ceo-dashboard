const DEV_MODULES = [
  { id: 'brain', title: "How Kids' Brains Work", icon: '🧠', desc: 'Developmental stages from ages 3-12 and what they mean for your teaching.',
    content: [
      { h: 'Why This Matters', p: 'Every student who walks onto your mat is at a different stage of brain development. Understanding these stages is the difference between an instruction that clicks and one that frustrates. When you teach a 4-year-old the same way you teach a 10-year-old, you are working against their biology.' },
      { h: 'Ages 3-4 (Mini Tigers)', p: 'The prefrontal cortex, which handles planning, impulse control, and following multi-step instructions, is barely online at this age. Attention span averages 8-12 minutes. These students learn primarily through imitation, repetition, and play. They cannot process verbal corrections well. Instead, show them. Use single-step instructions: "Watch me. Now you try." Celebrate effort loudly. Expect wiggles, silliness, and emotional swings — that is neurologically normal.' },
      { h: 'Ages 5-7 (Tigers)', p: 'Working memory is developing. Students can now hold 2-3 step instructions. They are beginning to understand rules and fairness, but still think concretely — abstract concepts like "respect" need to be tied to specific actions ("we bow to show respect"). This age group thrives on routine and predictability. They can start to self-correct when given clear, specific feedback. Peer awareness is growing, so partner activities become powerful learning tools.' },
      { h: 'Ages 8-12 (Taekwondo)', p: 'This is a golden window for skill acquisition. The brain is rapidly building neural pathways through myelination — skills practiced now become deeply wired. Students can handle complex sequences, understand strategy, and begin to self-assess. They crave mastery and competence. Challenge them appropriately. This age group can also begin to experience performance anxiety and social comparison, so how you handle mistakes matters enormously.' },
      { h: 'On the Mat Tip', p: 'Structure your class timing around attention spans. Mini Tigers: activities change every 3-5 minutes. Tigers: 5-8 minutes per activity. Taekwondo: 8-15 minutes. When you see fidgeting or glazed eyes, it is not misbehavior — it is biology telling you to switch gears.' }
    ],
    quiz: [
      { q: 'What is the average attention span of a 3-4 year old Mini Tiger student?', opts: ['3-5 minutes', '8-12 minutes', '15-20 minutes', '25-30 minutes'], ans: 1, why: 'Mini Tigers average 8-12 minutes of focused attention. Plan activity switches within this window.' },
      { q: 'Which part of the brain handles impulse control and is still developing in young children?', opts: ['Cerebellum', 'Amygdala', 'Prefrontal cortex', 'Hippocampus'], ans: 2, why: 'The prefrontal cortex manages planning, impulse control, and multi-step processing. It does not fully mature until the mid-20s.' },
      { q: 'Why is ages 8-12 considered a golden window for skill acquisition?', opts: ['Children are more obedient at this age', 'Rapid myelination builds deep neural pathways for practiced skills', 'They have longer class times', 'Parents are more involved'], ans: 1, why: 'Myelination during this period means skills practiced repeatedly become deeply wired into the nervous system.' },
      { q: 'A 5-year-old Tiger student is not following your 4-step combination. What is most likely happening?', opts: ['They are not paying attention', 'Their working memory can only hold 2-3 steps at this age', 'They need more discipline', 'They are not talented enough'], ans: 1, why: 'Working memory at ages 5-7 handles 2-3 steps. Break complex sequences into smaller chunks.' }
    ]
  },
  { id: 'motivation', title: 'Motivation Science', icon: '🔥', desc: 'Intrinsic vs extrinsic motivation, growth mindset, and why belts work.',
    content: [
      { h: 'Two Types of Motivation', p: 'Extrinsic motivation comes from external rewards: belt stripes, trophies, stickers. Intrinsic motivation comes from within: the satisfaction of mastering a kick, the pride of not giving up. Both are useful, but research consistently shows that intrinsic motivation produces longer-lasting engagement. Your job is to use extrinsic rewards as a bridge to build intrinsic drive.' },
      { h: 'The Belt System as Motivation', p: 'Belts work because they provide visible progress markers. But there is a trap: if students only train "to get the next belt," they quit after black belt or during long gaps between tests. Frame belts as recognition of growth, not the goal itself. Say "You earned this because you kept showing up and improving" rather than "Great job getting your yellow belt."' },
      { h: 'Growth Mindset on the Mat', p: 'Stanford researcher Carol Dweck identified two mindsets. Fixed mindset: "I am bad at this." Growth mindset: "I am not good at this yet." One word changes everything. When a student fails a technique, never say "That is wrong." Say "You are getting closer. Try adjusting your chamber." Praise effort, strategy, and persistence — not talent. "You worked so hard on that form" beats "You are so talented" every time.' },
      { h: 'When Rewards Backfire', p: 'Over-rewarding can actually decrease intrinsic motivation. This is called the overjustification effect. If you give a sticker for every single thing, the sticker becomes the reason to try. Then when stickers stop, effort stops. Reserve tangible rewards for genuine milestones. Use verbal acknowledgment, high-fives, and specific praise as your daily currency.' },
      { h: 'On the Mat Tip', p: 'Create a "Struggle of the Week" culture. Pick something hard. Celebrate the students who attempt it most, not just those who get it right. When students see that struggle is valued, they stop being afraid of failure — and that is when real growth happens.' }
    ],
    quiz: [
      { q: 'What is the most effective long-term motivator for students?', opts: ['Stickers and prizes every class', 'Intrinsic motivation from mastery and personal growth', 'Fear of disappointing their parents', 'Competition with other students'], ans: 1, why: 'Research shows intrinsic motivation (mastery, personal growth) produces the most durable engagement over time.' },
      { q: 'What is the "overjustification effect"?', opts: ['Students become over-confident', 'External rewards decrease internal motivation when overused', 'Students justify skipping class', 'Instructors over-explain techniques'], ans: 1, why: 'When external rewards are given too frequently, students begin performing for the reward rather than for personal satisfaction, reducing intrinsic motivation.' },
      { q: 'Which phrase best demonstrates growth mindset coaching?', opts: ['"You are a natural at this!"', '"That was wrong, try again"', '"You are getting closer — try adjusting your chamber"', '"Watch how the other students do it"'], ans: 2, why: 'Growth mindset coaching acknowledges progress, provides specific guidance, and implies improvement is possible.' },
      { q: 'How should belt promotions be framed to build lasting motivation?', opts: ['"You passed the test, congratulations"', '"You earned this because you kept showing up and improving"', '"You are better than the lower belts now"', '"Your parents will be proud"'], ans: 1, why: 'Framing belts as recognition of effort and growth builds intrinsic motivation rather than making the belt itself the goal.' }
    ]
  },
  { id: 'communication', title: 'Communication by Age', icon: '🗣️', desc: 'How to deliver instructions that actually land with each age group.',
    content: [
      { h: 'The Communication Gap', p: 'The number one frustration instructors report is "they are not listening." Usually, the issue is not listening — it is comprehension. Your job is to match your communication style to the developmental level standing in front of you. The same instruction delivered three different ways reaches three different age groups.' },
      { h: 'Mini Tigers (Ages 3-4): Show, Do Not Tell', p: 'Use maximum 5 words per instruction. "Hands up. Kick. Good." Demonstrate everything — they learn by watching, not hearing. Get on their physical level (kneel down). Use exaggerated facial expressions and enthusiasm. Repeat the same activity multiple times — repetition is comfort, not boredom, at this age. Use their name constantly. "Sarah, watch me. Sarah, your turn."' },
      { h: 'Tigers (Ages 5-7): Structured Choices', p: 'Use 2-step instructions maximum. "First do this, then do that." Give choices to build ownership: "Do you want to practice your kick or your punch first?" Use visual and verbal together — demonstrate while you explain. Check for understanding: "Show me what I just said." Begin introducing martial arts terminology paired with plain language: "Front stance — that is your strong stance."' },
      { h: 'Taekwondo (Ages 8-12): Why Matters', p: 'This age group wants to understand purpose. "Chamber your knee because it generates more power" is better than "Chamber your knee because I said so." They can handle correction if it is respectful and specific. Use questioning: "What do you think would happen if you pivoted your hip more?" Peer teaching is powerful — have them explain techniques to younger students.' },
      { h: 'On the Mat Tip', p: 'The 3-second rule: after giving an instruction, wait 3 full seconds before repeating or adding more. Most instructors talk too much. Silence gives processing time. Count "one-one-thousand, two-one-thousand, three-one-thousand" in your head. You will be amazed how often students respond when given that space.' }
    ],
    quiz: [
      { q: 'What is the maximum number of words you should use per instruction for Mini Tigers?', opts: ['About 5 words', 'About 10 words', 'About 15 words', 'As many as needed to be clear'], ans: 0, why: 'Mini Tigers process very short instructions best. "Hands up. Kick. Good." is more effective than a long explanation.' },
      { q: 'Why should you explain "why" to 8-12 year old students?', opts: ['Because they will not listen otherwise', 'This age group wants to understand purpose, which deepens learning', 'To fill class time', 'Because their parents expect it'], ans: 1, why: 'Older students are developing abstract reasoning and engage more deeply when they understand the purpose behind a technique.' },
      { q: 'What is the 3-second rule?', opts: ['Students must respond in 3 seconds or get pushups', 'Wait 3 seconds after an instruction before repeating it', 'Repeat every instruction 3 times', 'Give students 3 seconds to line up'], ans: 1, why: 'Waiting 3 seconds gives students processing time. Most instructors repeat too quickly, which actually reduces comprehension.' },
      { q: 'A 6-year-old Tiger is not performing the combination correctly. Best approach?', opts: ['Explain the technique in detail verbally', 'Demonstrate it while giving a 2-step instruction', 'Have them watch a senior student', 'Tell them to practice at home'], ans: 1, why: 'Tigers learn best with combined visual demonstration and short verbal instructions (2 steps max).' }
    ]
  },
  { id: 'emotions', title: 'Managing Big Emotions', icon: '💪', desc: 'Handling meltdowns, anxiety, belt test nerves, and sparring fear.',
    content: [
      { h: 'Emotions Are Not Misbehavior', p: 'When a 4-year-old cries during class, a 7-year-old freezes during sparring, or a 10-year-old melts down after failing a technique, these are not discipline problems. They are nervous system responses. The amygdala — the brain\'s alarm system — has hijacked the thinking brain. In this state, the student literally cannot process instructions, corrections, or reasoning. Your first job is to help them regulate, not educate.' },
      { h: 'The Co-Regulation Approach', p: 'Young children cannot regulate their own emotions yet. They need your calm to find their calm. This is called co-regulation. Lower your voice (do not raise it). Get on their physical level. Use short, calm phrases: "I see you. You are safe. Take a breath with me." Do not say "stop crying" or "you are fine" — these dismiss their experience and delay regulation. A regulated child is ready to learn in 2-3 minutes. A shamed child may not return to class.' },
      { h: 'Belt Test Anxiety', p: 'Testing anxiety is one of the top reasons students quit before testing or leave after failing. Normalize nervousness: "Every black belt you see was nervous at their first test. That feeling means you care." Prepare students with mock testing conditions. Give them a specific physical anchor: "When you feel nervous, take three breaths and feel your feet on the floor." After the test, always acknowledge their courage regardless of outcome: "You stood up and showed what you have been working on. That takes guts."' },
      { h: 'Sparring Fear', p: 'Fear of getting hit is primal and valid. Never shame it. Build exposure gradually: shadow sparring, light touch drills, controlled contact with trusted partners. Give students an out that saves face: "Tap your chest if you need a break" rather than forcing them to say they are scared. Pair anxious students with empathetic partners, not your hardest hitters. Every positive sparring experience builds courage. One bad experience can undo months of progress.' },
      { h: 'On the Mat Tip', p: 'Create a "reset spot" — a specific place on or near the mat where a student can go to take a break without leaving class. It is not a punishment; it is a tool. Teach it proactively: "If you ever feel overwhelmed, go stand on the blue star, take 5 breaths, and come back when you are ready." This gives students agency over their emotions and prevents full meltdowns.' }
    ],
    quiz: [
      { q: 'When a young student is crying during class, what has happened neurologically?', opts: ['They are seeking attention', 'The amygdala has hijacked the thinking brain, preventing rational processing', 'They are not tough enough for martial arts', 'They did not get enough sleep'], ans: 1, why: 'The amygdala triggers a fight-flight-freeze response that literally prevents the prefrontal cortex from processing instructions or reasoning.' },
      { q: 'What is co-regulation?', opts: ['Two students practicing together', 'Using your own calm presence to help a child regulate their emotions', 'Enforcing class rules consistently', 'Having parents intervene during class'], ans: 1, why: 'Children develop emotional regulation by borrowing from a calm adult. Your regulated state helps them find theirs.' },
      { q: 'A student is terrified of sparring. Best approach?', opts: ['Pair them with a strong fighter so they toughen up', 'Remove them from sparring class', 'Build exposure gradually with shadow sparring, light touch drills, and trusted partners', 'Tell them there is nothing to be afraid of'], ans: 2, why: 'Gradual exposure with safety builds courage. One overwhelming experience can undo months of progress.' },
      { q: 'What is the purpose of a "reset spot" in class?', opts: ['Punishment for misbehavior', 'A place where students can self-regulate without leaving class', 'Where students go when they are late', 'A spot for stretching'], ans: 1, why: 'A reset spot gives students agency over their emotions and prevents full meltdowns by providing a proactive coping tool.' }
    ]
  },
  { id: 'coaching', title: 'The Coaching Edge', icon: '⭐', desc: 'Positive reinforcement, corrective feedback, and building confident students.',
    content: [
      { h: 'The 5:1 Ratio', p: 'Research by John Gottman and others shows that healthy relationships thrive at a 5:1 ratio of positive to negative interactions. Apply this to coaching: for every correction, give five acknowledgments. This does not mean giving empty praise. It means actively looking for what students are doing right. "Great chamber on that kick. I see your hands are up. Nice loud kiai." Then: "Now let us work on pivoting that back foot." The correction lands because it is surrounded by safety.' },
      { h: 'Specific Praise vs Generic Praise', p: '"Good job" is the most overused and least effective praise in coaching. It tells the student nothing about what they did well or why it mattered. Switch to specific praise: "Your back kick had perfect balance today" or "I noticed you helped a white belt during free time — that is black belt leadership." Specific praise tells the student what to repeat and shows that you are actually watching them, not just saying words.' },
      { h: 'The Feedback Sandwich', p: 'When delivering corrections, use the sandwich method: positive observation, specific correction, encouraging close. "Your form sequence is getting smoother every week. On your front stance, drive your front knee forward another two inches — it will give you much more stability. Keep up that practice, it is showing." This structure keeps the student open to correction because they do not feel attacked.' },
      { h: 'Correcting Without Crushing', p: 'Never correct a student in front of the class in a way that highlights their failure. Walk over, get close, lower your voice, give the adjustment. Public praise, private correction. If you must address the whole class, make it general: "Everyone check your chamber height" rather than "Tyler, your chamber is too low." Also, never compare students to each other: "Why can she do it and you cannot?" is devastating and teaches nothing.' },
      { h: 'On the Mat Tip', p: 'Start each class by specifically acknowledging one thing you noticed a student improve on since last class. "Marcus, your side kicks have gotten so much sharper." This shows students that their effort is seen between classes, not just during them. Keep a mental or written note of one thing per student to watch for. This single habit will transform your retention.' }
    ],
    quiz: [
      { q: 'What is the recommended ratio of positive to corrective interactions?', opts: ['1:1', '2:1', '5:1', '10:1'], ans: 2, why: 'Research shows a 5:1 ratio of positive to corrective interactions creates an environment where corrections are received openly.' },
      { q: 'Why is "good job" ineffective as praise?', opts: ['It is too informal for martial arts', 'It does not tell the student what they did well or what to repeat', 'It is overused and students do not hear it anymore', 'It should be replaced with a high-five'], ans: 1, why: 'Specific praise tells the student exactly what behavior to repeat and shows you are genuinely paying attention.' },
      { q: 'A student\'s front stance needs correction. Best approach?', opts: ['Call it out in front of the class as a teaching moment', 'Walk over, lower your voice, give the specific adjustment privately', 'Ignore it and hope they self-correct', 'Compare them to a student doing it correctly'], ans: 1, why: 'Public praise, private correction. Walking over and quietly adjusting maintains the student\'s dignity and keeps them open to feedback.' },
      { q: 'What is the feedback sandwich?', opts: ['Positive — correction — positive', 'Correction — praise — correction', 'Instruction — demonstration — practice', 'Warmup — drill — cooldown'], ans: 0, why: 'The sandwich method wraps correction between genuine positive observations, keeping the student open and motivated.' }
    ]
  },
  { id: 'neurodiverse', title: 'Neurodiverse Students', icon: '🌈', desc: 'Practical strategies for ADHD, autism spectrum, and sensory differences.',
    content: [
      { h: 'Neurodiversity Is Common', p: 'Approximately 1 in 5 children has some form of neurodevelopmental difference. In a class of 15, that is likely 3 students. ADHD, autism spectrum, sensory processing differences, and learning disabilities are not rare — they are part of your regular teaching reality. You do not need to be a therapist. You need practical mat-side strategies that help these students thrive. The good news: strategies that help neurodiverse students usually help all students.' },
      { h: 'ADHD on the Mat', p: 'ADHD is not a lack of attention — it is difficulty regulating attention. These students may hyperfocus on something they love and struggle to switch tasks. Strategies: keep instructions short and action-oriented. Use countdowns for transitions: "In 5 seconds we switch. 5, 4, 3, 2, 1, switch." Build in movement between instruction segments — do not make them stand still and listen for 5 minutes. Give them a leadership role (line leader, demo partner) to channel their energy. Avoid punishment-based approaches; they usually backfire with ADHD.' },
      { h: 'Autism Spectrum', p: 'Students on the spectrum often need predictability, clear expectations, and processing time. Post a visual schedule of class structure where they can see it. Warn before transitions: "In 2 minutes we will switch to sparring drills." Be literal — sarcasm and idioms can be confusing. Sensory issues are real: some students cannot tolerate being touched, loud noises, or certain textures. Ask parents what works. Allow modifications like lighter contact or a quieter position in line. Never force eye contact — it can be physically uncomfortable for some students on the spectrum.' },
      { h: 'Sensory Processing', p: 'Some students are sensory seekers (they crash into things, love loud noise, seek deep pressure) and some are sensory avoiders (overwhelmed by noise, light touch, crowded spaces). For seekers: give them heavy work — pushups, pad holding, strong stances. For avoiders: position them at the end of the line, give advance warning before loud kiais, allow them to wear compression clothing under their dobok. A quick parent conversation about sensory preferences can prevent months of struggle.' },
      { h: 'On the Mat Tip', p: 'Create a "first-then" board or verbal routine for students who struggle with transitions. "First we do forms, then we do sparring." This simple structure reduces anxiety because the student knows what comes next. Pair it with a consistent class structure that rarely changes. Predictability is calming for all students, and essential for many neurodiverse learners.' }
    ],
    quiz: [
      { q: 'Approximately what fraction of children have some neurodevelopmental difference?', opts: ['1 in 50', '1 in 20', '1 in 5', '1 in 3'], ans: 2, why: 'About 1 in 5 children has ADHD, autism spectrum, sensory processing differences, or learning disabilities.' },
      { q: 'A student with ADHD cannot stay still during instruction. Best strategy?', opts: ['Give them pushups as consequence', 'Keep instructions short and build movement between segments', 'Remove them from class', 'Seat them at the back of the room'], ans: 1, why: 'Short instructions with movement breaks works with ADHD neurology rather than against it. Punishment typically backfires.' },
      { q: 'Why should you avoid forcing eye contact with a student on the autism spectrum?', opts: ['It is not culturally appropriate', 'It can be physically uncomfortable or even painful for some students on the spectrum', 'They need to watch their feet', 'It is not important in martial arts'], ans: 1, why: 'For some individuals on the autism spectrum, forced eye contact causes genuine physical discomfort and increases anxiety.' },
      { q: 'What is a "sensory seeker" student likely to benefit from?', opts: ['Quiet meditation exercises', 'Heavy work activities like pushups, pad holding, and strong stances', 'Sitting on the sideline to calm down', 'Verbal instructions only'], ans: 1, why: 'Sensory seekers crave deep pressure and physical input. Heavy work activities channel this need productively.' }
    ]
  },
  { id: 'parents', title: 'Parent Communication', icon: '🤝', desc: 'Building parent confidence and handling concerns professionally.',
    content: [
      { h: 'Parents Are Your Partners', p: 'Parents enroll their children in martial arts for many reasons: discipline, confidence, fitness, self-defense, social skills. Your job is to make the invisible visible. Parents cannot see neural pathway development. They can see their child\'s confidence grow if you point it out. Every parent interaction is a retention conversation. A parent who feels informed and valued does not leave. A parent who feels ignored or confused starts looking at other activities.' },
      { h: 'The 30-Second Post-Class Update', p: 'The most powerful retention tool costs nothing and takes 30 seconds. At pickup, find one specific thing to tell a parent about their child: "Aiden tried a spin hook kick for the first time today and did not give up even when he fell. That kind of persistence is going to serve him his whole life." You just gave that parent a story to tell at dinner, evidence that their money is well spent, and a reason to come back tomorrow. Do this for 2-3 different parents per class, rotating through your roster.' },
      { h: 'Handling Concerns', p: 'When a parent has a concern, follow this framework. First, listen completely — do not interrupt or get defensive. Second, validate: "I understand your concern. Thank you for bringing this to me." Third, explain your approach: "Here is what we are working on and why." Fourth, propose next steps: "Let me try this adjustment and let us check in next week." Never dismiss a parent concern, even if it seems minor. To them, it is not minor. If it is beyond your scope, involve your head instructor or Mr./Mrs. Moh.' },
      { h: 'Progress Transparency', p: 'Parents should never be surprised by a testing result — pass or fail. Communicate proactively about where their child stands. Use phrases like "On track for testing," "Needs a few more weeks," or "Ready and strong." If a student is struggling, frame it developmentally: "This is normal for her age group. Here is what we are doing to help and what you can do at home." Give parents homework: "Have her practice her form 3 times this week — she almost has it" turns parents into training partners.' },
      { h: 'On the Mat Tip', p: 'Keep a rotation list by the door or on your phone. Each class, plan to connect with 2-3 parents. After 2-3 weeks, you will have touched every family. This proactive communication prevents 90% of parent complaints because issues are addressed before they fester. It also makes testing discussions much easier because parents already feel in the loop.' }
    ],
    quiz: [
      { q: 'What is the most powerful retention tool described in this module?', opts: ['Discounted membership fees', 'The 30-second specific post-class parent update', 'Monthly newsletters', 'Social media posts about students'], ans: 1, why: 'A specific, personal 30-second update gives parents evidence that their investment is worthwhile and creates emotional connection to your program.' },
      { q: 'A parent is upset that their child was not promoted at testing. First step?', opts: ['Explain the testing criteria immediately', 'Listen completely without interrupting or getting defensive', 'Tell them their child was not ready', 'Offer a free retest'], ans: 1, why: 'The first step is always to listen completely. Parents need to feel heard before they can hear your explanation.' },
      { q: 'Should parents ever be surprised by a testing result?', opts: ['Yes, surprises build excitement', 'No, communicate proactively about readiness before testing', 'Only if they pass', 'It depends on the student'], ans: 1, why: 'Proactive communication about testing readiness prevents negative surprises and builds parent trust in your program.' },
      { q: 'How should you frame a struggling student to their parents?', opts: ['"Your child is behind the others"', '"She needs more discipline at home"', '"This is normal for her age group. Here is what we are doing to help"', '"Maybe try a different activity"'], ans: 2, why: 'Developmental framing normalizes the struggle, shows your expertise, and positions you as a partner working with the parent.' }
    ]
  }
  ,{ id: 'retention', title: 'Retention & Attendance', icon: '📈', desc: 'Why students quit, early warning signs, and how to re-engage at-risk students.',
    content: [
      { h: 'The Retention Truth', p: 'Most students do not quit because of the martial arts. They quit because they feel invisible. No one noticed they were struggling. No one reached out after their absences. No one remembered their name after three months. Retention is not a marketing problem — it is a relationships problem. Every student who quits costs your school $1,500–$3,000 in lost annual revenue and requires 5–10 new leads to replace. Keeping one student costs pennies.' },
      { h: 'The Stoplight System', p: 'Green: attending regularly, engaged, on track for testing. Yellow: missing 2 or more classes in a row, less engaged, falling behind on curriculum. Red: not seen in 3+ weeks, not responding, at risk of quitting. Your job is to catch students before they turn red. A yellow student reached within 48 hours has an 80% chance of returning. A red student reached after 3 weeks has a 30% chance. Speed matters.' },
      { h: 'Outreach That Actually Works', p: 'Generic texts do not work. "Hey, we missed you!" is easily ignored. Specific, personal messages do: "Hi, this is Bryan from LVLUP Waunakee. Marcus has been working really hard on his form — I wanted to personally invite him back this week so we can get him ready for testing. I saved him a spot in Thursday\'s class." You named the student, referenced something specific, created urgency, and made the next step easy. That message has a 70%+ response rate.' },
      { h: 'Milestone Moments', p: 'Students are most likely to quit at three points: before their first belt test (the unknown scares them), during a long plateau between belts, and after a negative social experience. Protect these windows proactively. Before testing: give daily encouragement, preview what to expect, normalize nervousness. During plateaus: highlight the invisible growth happening. After conflict: address it same-day before they go home.' },
      { h: 'On the Mat Tip', p: 'At the start of each week, scan your roster for any student you have not seen in 7 or more days. That is your outreach list for Monday. Do it before you leave the building. A 2-minute text today prevents a quit next month.' }
    ],
    quiz: [
      { q: 'A student turns "yellow" in the stoplight system. What does this mean?', opts: ['They earned their yellow belt', 'They are missing 2+ classes in a row or falling behind', 'They have a negative attitude', 'They are too advanced for their current class'], ans: 1, why: 'Yellow means early warning: absences are increasing, engagement is dropping, and intervention is needed within 48 hours.' },
      { q: 'What is the approximate success rate for specific, personal outreach vs generic messages?', opts: ['About the same', 'Generic works better because it is less pressuring', 'Specific, personal messages have significantly higher success (~70%+)', 'Only phone calls work'], ans: 2, why: 'Specific messages that name the student and reference something real dramatically outperform generic texts.' },
      { q: 'When are students most likely to quit?', opts: ['After their first class', 'During summer months only', 'Before first belt test, during long plateaus, after negative social experiences', 'Only when school gets busy'], ans: 2, why: 'These three windows are high-risk moments that can be proactively managed with the right timing and approach.' },
      { q: 'What should you do at the start of each week to stay ahead of potential quitters?', opts: ['Post on social media', 'Offer discounts to all students', 'Scan your roster for anyone not seen in 7+ days and reach out', 'Update the stoplight report manually'], ans: 2, why: 'A weekly roster scan takes 2 minutes and catches at-risk students while there is still time to re-engage them.' }
    ]
  },
  { id: 'class_mgmt', title: 'Class Structure & Management', icon: '📋', desc: 'Planning your class, smooth transitions, and handling disruptions with confidence.',
    content: [
      { h: 'The Class Arc', p: 'Every great class has the same arc: Arrival Energy → Warmup → Skill Work → Challenge → Cool Down → Connection. Students need a predictable rhythm. When they know what comes next, they can give 100% to the current activity instead of using mental bandwidth wondering what is happening. Post your class structure or run it the same way every time. Predictability is not boring — it is freeing.' },
      { h: 'The 3-Part Skill Block', p: 'Introduce, Practice, Pressure. Introduce: demonstrate and explain the technique (under 90 seconds). Practice: students drill with low stakes, get correction. Pressure: increase difficulty, speed, or complexity to test retention. This arc ensures students understand before they practice, and they apply skills under realistic conditions before leaving class. Skipping the pressure step means students learn it in the drill but lose it when it matters.' },
      { h: 'Transitions Without Chaos', p: 'The most class time is lost during transitions: lining up, switching partners, moving to a new station. Use countdowns: "In 10 seconds, freeze and look at me." Use physical anchors: "Everyone to your push-up position now." Use games: "First row to freeze wins." The goal is to make transitions feel like part of the class, not a break from it. When transitions are tight, you gain 5–8 minutes of extra instruction time per class.' },
      { h: 'Handling Disruptions', p: 'Disruptions come in three forms: attention-seeking, boredom, and overwhelm. Attention-seekers need a job — give them leadership before they take it themselves. Bored students need more challenge — they are ahead. Overwhelmed students need a private check-in — they are acting out because they cannot keep up. Publicly shaming any of the three converts a manageable disruption into a behavior spiral.' },
      { h: 'On the Mat Tip', p: 'Write a 5-word plan for each class before you start: "Forms, sparring combos, partner drills, game." This takes 30 seconds and eliminates the 2 most common class killers: dead time while you figure out what is next, and finishing early with nothing to do. Students sense when you are winging it — and they fill that space with chaos.' }
    ],
    quiz: [
      { q: 'What is the correct sequence of the 3-Part Skill Block?', opts: ['Practice → Introduce → Pressure', 'Introduce → Practice → Pressure', 'Pressure → Practice → Introduce', 'Introduce → Pressure → Practice'], ans: 1, why: 'Introduce establishes understanding, Practice builds repetition, Pressure tests retention under realistic conditions.' },
      { q: 'How can you reclaim 5-8 minutes of instruction time per class?', opts: ['Start class earlier', 'Skip the cooldown', 'Tighten transitions with countdowns, anchors, and routines', 'Give fewer breaks'], ans: 2, why: 'Transitions are where most class time is lost. Structured transitions with countdowns and physical cues reclaim that time efficiently.' },
      { q: 'A student is disrupting class because they are clearly bored. Best response?', opts: ['Give them pushups as consequence', 'Remove them from class', 'Increase their challenge level — they likely need more', 'Ignore the behavior'], ans: 2, why: 'Boredom-driven disruption signals the student needs more challenge. Increasing difficulty redirects their energy constructively.' },
      { q: 'Why does predictable class structure help students learn?', opts: ['It makes the instructor\'s job easier', 'Students can give 100% to each activity instead of using mental energy figuring out what comes next', 'It impresses parents', 'It follows the national curriculum'], ans: 1, why: 'When students know the structure, they can fully engage with each segment rather than managing uncertainty.' }
    ]
  },
  { id: 'culture', title: 'School Culture & Pride', icon: '🏫', desc: 'Building the identity, traditions, and belonging that make students stay for years.',
    content: [
      { h: 'Culture Is Your Retention Strategy', p: 'Students stay for the training. They stay for years because of the community. Culture is the invisible glue — the reason a student comes back after a rough week, the reason a family refers three friends, the reason a student cries when they earn their black belt. You build culture through consistency, ceremony, and intentional belonging. A strong culture turns students into ambassadors and parents into recruiters.' },
      { h: 'Traditions and Ceremonies', p: 'Traditions create shared memory. Belt ceremonies should feel significant, not rushed. The student has earned this moment. Use specific language: "This belt represents not just what you learned, but who you became in the process." Birthday acknowledgments, first-stripe celebrations, the annual Bring a Buddy Day — these moments give students stories to tell. When a student has memories at your school, leaving feels like losing something, not just canceling a service.' },
      { h: 'The Belonging Formula', p: 'Students feel they belong when three things are true: they are known by name, they are noticed when absent, and they are celebrated for something specific. Use students\' names 5 times every class. Acknowledge when a student returns after being gone: "We missed you this week — it was not the same without you." These small acts compound over months into an identity: "I am a LVLUP student." That identity is hard to walk away from.' },
      { h: 'Values in Action', p: 'Every school has values on the wall. Few schools live them daily. Pick one value per cycle and make it visible: give out recognition cards that catch students displaying the life skill. Reference it in mat chats. Use it in parent conversations: "Your son showed real courage today." When the life skill is tied to real moments, it becomes part of the culture rather than a poster. Students begin using the language themselves — and that is when you know the culture has taken hold.' },
      { h: 'On the Mat Tip', p: 'Run a culture check at the end of each month: did every student get recognized for something specific? Did you run a tradition or ceremony? Did you personally reach out to 3+ families? Did you catch and name a student living a school value? If you hit all four, your culture is alive. If not, pick one to improve next month.' }
    ],
    quiz: [
      { q: 'What three things make a student feel they truly belong at your school?', opts: ['Free classes, good snacks, and trophies', 'Known by name, noticed when absent, celebrated for something specific', 'High rankings, tournament wins, and a nice facility', 'Strict rules and consistent uniform standards'], ans: 1, why: 'Belonging is built through personal recognition: knowing their name, noticing their absence, and celebrating something real about them.' },
      { q: 'Why do traditions like belt ceremonies matter for retention?', opts: ['They fill class time', 'They impress potential new students', 'They create shared memories that make leaving feel like a loss, not a cancellation', 'They are required by the association'], ans: 2, why: 'Traditions create emotional anchors. Students with memories at your school have something to lose when they consider quitting.' },
      { q: 'You want to make this cycle\'s life skill feel real, not just a poster. Best approach?', opts: ['Write it on the board', 'Catch students displaying it and name it specifically in the moment', 'Have students memorize the definition', 'Give a lecture about it at the start of each class'], ans: 1, why: 'Values come alive when tied to real moments. Catching and naming specific examples makes the life skill part of the school identity.' },
      { q: 'What does a strong school culture ultimately create?', opts: ['Higher testing fees', 'Students who become ambassadors and parents who become recruiters', 'A larger social media following', 'More tournament medals'], ans: 1, why: 'A culture where students belong and feel valued converts them into voluntary ambassadors — the most powerful marketing a school can have.' }
    ]
  }

function gdSetModule(idx){ state.gdActiveModule=idx; state.gdQuizAnswers={}; state.gdQuizSubmitted=false; state.gdQuizScore=undefined; state.gdCompletionSaved=null; render(); }
function gdBackToMenu(){ state.gdActiveModule=null; render(); }
function gdSelectAnswer(qIdx,aIdx){ if(state.gdQuizSubmitted)return; state.gdQuizAnswers[qIdx]=aIdx; render(); }
function gdSubmitQuiz(){
  const mod=GYMDESK_MODULES[state.gdActiveModule];
  if(!mod)return;
  if(Object.keys(state.gdQuizAnswers).length<mod.quiz.length)return alert('Please answer all questions before submitting.');
  state.gdQuizSubmitted=true;
  let correct=0; mod.quiz.forEach((q,i)=>{ if(state.gdQuizAnswers[i]===q.ans)correct++; });
  state.gdQuizScore=Math.round(correct/mod.quiz.length*100);
  render();
}
function gdRetryQuiz(){ state.gdQuizAnswers={}; state.gdQuizSubmitted=false; state.gdQuizScore=undefined; state.gdCompletionSaved=null; render(); }
function gdSaveCompletion(empId){
  const emp=TASK_EMPLOYEES.find(e=>e.id===empId);
  const mod=GYMDESK_MODULES[state.gdActiveModule];
  if(!emp||!mod)return;
  const score=state.gdQuizScore||0;
  fbSet('development/gymdesk/completions/'+mod.id+'/'+empId,{name:emp.name,score,passed:score>=80,completedAt:new Date().toISOString()});

  render();
}

function setWallPostType(t){ state.wallPostType=t; render(); }
function setWallPostEmp(id){ state.wallPostEmp=id; render(); }
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)return 'just now';
  if(d<3600000)return Math.floor(d/60000)+'m ago';
  if(d<86400000)return Math.floor(d/3600000)+'h ago';
  if(d<604800000)return Math.floor(d/86400000)+'d ago';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function postToWall(){
  const empId=state.wallPostEmp;
  const emp=TASK_EMPLOYEES.find(e=>e.id===empId);
  const input=document.getElementById('wallPostMsg');
  if(!emp||!input)return;
  const msg=input.value.trim();
  if(!msg)return;
  const type=state.wallPostType||'win';
  const ts=Date.now();
  fbSet('wall/'+ts,{empId,name:emp.name,label:emp.label,type,message:msg,ts});
  input.value='';
}
function reactToWallPost(key){
  const empId=state.wallPostEmp;
  if(!empId)return;
  const post=(state.wall||{})[key];
  if(!post)return;
  const already=post.reactions&&post.reactions[empId];
  fbSet('wall/'+key+'/reactions/'+empId, already?null:true);
}
function deleteWallPost(key){
  if(!confirm('Delete this post?'))return;
  fbSet('wall/'+key,null);
}

function renderWallPage(){
  const posts=Object.entries(state.wall||{})
    .map(([k,v])=>({key:k,...v}))
    .filter(p=>p.ts)
    .sort((a,b)=>b.ts-a.ts);

  const now=new Date(), weekStart=new Date(now);
  weekStart.setDate(now.getDate()-now.getDay()||7); weekStart.setHours(0,0,0,0);
  const weekTs=weekStart.getTime();

  // Activity counts this week per employee
  const weekCounts={};
  TASK_EMPLOYEES.forEach(e=>{ weekCounts[e.id]=0; });
  posts.forEach(p=>{ if(p.ts>=weekTs&&p.empId) weekCounts[p.empId]=(weekCounts[p.empId]||0)+1; });

  const activeEmp=TASK_EMPLOYEES.find(e=>e.id===state.wallPostEmp)||TASK_EMPLOYEES[0];
  const activeType=WALL_TYPES.find(t=>t.id===state.wallPostType)||WALL_TYPES[3];

  let html='';

  // ── Composer ──
  html+='<div class="section" style="padding:16px 20px 20px">';
  html+='<div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px">📣 Post to the Team Wall</div>';

  // Employee selector
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  TASK_EMPLOYEES.forEach(e=>{
    const active=e.id===state.wallPostEmp;
    html+='<button onclick="setWallPostEmp(\''+e.id+'\')" style="padding:5px 12px;border-radius:20px;border:1.5px solid '+(active?'var(--blue)':'var(--gray-200)')+';background:'+(active?'var(--blue)':'#fff')+';color:'+(active?'#fff':'var(--gray-600)')+';font-size:12px;font-weight:600;cursor:pointer">'+esc(e.name)+'</button>';
  });
  html+='</div>';

  // Post type selector
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
  WALL_TYPES.forEach(t=>{
    const active=t.id===state.wallPostType;
    html+='<button onclick="setWallPostType(\''+t.id+'\')" style="padding:5px 12px;border-radius:20px;border:1.5px solid '+(active?t.border:'var(--gray-200)')+';background:'+(active?t.bg:'#fff')+';color:'+(active?t.text:'var(--gray-500)')+';font-size:12px;font-weight:600;cursor:pointer">'+t.icon+' '+t.label+'</button>';
  });
  html+='</div>';

  // Message + post button
  html+='<div style="display:flex;gap:8px;align-items:flex-start">';
  html+='<textarea id="wallPostMsg" placeholder="What\'s happening? New student? Area clean? Lead generated? Brag away! 🏆" rows="2" style="flex:1;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.5" onkeydown="if(event.key===\'Enter\'&&(event.metaKey||event.ctrlKey))postToWall()"></textarea>';
  html+='<button onclick="postToWall()" style="padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;align-self:stretch">Post 🚀</button>';
  html+='</div>';
  html+='<div style="font-size:11px;color:var(--gray-400);margin-top:5px">Cmd/Ctrl + Enter to post</div>';
  html+='</div>';

  // ── This Week's Activity ──
  const sorted=TASK_EMPLOYEES.slice().sort((a,b)=>(weekCounts[b.id]||0)-(weekCounts[a.id]||0));
  const topCount=weekCounts[sorted[0].id]||0;
  html+='<div class="section" style="padding:12px 20px">';
  html+='<div style="font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">This Week\'s Activity</div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:10px">';
  sorted.forEach(e=>{
    const cnt=weekCounts[e.id]||0;
    const pct=topCount>0?Math.round(cnt/topCount*100):0;
    const isTop=cnt>0&&cnt===topCount;
    html+='<div style="flex:1;min-width:90px">';
    html+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:600;color:var(--primary)">'+esc(e.name)+(isTop?' 🏆':'')+'</span><span style="font-weight:700;color:var(--blue)">'+cnt+'</span></div>';
    html+='<div style="height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(isTop?'var(--green)':'var(--blue)')+';border-radius:3px;transition:width .3s"></div></div>';
    html+='</div>';
  });
  html+='</div></div>';

  // ── Feed ──
  if(posts.length===0){
    html+='<div class="section" style="padding:40px 24px;text-align:center">';
    html+='<div style="font-size:32px;margin-bottom:8px">🔥</div>';
    html+='<div style="font-size:14px;font-weight:600;color:var(--gray-500)">Nothing posted yet — be the first!</div>';
    html+='</div>';
  }else{
    html+='<div style="display:flex;flex-direction:column;gap:10px;padding-bottom:24px">';
    posts.forEach(p=>{
      const wt=WALL_TYPES.find(t=>t.id===p.type)||WALL_TYPES[3];
      const reactionCount=Object.keys(p.reactions||{}).length;
      const iReacted=p.reactions&&p.reactions[state.wallPostEmp];
      const isOwn=p.empId===state.wallPostEmp;
      html+='<div style="background:var(--card);border:1.5px solid '+wt.border+';border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)">';
      // Header
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      html+='<span style="font-size:18px">'+wt.icon+'</span>';
      html+='<span style="font-weight:700;font-size:13px;color:var(--primary)">'+esc(p.name||'')+'</span>';
      html+='<span style="font-size:11px;background:'+wt.bg+';color:'+wt.text+';padding:1px 8px;border-radius:10px;font-weight:600">'+wt.label+'</span>';
      if(p.label) html+='<span style="font-size:11px;color:var(--gray-400)">· '+esc(p.label)+'</span>';
      html+='<span style="margin-left:auto;font-size:11px;color:var(--gray-400)">'+timeAgo(p.ts)+'</span>';
      html+='</div>';
      // Message
      html+='<div style="font-size:14px;color:#1f2937;line-height:1.6;margin-bottom:10px">'+esc(p.message||'')+'</div>';
      // Footer: reactions + delete
      html+='<div style="display:flex;align-items:center;gap:8px">';
      html+='<button onclick="reactToWallPost(\''+p.key+'\')" style="padding:4px 12px;border-radius:20px;border:1.5px solid '+(iReacted?'#f97316':'var(--gray-200)')+';background:'+(iReacted?'#fff7ed':'#fff')+';color:'+(iReacted?'#ea580c':'var(--gray-500)')+';font-size:12px;font-weight:600;cursor:pointer">🔥 '+(reactionCount||0)+'</button>';
      if(isOwn) html+='<button onclick="deleteWallPost(\''+p.key+'\')" style="margin-left:auto;font-size:11px;color:var(--gray-300);background:none;border:none;cursor:pointer;padding:0" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--gray-300)\'">Delete</button>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  return html;
}

function renderPlaybooksTab() {
  const isLVLUP = (state.tasksLoc !== 'goninja');
  const playbooks = isLVLUP ? LVLUP_PLAYBOOKS : GONINJA_PLAYBOOKS;
  const brandColor = isLVLUP ? 'var(--accent)' : '#6d28d9';
  const brandLabel = isLVLUP ? 'LVLUP' : 'Go Ninja';

  const ROLES = isLVLUP
    ? [
        { id:'all',        label:'All Roles',          icon:'🏢' },
        { id:'instructor', label:'Lead Instructor',    icon:'🥋' },
        { id:'sales',      label:'Sales Director',     icon:'📞' },
        { id:'frontdesk',  label:'Front Desk',         icon:'🖥️' },
      ]
    : [
        { id:'all',        label:'All Roles',          icon:'🏢' },
        { id:'instructor', label:'Instructor',         icon:'🥋' },
        { id:'frontdesk',  label:'Front Desk',         icon:'🖥️' },
      ];

  let html = '';

  // ─── Individual Playbook View ───
  if (state.pbOpen) {
    const pb = playbooks.find(p => p.id === state.pbOpen);
    if (!pb) { state.pbOpen = null; return renderPlaybooksTab(); }

    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
    html += '<button onclick="closePlaybook()" style="background:var(--gray-100);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-700)">← Back</button>';
    html += '<div style="font-size:11px;color:var(--gray-400)">' + pb.icon + ' ' + esc(pb.category) + '</div>';
    html += '</div>';

    // Header card
    html += '<div style="background:var(--card);border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow-md);border-left:4px solid ' + brandColor + '">';
    html += '<div style="display:flex;align-items:flex-start;gap:14px">';
    html += '<span style="font-size:36px;line-height:1">' + pb.icon + '</span>';
    html += '<div style="flex:1">';
    html += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);margin-bottom:3px">' + esc(pb.category) + '</div>';
    html += '<div style="font-size:20px;font-weight:800;color:var(--primary);line-height:1.2;margin-bottom:4px">' + esc(pb.title) + '</div>';
    html += '<div style="font-size:13px;color:var(--gray-500)">' + esc(pb.tagline) + '</div>';
    const roleLabel = ROLES.find(r => r.id === pb.role);
    if (roleLabel) {
      html += '<div style="margin-top:10px"><span style="background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px">' + roleLabel.icon + ' ' + esc(roleLabel.label) + '</span></div>';
    }
    html += '</div></div></div>';

    // Quick Checklist
    html += '<div style="background:var(--card);border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow)">';
    html += '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-400);margin-bottom:12px">⚡ Quick Checklist</div>';
    pb.checklist.forEach((item, i) => {
      html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;' + (i < pb.checklist.length - 1 ? 'border-bottom:1px solid var(--gray-100)' : '') + '">';
      html += '<div style="width:20px;height:20px;border-radius:50%;background:' + brandColor + ';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">' + (i + 1) + '</div>';
      html += '<div style="font-size:13px;color:var(--gray-700);line-height:1.4">' + esc(item) + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Steps
    html += '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-400);margin:16px 0 10px">📋 Step-by-Step</div>';
    pb.steps.forEach((step, si) => {
      const stepKey = 'pb_step_' + pb.id + '_' + si;
      const isOpen = !!state[stepKey];
      html += '<div style="background:var(--card);border-radius:10px;margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden">';
      html += '<div onclick="togglePbStep(\'' + pb.id + '\',' + si + ')" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none">';
      html += '<div style="display:flex;align-items:center;gap:10px">';
      html += '<div style="width:22px;height:22px;border-radius:6px;background:' + brandColor + ';color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + (si + 1) + '</div>';
      html += '<div style="font-size:13px;font-weight:700;color:var(--primary)">' + esc(step.title) + '</div>';
      html += '</div>';
      html += '<span style="font-size:16px;color:var(--gray-400);transition:transform 0.2s;transform:rotate(' + (isOpen ? '90' : '0') + 'deg)">›</span>';
      html += '</div>';

      if (isOpen) {
        html += '<div style="padding:0 16px 16px;border-top:1px solid var(--gray-100)">';
        // Detail paragraph
        if (step.detail) {
          html += '<p style="font-size:13px;color:var(--gray-600);line-height:1.6;margin:12px 0 10px">' + esc(step.detail) + '</p>';
        }
        // Talking points
        if (step.points && step.points.length) {
          html += '<div style="background:#f0fdf4;border-radius:8px;padding:12px 14px;margin-bottom:8px">';
          html += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#16a34a;margin-bottom:8px">💬 Talking Points</div>';
          step.points.forEach(pt => {
            html += '<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:6px">';
            html += '<span style="color:#16a34a;margin-top:2px;font-size:12px">•</span>';
            html += '<span style="font-size:12px;color:var(--gray-700);line-height:1.5">' + esc(pt) + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }
        // Avoid
        if (step.avoid && step.avoid.length) {
          html += '<div style="background:#fef2f2;border-radius:8px;padding:12px 14px">';
          html += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#ef4444;margin-bottom:8px">🚫 Avoid</div>';
          step.avoid.forEach(a => {
            html += '<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:6px">';
            html += '<span style="color:#ef4444;margin-top:2px;font-size:12px">✕</span>';
            html += '<span style="font-size:12px;color:var(--gray-700);line-height:1.5">' + esc(a) + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    });

    return html;
  }

  // ─── View switcher (Playbooks vs Policy Book) ───
  const pbView = state.pbView || 'playbooks';
  html += '<div style="display:flex;gap:6px;margin-bottom:14px">';
  [['playbooks','📖 Playbooks'],['policy','📜 Policy Book']].forEach(([v,lbl]) => {
    const active = pbView === v;
    html += '<button onclick="setPbView(\'' + v + '\')" style="padding:7px 16px;border-radius:20px;border:1.5px solid ' + (active ? brandColor : 'var(--gray-200)') + ';background:' + (active ? brandColor : '#fff') + ';color:' + (active ? '#fff' : 'var(--gray-600)') + ';font-size:12px;font-weight:700;cursor:pointer">' + lbl + '</button>';
  });
  html += '</div>';

  // ─── Policy Book View ───
  if (pbView === 'policy') {
    const policy = isLVLUP ? LVLUP_POLICY : [];
    if (!policy.length) {
      html += '<div style="background:var(--card);border-radius:12px;padding:40px;text-align:center;box-shadow:var(--shadow)"><div style="font-size:32px;margin-bottom:12px">🚧</div><div style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:6px">Coming Soon</div><div style="font-size:12px;color:var(--gray-500)">Go Ninja policy book is being built.</div></div>';
      return html;
    }
    html += '<div style="background:var(--card);border-radius:14px;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-md);border-left:4px solid #6d28d9">';
    html += '<div style="font-size:18px;font-weight:800;color:var(--primary)">📜 ' + brandLabel + ' Policy Book</div>';
    html += '<div style="font-size:12px;color:var(--gray-500);margin-top:4px">Conduct, appearance, communication standards, and more. Click any section to read.</div>';
    html += '</div>';
    policy.forEach(section => {
      const isOpen = state.pbPolicyOpen === section.id;
      html += '<div style="background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden">';
      html += '<div onclick="openPolicy(\'' + section.id + '\')" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none">';
      html += '<div style="display:flex;align-items:center;gap:12px">';
      html += '<span style="font-size:22px">' + section.icon + '</span>';
      html += '<div style="font-size:14px;font-weight:700;color:var(--primary)">' + esc(section.title) + '</div>';
      html += '</div>';
      html += '<span style="font-size:18px;color:var(--gray-400);transition:transform 0.2s;transform:rotate(' + (isOpen ? '90' : '0') + 'deg)">›</span>';
      html += '</div>';
      if (isOpen) {
        html += '<div style="border-top:1px solid var(--gray-100)">';
        section.sections.forEach((sub, si) => {
          const subOpen = !!state['pol_' + section.id + '_' + si];
          html += '<div style="border-bottom:1px solid var(--gray-50)">';
          html += '<div onclick="togglePolicySection(\'' + section.id + '\',' + si + ')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px 12px 28px;cursor:pointer;user-select:none;background:' + (subOpen ? '#f9fafb' : '#fff') + '">';
          html += '<div style="font-size:13px;font-weight:600;color:var(--gray-700)">' + esc(sub.heading) + '</div>';
          html += '<span style="font-size:14px;color:var(--gray-400)">' + (subOpen ? '▾' : '▸') + '</span>';
          html += '</div>';
          if (subOpen) {
            html += '<div style="padding:4px 20px 16px 28px">';
            html += '<p style="font-size:13px;color:var(--gray-600);line-height:1.7;margin-bottom:' + (sub.bullets ? '10px' : '0') + '">' + esc(sub.body) + '</p>';
            if (sub.bullets) {
              sub.bullets.forEach(b => {
                html += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;padding-left:4px">';
                html += '<span style="color:#6d28d9;flex-shrink:0;margin-top:2px">•</span>';
                html += '<span style="font-size:12px;color:var(--gray-700);line-height:1.5">' + esc(b) + '</span>';
                html += '</div>';
              });
            }
            html += '</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    return html;
  }

  // ─── Playbook List View ───
  const roleFilter = state.pbRole;
  const filtered = roleFilter && roleFilter !== 'all'
    ? playbooks.filter(p => p.role === roleFilter || p.role === 'all')
    : playbooks;

  // Hero header
  html += '<div style="background:var(--card);border-radius:14px;padding:20px 24px;margin-bottom:14px;box-shadow:var(--shadow)">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">';
  html += '<div>';
  html += '<div style="font-size:18px;font-weight:800;color:var(--primary)">📖 ' + brandLabel + ' Playbooks</div>';
  html += '<div style="font-size:12px;color:var(--gray-500);margin-top:3px">SOPs & checklists for every key situation</div>';
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--gray-400);font-style:italic">' + playbooks.length + ' playbooks</div>';
  html += '</div></div>';

  if (playbooks.length === 0) {
    html += '<div style="background:var(--card);border-radius:12px;padding:40px;text-align:center;box-shadow:var(--shadow)">';
    html += '<div style="font-size:32px;margin-bottom:12px">🚧</div>';
    html += '<div style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:6px">Coming Soon</div>';
    html += '<div style="font-size:12px;color:var(--gray-500)">Go Ninja playbooks are being built. Check back soon!</div>';
    html += '</div>';
    return html;
  }

  // Role filter pills
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
  ROLES.forEach(r => {
    const active = (!roleFilter && r.id === 'all') || roleFilter === r.id;
    const count = r.id === 'all' ? playbooks.length : playbooks.filter(p => p.role === r.id || p.role === 'all').length;
    html += '<button onclick="setPlaybookRole(\'' + r.id + '\')" style="padding:6px 14px;border-radius:20px;border:1.5px solid ' + (active ? brandColor : 'var(--gray-200)') + ';background:' + (active ? brandColor : '#fff') + ';color:' + (active ? '#fff' : 'var(--gray-600)') + ';font-size:12px;font-weight:700;cursor:pointer">';
    html += r.icon + ' ' + r.label + ' <span style="opacity:0.7;font-weight:400">(' + count + ')</span></button>';
  });
  html += '</div>';

  // Group by category
  const categories = [...new Set(filtered.map(p => p.category))];
  categories.forEach(cat => {
    const catPbs = filtered.filter(p => p.category === cat);
    html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);margin:14px 0 8px;padding-left:2px">' + cat + '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:4px">';
    catPbs.forEach(pb => {
      const roleInfo = ROLES.find(r => r.id === pb.role);
      html += '<div onclick="openPlaybook(\'' + pb.id + '\')" style="background:var(--card);border-radius:12px;padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);border:1.5px solid var(--gray-200);transition:all 0.15s;border-top:3px solid ' + brandColor + '" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 6px 16px rgba(0,0,0,0.1)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'var(--shadow)\'">';
      html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      html += '<span style="font-size:24px">' + pb.icon + '</span>';
      if (roleInfo && roleInfo.id !== 'all') {
        html += '<span style="font-size:10px;background:var(--gray-100);color:var(--gray-500);padding:2px 8px;border-radius:999px;font-weight:600">' + roleInfo.icon + ' ' + roleInfo.label + '</span>';
      }
      html += '</div>';
      html += '<div style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:4px;line-height:1.3">' + esc(pb.title) + '</div>';
      html += '<div style="font-size:11px;color:var(--gray-500);line-height:1.4;margin-bottom:10px">' + esc(pb.tagline) + '</div>';
      html += '<div style="font-size:11px;color:var(--gray-400)">' + pb.checklist.length + ' steps · ' + pb.steps.length + ' detail sections</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  return html;
}

function renderDevelopmentPage() {
  const completions = (state.devCourse && state.devCourse.completions) || {};
  const gdCompletions = (state.gdCourse && state.gdCourse.completions) || {};

  async function init() {
  db.ref('.info/connected').on('value', snap => updateConnStatus(snap.val()));
  // Restore ACQ session unlock from sessionStorage
  if (sessionStorage && sessionStorage.getItem('acqUnlocked') === '1') state.acq.unlocked = true;
  seedIfEmpty();
  seedEMadGoals();
  listenAll();
  listenTasks();
  listenGoals();
  listenAcqPin();
}

function seedEMadGoals() {
  // Use full lowercase keys to match the existing format across all locations
  const EMAD_GOALS = {
    january: 18000, february: 18480, march: 18920,
    april: 19140, may: 19580, june: 20020,
    july: 17000, august: 17000, september: 21120,
    october: 21340, november: 35000, december: 24400,
  };
  const ref = fbRef('financials/eastmad/2026');
  ref.once('value', snap => {
    const data = snap.val() || {};
    const updates = {};
    Object.entries(EMAD_GOALS).forEach(([mon, goal]) => {
      if (!data[mon] || !data[mon].goal) {
        updates[mon + '/goal'] = goal;
      }
    });
    // Clean up any short-key duplicates from a previous seed
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(k => {
      if (data[k] && Object.keys(data[k]).length === 1 && data[k].goal) updates[k] = null;
    });
    if (Object.keys(updates).length) ref.update(updates);
  });
}

function getFeedbackMonthKey(offset) {
  const d = new Date();
  d.setMonth(d.getMonth() + (offset !== undefined ? offset : state.feedback.monthOffset));
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getCurrentMonthKey() { return getFeedbackMonthKey(0); }

function getFeedbackMonthLabel() {
  const d = new Date();
  d.setMonth(d.getMonth() + state.feedback.monthOffset);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function feedbackChangeMonth(delta) {
  state.feedback.monthOffset += delta;
  listenFeedbackTracking();
}

function feedbackSetLocationFilter(loc) {
  state.feedback.locationFilter = loc;
  render();
}

function feedbackToggleInactive() {
  state.feedback.showInactive = !state.feedback.showInactive;
  render();
}

function feedbackToggle(studentKey, field) {
  const current = (state.feedback.tracking[studentKey] || {})[field];
  db.ref('feedbackTracking/all/' + studentKey + '/' + field).set(!current);
}

function feedbackSetStatus(studentKey, status) {
  // Clicking the active status clears it (toggle off)
  const current = (state.feedback.roster[studentKey] || {}).status;

// ── Shared proxy helper ──
async function getReportProxyConfig() {
  const snap = await db.ref('config').once('value').catch(() => ({ val: () => ({}) }));
  const cfg = snap.val() || {};
  let proxyUrl = (cfg.reportProxyUrl || '').trim().replace(/\/$/, '');
  if (!proxyUrl) {
    proxyUrl = prompt('Enter your webhooks server URL to generate reports\n(e.g. https://your-server.com or http://localhost:3001)\n\nThis will be saved for future use:');
    if (!proxyUrl) throw new Error('No proxy URL configured');
    proxyUrl = proxyUrl.trim().replace(/\/$/, '');
    db.ref('config/reportProxyUrl').set(proxyUrl);
  }
  const secret = cfg.webhookSecret || cfg.reportProxySecret || 'lvlup-watchlist-2026';
  return { proxyUrl, secret };
}

async function callReportProxy(studentData, monthLabel) {
  const { proxyUrl, secret } = await getReportProxyConfig();
  const resp = await fetch(proxyUrl + '/generate-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      secret,
      studentName: studentData.name,
      location: studentData.location,
      cycleLabel: monthLabel,
      status: studentData.status || null,
      notes: studentData.notes || '',
      instructorFeedback: studentData.instructorFeedback,
    }),
  });
  if (!resp.ok) {
    const errBody = await resp.json().catch(() => ({}));
    throw new Error(errBody.error || 'Proxy error ' + resp.status);
  }
  const data = await resp.json();
  return data.report;
}

async function feedbackGenerateOneReport(studentKey) {
  const s = state.feedback.roster[studentKey];
  if (!s) return;
  const mk = getFeedbackMonthKey();
  const t = state.feedback.tracking[studentKey] || {};
  const feedback = (t.instructorFeedback || '').trim();
  if (!feedback) { alert('No instructor feedback written for ' + s.name + ' yet.'); return; }

  const btns = document.querySelectorAll('button[onclick*="feedbackGenerateOneReport(\'' + studentKey + '\')"]');
  btns.forEach(b => { b.disabled = true; b.textContent = '⏳'; });

  try {
    const monthLabel = getFeedbackMonthLabel();
    const report = await callReportProxy({ ...s, instructorFeedback: feedback }, monthLabel);
    showReportModal(s.name, monthLabel, report, getReportViewUrl(mk, studentKey), async function(editedReport) {
      await db.ref('studentReports/' + mk + '/' + studentKey).set({
        studentName: s.name, location: s.location, cycleLabel: monthLabel,
        report: editedReport, generatedAt: new Date().toISOString(), instructorFeedback: feedback, status: s.status || null
      });
    });
  } catch(err) {
    alert('Failed to generate report for ' + s.name + ':\n' + err.message);
  } finally {
    btns.forEach(b => { b.disabled = false; b.textContent = '⚡'; });
  }
}

async function feedbackGenerateReports() {
  const mk = getFeedbackMonthKey();
  const monthLabel = getFeedbackMonthLabel();
  const { roster, tracking, locationFilter, selectedStudents } = state.feedback;
  const sel = selectedStudents || new Set();

  const students = Object.entries(roster)
    .filter(([k, s]) => {
      if (s.active === false) return false;
      if (sel.size > 0 && !sel.has(k)) return false;
      if (sel.size === 0 && locationFilter !== 'all' && s.location !== locationFilter) return false;
      return ((tracking[k] || {}).instructorFeedback || '').trim().length > 0;
    })
    .map(([k, s]) => ({ key: k, ...s, instructorFeedback: (tracking[k] || {}).instructorFeedback }));

  if (!students.length) {
    alert('No students have instructor feedback written yet for ' + monthLabel + '.\nWrite feedback first, then generate reports.');
    return;
  }

  const btn = document.querySelector('button[onclick="feedbackGenerateReports()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; }

  let successCount = 0, failCount = 0;
  const failMessages = [];

  const generated = [];
  for (const s of students) {
    try {
      const report = await callReportProxy(s, monthLabel);
      successCount++;
      generated.push({ key: s.key, name: s.name, location: s.location, instructorFeedback: s.instructorFeedback, report });
    } catch(err) {
      console.error('Failed:', s.name, err);
      failCount++;
      failMessages.push(s.name + ': ' + err.message);
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = '⚡ ' + (state.feedback.selectedStudents?.size > 0 ? 'Generate (' + state.feedback.selectedStudents.size + ')' : 'Generate Reports'); }

  if (failCount > 0 && successCount === 0) {
    alert('❌ All reports failed.\n\n' + failMessages.join('\n'));

  const modal = document.createElement('div');

        '<button id="viewBtn_' + g.key + '" style="padding:5px 12px;background:#f0f4ff;color:#3730a3;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">✏️ Review & Save</button>' +
        '<a id="linkBtn_' + g.key + '" href="' + esc(getReportViewUrl(mk, g.key)) + '" target="_blank" style="padding:5px 12px;background:#fdf4ff;color:#7c3aed;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:none;">🔗 Link</a>' +
      '</div>' +
    '</div>'
  ).join('');

  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.22);overflow:hidden;">
      <div style="padding:18px 22px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="font-size:15px;font-weight:800;color:#1a1a2e;">⚡ ${successCount} Report${successCount !== 1 ? 's' : ''} Generated</div>
        <button onclick="document.getElementById('reportPreviewModal').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#bbb;padding:0 4px;line-height:1;">✕</button>

function feedbackPublishMonthly(studentKey) {
  const s = state.feedback.roster[studentKey] || {};
  const email = (s.email || '').trim().toLowerCase();

  const text = (document.getElementById('fbSendText').value || '').trim();
  const instructor = (document.getElementById('fbSendInstructor').value || '').trim();

  if (!instructor) { document.getElementById('fbSendStatus').innerHTML = '<span style="color:#ef4444;">Please enter your name.</span>'; return; }

  // Cache instructor name for next time
  localStorage.setItem('fbLastInstructor', instructor);

  const LOC_LABELS = { waunakee: 'Waunakee', eastmad: 'East Madison', verona: 'Verona' };
  const emailKey = email.replace(/[.#$[\]/]/g, '_');
  const monthKey = getFeedbackMonthKey();

  const updates = {};

  updates['students/' + emailKey] = { name: s.name, location: s.location || '' };

  updates['feedback/' + emailKey + '/' + monthKey] = {

      statusEl.innerHTML = '<span style="color:#ef4444;">Error: ' + err.message + '</span>';
