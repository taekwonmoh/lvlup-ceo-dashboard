  { id: 'neurodiverse', title: 'Neurodiverse Students', icon: '🌈', desc: 'Practical strategies for ADHD, autism spectrum, and sensory differences.',
    content: [
      { h: 'Neurodiversity Is Common', p: 'Approximately 1 in 5 children has some form of neurodevelopmental difference. In a class of 15, that is likely 3 students. ADHD, autism spectrum, sensory processing differences, and learning disabilities are not rare — they are part of your regular teaching reality. You do not need to be a therapist. You need practical mat-side strategies that help these students thrive. The good news: strategies that help neurodiverse students usually help all students.' },
      { h: 'ADHD on the Mat', p: 'ADHD is not a lack of attention — it is difficulty regulating attention. These students may hyperfocus on something they love and struggle to switch tasks. Strategies: keep instructions short and action-oriented. Use countdowns for transitions: "In 5 seconds we switch. 5, 4, 3, 2, 1, switch." Build in movement between instruction segments — do not make them stand still and listen for 5 minutes. Give them a leadership role (line leader, demo partner) to channel their energy. Avoid punishment-based approaches; they usually backfire with ADHD.' },
      { h: 'Autism Spectrum', p: 'Students on the spectrum often need predictability, clear expectations, and processing time. Post a visual schedule of class structure where they can see it. Warn before transitions: "In 2 minutes we will switch to sparring drills." Be literal — sarcasm and idioms can be confusing. Sensory issues are real: some students cannot tolerate being touched, loud noises, or certain textures. Ask parents what works. Allow modifications like lighter contact or a quieter position in line. Never force eye contact — it can be physically uncomfortable for some students on the spectrum.' },
      { h: 'Sensory Processing', p: 'Some students are sensory seekers (they crash into things, love loud noise, seek deep pressure) and some are sensory avoiders (overwhelmed by noise, light touch, crowded spaces). For seekers: give them heavy work — pushups, pad holding, strong stances. For avoiders: position them at the end of the line, give advance warning before loud kiais, allow them to wear compression clothing under their dobok. A quick parent conversation about sensory preferences can prevent months of struggle.' },
      { h: 'On the Mat Tip', p: 'Create a "first-then" board or verbal routine for students who struggle with transitions. "First we do forms, then we do sparring." This simple structure reduces anxiety because the student knows what comes next. Pair it with a consistent class structure that rarely changes. Predictability is calming for all students, and essential for many neurodiverse learners.' }
    ],
    quiz: [
      { q: 'Approximately what fraction of children have some neurodevelopmental difference?', opts: ['1 in 50', '1 in 20', '1 in 5', '1 in 3'], ans: 2, why: 'About 1 in 5 children has ADHD, autism spectrum, sensory processing differences, or learning disabilities.' },
      { q: 'A student with ADHD cannot stay still during instruction. Best strategy?', opts: ['Give them pushups as consequence', 'Keep instructions short and build movement between segments', 'Remove them from class', 'Seat them at the back of the room'], ans: 1, why: 'Short instructions with movement breaks works with ADHD neurology rather than against it. Punishment typically backfires.' },
      { q: 'Why should you avoid forcing eye contact with a student on the autism spectrum?', opts: ['It is not culturally appropriate', 'It can be physically uncomfortable or even painful for some students on the spectrum', 'They need to watch their feet', 'It is not important in martial arts'], ans: 1, why: 'For some individuals on the autism spectrum, forced eye contact causes genuine physical discomfort and increases anxiety.' },
      { q: 'What is a "sensory seeker" student likely to benefit from?', opts: ['Quiet meditation exercises', 'Heavy work activities like pushups, pad holding, and strong stances', 'Sitting on the sideline to calm down', 'Verbal instructions only'], ans: 1, why: 'Sensory seekers crave deep pressure and physical input. Heavy work activities channel this need productively.' }
    ]
  },
  { id: 'parents', title: 'Parent Communication', icon: '🤝', desc: 'Building parent confidence and handling concerns professionally.',
    content: [
      { h: 'Parents Are Your Partners', p: 'Parents enroll their children in martial arts for many reasons: discipline, confidence, fitness, self-defense, social skills. Your job is to make the invisible visible. Parents cannot see neural pathway development. They can see their child\'s confidence grow if you point it out. Every parent interaction is a retention conversation. A parent who feels informed and valued does not leave. A parent who feels ignored or confused starts looking at other activities.' },
      { h: 'The 30-Second Post-Class Update', p: 'The most powerful retention tool costs nothing and takes 30 seconds. At pickup, find one specific thing to tell a parent about their child: "Aiden tried a spin hook kick for the first time today and did not give up even when he fell. That kind of persistence is going to serve him his whole life." You just gave that parent a story to tell at dinner, evidence that their money is well spent, and a reason to come back tomorrow. Do this for 2-3 different parents per class, rotating through your roster.' },
      { h: 'Handling Concerns', p: 'When a parent has a concern, follow this framework. First, listen completely — do not interrupt or get defensive. Second, validate: "I understand your concern. Thank you for bringing this to me." Third, explain your approach: "Here is what we are working on and why." Fourth, propose next steps: "Let me try this adjustment and let us check in next week." Never dismiss a parent concern, even if it seems minor. To them, it is not minor. If it is beyond your scope, involve your head instructor or Mr./Mrs. Moh.' },
      { h: 'Progress Transparency', p: 'Parents should never be surprised by a testing result — pass or fail. Communicate proactively about where their child stands. Use phrases like "On track for testing," "Needs a few more weeks," or "Ready and strong." If a student is struggling, frame it developmentally: "This is normal for her age group. Here is what we are doing to help and what you can do at home." Give parents homework: "Have her practice her form 3 times this week — she almost has it" turns parents into training partners.' },
      { h: 'On the Mat Tip', p: 'Keep a rotation list by the door or on your phone. Each class, plan to connect with 2-3 parents. After 2-3 weeks, you will have touched every family. This proactive communication prevents 90% of parent complaints because issues are addressed before they fester. It also makes testing discussions much easier because parents already feel in the loop.' }
    ],

      { q: 'What is the most powerful retention tool described in this module?', opts: ['Discounted membership fees', 'The 30-second specific post-class parent update', 'Monthly newsletters', 'Social media posts about students'], ans: 1, why: 'A specific, personal 30-second update gives parents evidence that their investment is worthwhile and creates emotional connection to your program.' },
      { q: 'A parent is upset that their child was not promoted at testing. First step?', opts: ['Explain the testing criteria immediately', 'Listen completely without interrupting or getting defensive', 'Tell them their child was not ready', 'Offer a free retest'], ans: 1, why: 'The first step is always to listen completely. Parents need to feel heard before they can hear your explanation.' },
      { q: 'Should parents ever be surprised by a testing result?', opts: ['Yes, surprises build excitement', 'No, communicate proactively about readiness before testing', 'Only if they pass', 'It depends on the student'], ans: 1, why: 'Proactive communication about testing readiness prevents negative surprises and builds parent trust in your program.' },
      { q: 'How should you frame a struggling student to their parents?', opts: ['"Your child is behind the others"', '"She needs more discipline at home"', '"This is normal for her age group. Here is what we are doing to help"', '"Maybe try a different activity"'], ans: 2, why: 'Developmental framing normalizes the struggle, shows your expertise, and positions you as a partner working with the parent.' }
    ]
  }
];

function devSetModule(idx) { state.devActiveModule = idx; state.devQuizAnswers = {}; state.devQuizSubmitted = false; render(); }
function devBackToMenu() { state.devActiveModule = null; render(); }
function devSelectAnswer(qIdx, aIdx) { if (state.devQuizSubmitted) return; state.devQuizAnswers[qIdx] = aIdx; render(); }
function devSubmitQuiz() {
  const mod = DEV_MODULES[state.devActiveModule];
  if (!mod) return;
  const totalQ = mod.quiz.length;
  const answered = Object.keys(state.devQuizAnswers).length;
  if (answered < totalQ) return alert('Please answer all questions before submitting.');
  state.devQuizSubmitted = true;
  let correct = 0;
  mod.quiz.forEach((q, i) => { if (state.devQuizAnswers[i] === q.ans) correct++; });
  const score = Math.round(correct / totalQ * 100);
  const passed = score >= 80;
  fbSet('development/modules/' + mod.id, { score, passed, completedAt: new Date().toISOString() });
  render();
}
function devRetryQuiz() { state.devQuizAnswers = {}; state.devQuizSubmitted = false; render(); }
function devGenerateCert() {
  const name = prompt('Enter your full name for the certificate:');
  if (!name) return;
  fbSet('development/certificate', { name, date: new Date().toISOString() });
  render();
}

function renderDevelopmentPage() {
  const progress = (state.devCourse && state.devCourse.modules) || {};
  const cert = state.devCourse && state.devCourse.certificate;
  const passedCount = DEV_MODULES.filter(m => progress[m.id] && progress[m.id].passed).length;
  const allPassed = passedCount === DEV_MODULES.length;

  // Module detail view
  if (state.devActiveModule !== null) {
    const mod = DEV_MODULES[state.devActiveModule];
    const modProgress = progress[mod.id] || {};
    let html = '<div class="section">';
    html += '<div style="padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--gray-800)">';
    html += '<button onclick="devBackToMenu()" style="background:none;border:1px solid var(--gray-700);border-radius:8px;color:var(--gray-300);cursor:pointer;padding:6px 14px;font-size:13px">&larr; Back</button>';
    html += '<span style="font-size:28px">' + mod.icon + '</span>';
    html += '<div><div style="font-size:18px;font-weight:700">Module ' + (state.devActiveModule + 1) + ': ' + esc(mod.title) + '</div>';
    html += '<div style="font-size:12px;color:var(--gray-500)">' + esc(mod.desc) + '</div></div>';
    if (modProgress.passed) html += '<span style="margin-left:auto;background:#10b981;color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600">Passed ' + modProgress.score + '%</span>';
    html += '</div>';

    // Content sections
    mod.content.forEach(c => {
      html += '<div style="padding:20px 24px;border-bottom:1px solid var(--gray-800)">';
      html += '<h3 style="margin:0 0 8px;font-size:15px;font-weight:700;color:var(--gray-100)">' + esc(c.h) + '</h3>';
      html += '<p style="margin:0;font-size:14px;line-height:1.7;color:var(--gray-300)">' + esc(c.p) + '</p>';
      html += '</div>';
    });

    // Quiz section
    html += '<div style="padding:20px 24px;background:var(--gray-900);border-top:2px solid var(--blue)">';
    html += '<h3 style="margin:0 0 16px;font-size:16px;font-weight:700;color:var(--gray-100)">📝 Knowledge Check — Score 80% or higher to pass</h3>';

    mod.quiz.forEach((q, qi) => {
      const selected = state.devQuizAnswers[qi];
      const submitted = state.devQuizSubmitted;
      const isCorrect = submitted && selected === q.ans;
      const isWrong = submitted && selected !== undefined && selected !== q.ans;
      html += '<div style="margin-bottom:20px;padding:16px;background:var(--gray-800);border-radius:10px;border-left:3px solid ' + (submitted ? (isCorrect ? '#10b981' : '#ef4444') : 'var(--blue)') + '">';
      html += '<div style="font-weight:600;margin-bottom:10px;font-size:14px;color:var(--gray-100)">' + (qi + 1) + '. ' + esc(q.q) + '</div>';
      q.opts.forEach((opt, oi) => {
        const isSel = selected === oi;
        const isAns = submitted && oi === q.ans;
        let bg = 'var(--gray-900)'; let border = 'var(--gray-700)'; let col = 'var(--gray-300)';
        if (isSel && !submitted) { bg = 'rgba(59,130,246,0.15)'; border = 'var(--blue)'; col = 'var(--gray-100)'; }
        if (submitted && isAns) { bg = 'rgba(16,185,129,0.15)'; border = '#10b981'; col = '#10b981'; }
        if (submitted && isSel && !isAns) { bg = 'rgba(239,68,68,0.15)'; border = '#ef4444'; col = '#ef4444'; }
        html += '<div onclick="devSelectAnswer(' + qi + ',' + oi + ')" style="padding:10px 14px;margin:6px 0;border-radius:8px;border:1px solid ' + border + ';background:' + bg + ';color:' + col + ';cursor:' + (submitted ? 'default' : 'pointer') + ';font-size:13px;transition:all 0.15s">';
        html += (isSel ? '● ' : '○ ') + esc(opt);
        html += '</div>';
      });
      if (submitted) {
        html += '<div style="margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.03);color:var(--gray-400)">' + (isCorrect ? '✅ ' : '❌ ') + esc(q.why) + '</div>';
      }
      html += '</div>';
    });

    if (!state.devQuizSubmitted) {
      html += '<button onclick="devSubmitQuiz()" style="padding:10px 24px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">Submit Answers</button>';
    } else {
      const correct = mod.quiz.filter((q, i) => state.devQuizAnswers[i] === q.ans).length;
      const score = Math.round(correct / mod.quiz.length * 100);
      const passed = score >= 80;
      html += '<div style="padding:16px;border-radius:10px;background:' + (passed ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)') + ';border:1px solid ' + (passed ? '#10b981' : '#ef4444') + ';text-align:center">';
      html += '<div style="font-size:28px;font-weight:800;color:' + (passed ? '#10b981' : '#ef4444') + '">' + score + '%</div>';
      html += '<div style="font-size:14px;color:var(--gray-300);margin:4px 0">' + correct + '/' + mod.quiz.length + ' correct</div>';
      html += passed ? '<div style="font-size:13px;color:#10b981;font-weight:600">✅ Module passed!</div>' : '<div style="margin-top:8px"><button onclick="devRetryQuiz()" style="padding:8px 20px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">Retry Quiz</button></div>';
      html += '</div>';
    }
    html += '</div></div>';
    return html;
  }

  // Landing page
  let html = '';

  // Hero
  html += '<div class="section" style="text-align:center;padding:32px 24px">';
  html += '<div style="font-size:40px;margin-bottom:8px">🥋</div>';
  html += '<h2 style="margin:0 0 4px;font-size:22px;font-weight:800;color:var(--gray-100)">Instructor Development Program</h2>';
  html += '<div style="font-size:14px;color:var(--gray-400);margin-bottom:20px">Child Development & Coaching Excellence for LVLUP and Go Ninja Instructors</div>';
  html += '<div style="display:flex;justify-content:center;gap:24px;margin-bottom:16px">';
  html += '<div><span style="font-size:28px;font-weight:800;color:var(--blue)">' + passedCount + '</span><span style="font-size:28px;color:var(--gray-600)">/' + DEV_MODULES.length + '</span><div style="font-size:11px;color:var(--gray-500)">Modules Passed</div></div>';
  const avgScore = DEV_MODULES.reduce((sum, m) => sum + ((progress[m.id] && progress[m.id].score) || 0), 0) / Math.max(DEV_MODULES.filter(m => progress[m.id] && progress[m.id].score).length, 1);
  html += '<div><span style="font-size:28px;font-weight:800;color:var(--blue)">' + (passedCount > 0 ? Math.round(avgScore) + '%' : '--') + '</span><div style="font-size:11px;color:var(--gray-500)">Avg Score</div></div>';
  html += '</div>';
  // Progress bar
  const pct = Math.round(passedCount / DEV_MODULES.length * 100);
  html += '<div style="max-width:400px;margin:0 auto;background:var(--gray-800);border-radius:10px;height:12px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,var(--blue),#10b981);border-radius:10px;transition:width 0.3s"></div></div>';
  html += '<div style="font-size:12px;color:var(--gray-500);margin-top:6px">' + pct + '% complete</div>';
  html += '</div>';

  // Module cards
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:0 0 20px">';
  DEV_MODULES.forEach((mod, i) => {
    const mp = progress[mod.id] || {};
    const passed = mp.passed;
    const attempted = mp.score !== undefined;
    const borderColor = passed ? '#10b981' : 'var(--gray-800)';
    html += '<div onclick="devSetModule(' + i + ')" style="background:var(--gray-900);border:1px solid ' + borderColor + ';border-radius:12px;padding:20px;cursor:pointer;transition:all 0.15s;position:relative" onmouseover="this.style.borderColor=\'var(--blue)\'" onmouseout="this.style.borderColor=\'' + borderColor + '\'">';
    if (passed) html += '<div style="position:absolute;top:12px;right:12px;background:#10b981;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">PASSED ' + mp.score + '%</div>';
    html += '<div style="font-size:28px;margin-bottom:8px">' + mod.icon + '</div>';
    html += '<div style="font-size:11px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Module ' + (i + 1) + '</div>';
    html += '<div style="font-size:15px;font-weight:700;color:var(--gray-100);margin-bottom:6px">' + esc(mod.title) + '</div>';
    html += '<div style="font-size:12px;color:var(--gray-400);line-height:1.5">' + esc(mod.desc) + '</div>';
    if (attempted && !passed) html += '<div style="margin-top:8px;font-size:11px;color:#ef4444;font-weight:600">Score: ' + mp.score + '% — Retry needed</div>';
    html += '</div>';
  });
  html += '</div>';

  // Certificate section
  html += '<div class="section" style="text-align:center;padding:24px">';
  if (allPassed) {
    if (cert) {
      html += '<div style="border:3px double var(--blue);border-radius:16px;padding:40px 32px;max-width:600px;margin:0 auto;background:linear-gradient(135deg,rgba(65,105,225,0.05),rgba(16,185,129,0.05))">';
      html += '<div style="font-size:48px;margin-bottom:12px">🏆</div>';
      html += '<div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">Certificate of Completion</div>';
      html += '<div style="font-size:22px;font-weight:800;color:var(--gray-100);margin-bottom:4px">' + esc(cert.name) + '</div>';
      html += '<div style="font-size:14px;color:var(--gray-400);margin-bottom:16px">LVLUP / Go Ninja Certified Instructor</div>';
      html += '<div style="font-size:13px;color:var(--gray-400)">Instructor Development Program — Child Development & Coaching Excellence</div>';
      html += '<div style="font-size:12px;color:var(--gray-500);margin-top:8px">Completed: ' + new Date(cert.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '</div>';
      html += '<div style="margin-top:20px"><button onclick="window.print()" style="padding:8px 20px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px">🖨️ Print Certificate</button></div>';
      html += '</div>';
    } else {
      html += '<div style="font-size:36px;margin-bottom:8px">🎉</div>';
      html += '<div style="font-size:16px;font-weight:700;color:var(--gray-100);margin-bottom:8px">All Modules Complete!</div>';
      html += '<div style="font-size:13px;color:var(--gray-400);margin-bottom:16px">Generate your certificate of completion.</div>';
      html += '<button onclick="devGenerateCert()" style="padding:10px 24px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">🏆 Generate Certificate</button>';
    }
  } else {
    html += '<div style="font-size:28px;margin-bottom:8px;opacity:0.4">🏆</div>';
    html += '<div style="font-size:14px;color:var(--gray-500)">Complete all ' + DEV_MODULES.length + ' modules to earn your Certified Instructor certificate</div>';
    html += '<div style="font-size:12px;color:var(--gray-600);margin-top:4px">' + (DEV_MODULES.length - passedCount) + ' module' + (DEV_MODULES.length - passedCount !== 1 ? 's' : '') + ' remaining</div>';
  }
  html += '</div>';

  return html;
}

  db.ref('.info/connected').on('value', snap => updateConnStatus(snap.val()));
  seedIfEmpty();
  listenAll();
    listenTasks();
    listenGoals();
}

init();
</script>
