function isGoNinja(empOrLocId){
  const emp=TASK_EMPLOYEES.find(e=>e.id===empOrLocId);
  if(emp)return emp.loc==='goninjaW'||emp.loc==='goninjaV';
  return empOrLocId==='goninjaW'||empOrLocId==='goninjaV';
}
function getEmpById(empId){return TASK_EMPLOYEES.find(e=>e.id===empId)||TASK_EMPLOYEES[0];}
const FRONTDESK_EMP_IDS = new Set(['sueK','marioS']);
function isFrontDesk(empId){return FRONTDESK_EMP_IDS.has(empId);}
function getDailyTasks(empId){return isGoNinja(empId)?GONINJA_DAILY:isFrontDesk(empId)?FRONTDESK_DAILY:LVLUP_DAILY;}
function getWeeklyRec(empId){return isGoNinja(empId)?GONINJA_WEEKLY_REC:isFrontDesk(empId)?FRONTDESK_WEEKLY:LVLUP_WEEKLY_REC;}
function getMonthlyTasks(empId){return isGoNinja(empId)?GONINJA_MONTHLY:isFrontDesk(empId)?FRONTDESK_MONTHLY:LVLUP_MONTHLY;}
function getCycleTasks(locId){return isGoNinja(locId)?GONINJA_CYCLE:LVLUP_CYCLE;}
function getTaskMonthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function getGoalsFields(locId){return isGoNinja(locId)?GONINJA_GOALS_FIELDS:LVLUP_GOALS_FIELDS;}
function getTaskWeekKey(dateStr){
  const d=new Date(dateStr+'T12:00:00');const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);
  const yr=mon.getFullYear();const oneJan=new Date(yr,0,1);
  const days=Math.floor((mon-oneJan)/86400000);
  const wk=Math.ceil((days+oneJan.getDay()+1)/7);
  return yr+'-W'+String(wk).padStart(2,'0');
}
function getWeekMonday(weekKey){
  const [yr,wStr]=weekKey.split('-W');const year=parseInt(yr),week=parseInt(wStr);
  const jan4=new Date(year,0,4);const jan4dow=jan4.getDay()||7;
  const mon=new Date(jan4);mon.setDate(jan4.getDate()-(jan4dow-1)+(week-1)*7);
  return mon;
}
function getWeekSunday(weekKey){const mon=getWeekMonday(weekKey);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return sun;}
function isWeekLocked(weekKey){
  const sun=getWeekSunday(weekKey);sun.setHours(23,59,59,0);
  return new Date()>sun;
}
function getMonthWeekKeys(year,month){
  // Weeks where Monday falls in the given month (1-indexed)
  const weeks=[];const d=new Date(year,month-1,1);
  const dow=d.getDay()||7;if(dow!==1)d.setDate(d.getDate()+(8-dow));
  while(d.getMonth()===month-1){weeks.push(getTaskWeekKey(d.toISOString().split('T')[0]));d.setDate(d.getDate()+7);}
  return weeks;
}

function empPath(empId){return 'tasks/emp/'+empId;}

    state.tasksData[emp].monthly[monthKey]=snap.val()||{};render();
  });activeListeners.push({ref:monthlyRef,event:'value'});
  [['daily',dateKey],['weekly',weekKey],['monthly',monthKey]].forEach(([section,sKey])=>{

      state.tasksData[emp][key][sKey]=snap.val()||{};render();
    });activeListeners.push({ref:cRef,event:'value'});

  signoffRef.on('value',snap=>{if(!state.tasksData[emp])state.tasksData[emp]={};state.tasksData[emp].weekly_signoff=snap.val()||{};render();});
  activeListeners.push({ref:signoffRef,event:'value'});
}

/*  -  -  L10 Meeting Page  -  -  */
function getL10WeekKey(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
  const mon = new Date(new Date(now).setDate(diff));
  return mon.getFullYear() + '-' + String(mon.getMonth()+1).padStart(2,'0') + '-' + String(mon.getDate()).padStart(2,'0');
}

function getL10WeekLabel(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
  const mon = new Date(new Date(now).setDate(diff));
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[mon.getMonth()] + ' ' + mon.getDate();
}

function setL10Week(offset) { state.l10WeekOffset = offset; render(); }

function getL10Data(weekKey) { return state.l10[weekKey] || {}; }

function updateL10Field(weekKey, section, index, field, value) {
  fbDebounce('l10/' + weekKey + '/' + section + '/' + index + '/' + field, value);
}

function addL10Row(weekKey, section) {
  const data = getL10Data(weekKey);
  const arr = data[section] || [];
  const newIdx = arr.length;
  fbSet('l10/' + weekKey + '/' + section + '/' + newIdx, section === 'todos' ? { who: '', task: '', status: '' } : section === 'issues' ? { priority: '', issue: '' } : { text: '' });
}

function removeL10Row(weekKey, section, index) {
  const data = getL10Data(weekKey);
  const arr = Array.isArray(data[section]) ? [...data[section]] : [];
  arr.splice(index, 1);
  fbSet('l10/' + weekKey + '/' + section, arr.length ? arr : null);
}

function updateL10Note(weekKey, field, value) {
  fbDebounce('l10/' + weekKey + '/' + field, value);
}

function copyL10FromPrevious(weekKey) {
  const prevKey = getL10WeekKey(state.l10WeekOffset - 1);
  const prevData = getL10Data(prevKey);
  if (!prevData || (!prevData.todos && !prevData.issues)) { alert('No previous week data to copy.'); return; }
  const newData = {};
  if (prevData.todos) {
    newData.todos = prevData.todos.map(t => ({ who: t.who || '', task: t.task || '', status: '' }));
  }
  if (prevData.issues) {
    newData.issues = prevData.issues.filter(i => i && i.issue).map(i => ({ priority: i.priority || '', issue: i.issue }));
  }
  fbSet('l10/' + weekKey, newData);
}

  html += '<div style="padding:12px 20px;font-size:13px;color:var(--gray-500)">On Track / Off Track. <a href="#" onclick="event.preventDefault();setSection(\'rocks\')" style="color:var(--blue);font-weight:600">Go to Rocks \u2192</a></div></div>';

  // 4. Customer / Employee Headlines (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">4</span>Customer / Employee Headlines</h3><span class="l10-duration">5 min</span></div>';
  const headlines = Array.isArray(data.headlines) ? data.headlines : [];
  html += '<table class="l10-table"><thead><tr><th>Good / Bad</th><th>Headline</th><th class="del-col"></th></tr></thead><tbody>';
  headlines.forEach((h, i) => {
    if (!h) return;
    html += '<tr><td style="width:100px"><select onchange="updateL10Field(\'' + weekKey + '\',\'headlines\',' + i + ',\'type\',this.value)"><option value="">--</option><option value="good"' + (h.type === 'good' ? ' selected' : '') + '>Good</option><option value="bad"' + (h.type === 'bad' ? ' selected' : '') + '>Bad</option></select></td>';
    html += '<td><input value="' + esc(h.text || '') + '" placeholder="Headline..." onchange="updateL10Field(\'' + weekKey + '\',\'headlines\',' + i + ',\'text\',this.value)" /></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'headlines\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'headlines\')">+ Add Headline</button></div>';

  // 5. To-Do List (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">5</span>To-Do List</h3><span class="l10-duration">5 min</span></div>';
  const todos = Array.isArray(data.todos) ? data.todos : [];
  html += '<table class="l10-table"><thead><tr><th class="who-col">Who</th><th>To-Do</th><th class="status-col">Done / Not Done</th><th class="del-col"></th></tr></thead><tbody>';
  todos.forEach((t, i) => {
    if (!t) return;
    const statusCls = t.status === 'done' ? 'l10-status-done' : t.status === 'notdone' ? 'l10-status-notdone' : '';
    html += '<tr><td class="who-col"><input value="' + esc(t.who || '') + '" placeholder="Name..." onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'who\',this.value)" /></td>';
    html += '<td><input value="' + esc(t.task || '') + '" placeholder="Task description..." onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'task\',this.value)" /></td>';
    html += '<td class="status-col"><select class="' + statusCls + '" onchange="updateL10Field(\'' + weekKey + '\',\'todos\',' + i + ',\'status\',this.value)"><option value="">--</option><option value="done"' + (t.status === 'done' ? ' selected' : '') + '>Done</option><option value="notdone"' + (t.status === 'notdone' ? ' selected' : '') + '>Not Done</option></select></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'todos\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'todos\')">+ Add To-Do</button></div>';

  // 6. Issues List (IDS - 60 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">6</span>Issues List</h3><span class="l10-duration">60 min</span></div>';
  html += '<div style="padding:8px 20px 0;font-size:12px;color:var(--gray-400);font-weight:600">IDS: Identify, Discuss, Solve</div>';
  const issues = Array.isArray(data.issues) ? data.issues : [];
  html += '<table class="l10-table"><thead><tr><th class="priority-col">Priority</th><th>Issue</th><th class="del-col"></th></tr></thead><tbody>';
  issues.forEach((is, i) => {
    if (!is) return;
    html += '<tr><td class="priority-col"><input value="' + esc(is.priority || '') + '" placeholder="#" style="width:50px;text-align:center" onchange="updateL10Field(\'' + weekKey + '\',\'issues\',' + i + ',\'priority\',this.value)" /></td>';
    html += '<td><input value="' + esc(is.issue || '') + '" placeholder="Issue description..." onchange="updateL10Field(\'' + weekKey + '\',\'issues\',' + i + ',\'issue\',this.value)" /></td>';
    html += '<td class="del-col"><button class="l10-del-btn" onclick="removeL10Row(\'' + weekKey + '\',\'issues\',' + i + ')">\u00d7</button></td></tr>';
  });
  html += '</tbody></table>';
  html += '<button class="l10-add-btn" onclick="addL10Row(\'' + weekKey + '\',\'issues\')">+ Add Issue</button></div>';

  // 7. Conclude (5 min)
  html += '<div class="l10-section"><div class="l10-section-header"><h3><span class="l10-num">7</span>Conclude</h3><span class="l10-duration">5 min</span></div>';
  html += '<ul class="l10-conclude-list"><li><strong>Recap To-Do List</strong> \u2014 Review all action items assigned today</li><li><strong>Cascading Messages</strong> \u2014 Communicate out to other team members or community</li></ul>';
  html += '<div style="padding:0 20px 16px"><textarea style="width:100%;min-height:50px;border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Cascading messages and notes..." onchange="updateL10Note(\'' + weekKey + '\',\'conclude\',this.value)">' + esc(data.conclude || '') + '</textarea></div></div>';

  return html;
}

  { id: 'brain', title: "How Kids' Brains Work", icon: '🧠', desc: 'Developmental stages from ages 3-12 and what they mean for your teaching.',
    content: [
      { h: 'Why This Matters', p: 'Every student who walks onto your mat is at a different stage of brain development. Understanding these stages is the difference between an instruction that clicks and one that frustrates. When you teach a 4-year-old the same way you teach a 10-year-old, you are working against their biology.' },
      { h: 'Ages 3-4 (Mini Tigers)', p: 'The prefrontal cortex, which handles planning, impulse control, and following multi-step instructions, is barely online at this age. Attention span averages 8-12 minutes. These students learn primarily through imitation, repetition, and play. They cannot process verbal corrections well. Instead, show them. Use single-step instructions: "Watch me. Now you try." Celebrate effort loudly. Expect wiggles, silliness, and emotional swings — that is neurologically normal.' },

  { id: 'motivation', title: 'Motivation Science', icon: '🔥', desc: 'Intrinsic vs extrinsic motivation, growth mindset, and why belts work.',
    content: [
      { h: 'Two Types of Motivation', p: 'Extrinsic motivation comes from external rewards: belt stripes, trophies, stickers. Intrinsic motivation comes from within: the satisfaction of mastering a kick, the pride of not giving up. Both are useful, but research consistently shows that intrinsic motivation produces longer-lasting engagement. Your job is to use extrinsic rewards as a bridge to build intrinsic drive.' },
      { h: 'The Belt System as Motivation', p: 'Belts work because they provide visible progress markers. But there is a trap: if students only train "to get the next belt," they quit after black belt or during long gaps between tests. Frame belts as recognition of growth, not the goal itself. Say "You earned this because you kept showing up and improving" rather than "Great job getting your yellow belt."' },
      { h: 'Growth Mindset on the Mat', p: 'Stanford researcher Carol Dweck identified two mindsets. Fixed mindset: "I am bad at this." Growth mindset: "I am not good at this yet." One word changes everything. When a student fails a technique, never say "That is wrong." Say "You are getting closer. Try adjusting your chamber." Praise effort, strategy, and persistence — not talent. "You worked so hard on that form" beats "You are so talented" every time.' },
      { h: 'When Rewards Backfire', p: 'Over-rewarding can actually decrease intrinsic motivation. This is called the overjustification effect. If you give a sticker for every single thing, the sticker becomes the reason to try. Then when stickers stop, effort stops. Reserve tangible rewards for genuine milestones. Use verbal acknowledgment, high-fives, and specific praise as your daily currency.' },
      { h: 'On the Mat Tip', p: 'Create a "Struggle of the Week" culture. Pick something hard. Celebrate the students who attempt it most, not just those who get it right. When students see that struggle is valued, they stop being afraid of failure — and that is when real growth happens.' }
    ],
    quiz: [
      { q: 'What is the most effective long-term motivator for students?', opts: ['Stickers and prizes every class', 'Intrinsic motivation from mastery and personal growth', 'Fear of disappointing their parents', 'Competition with other students'], ans: 1, why: 'Research shows intrinsic motivation (mastery, personal growth) produces the most durable engagement over time.' },
      { q: 'What is the "overjustification effect"?', opts: ['Students become over-confident', 'External rewards decrease internal motivation when overused', 'Students justify skipping class', 'Instructors over-explain techniques'], ans: 1, why: 'When external rewards are given too frequently, students begin performing for the reward rather than for personal satisfaction, reducing intrinsic motivation.' },
      { q: 'Which phrase best demonstrates growth mindset coaching?', opts: ['"You are a natural at this!"', '"That was wrong, try again"', '"You are getting closer — try adjusting your chamber"', '"Watch how the other students do it"'], ans: 2, why: 'Growth mindset coaching acknowledges progress, provides specific guidance, and implies improvement is possible.' },
      { q: 'How should belt promotions be framed to build lasting motivation?', opts: ['"You passed the test, congratulations"', '"You earned this because you kept showing up and improving"', '"You are better than the lower belts now"', '"Your parents will be proud"'], ans: 1, why: 'Framing belts as recognition of effort and growth builds intrinsic motivation rather than making the belt itself the goal.' }

  { id: 'communication', title: 'Communication by Age', icon: '🗣️', desc: 'How to deliver instructions that actually land with each age group.',
    content: [
      { h: 'The Communication Gap', p: 'The number one frustration instructors report is "they are not listening." Usually, the issue is not listening — it is comprehension. Your job is to match your communication style to the developmental level standing in front of you. The same instruction delivered three different ways reaches three different age groups.' },
      { h: 'Mini Tigers (Ages 3-4): Show, Do Not Tell', p: 'Use maximum 5 words per instruction. "Hands up. Kick. Good." Demonstrate everything — they learn by watching, not hearing. Get on their physical level (kneel down). Use exaggerated facial expressions and enthusiasm. Repeat the same activity multiple times — repetition is comfort, not boredom, at this age. Use their name constantly. "Sarah, watch me. Sarah, your turn."' },
      { h: 'Tigers (Ages 5-7): Structured Choices', p: 'Use 2-step instructions maximum. "First do this, then do that." Give choices to build ownership: "Do you want to practice your kick or your punch first?" Use visual and verbal together — demonstrate while you explain. Check for understanding: "Show me what I just said." Begin introducing martial arts terminology paired with plain language: "Front stance — that is your strong stance."' },
      { h: 'Taekwondo (Ages 8-12): Why Matters', p: 'This age group wants to understand purpose. "Chamber your knee because it generates more power" is better than "Chamber your knee because I said so." They can handle correction if it is respectful and specific. Use questioning: "What do you think would happen if you pivoted your hip more?" Peer teaching is powerful — have them explain techniques to younger students.' },
      { h: 'On the Mat Tip', p: 'The 3-second rule: after giving an instruction, wait 3 full seconds before repeating or adding more. Most instructors talk too much. Silence gives processing time. Count "one-one-thousand, two-one-thousand, three-one-thousand" in your head. You will be amazed how often students respond when given that space.' }

      { q: 'Why should you explain "why" to 8-12 year old students?', opts: ['Because they will not listen otherwise', 'This age group wants to understand purpose, which deepens learning', 'To fill class time', 'Because their parents expect it'], ans: 1, why: 'Older students are developing abstract reasoning and engage more deeply when they understand the purpose behind a technique.' },
      { q: 'What is the 3-second rule?', opts: ['Students must respond in 3 seconds or get pushups', 'Wait 3 seconds after an instruction before repeating it', 'Repeat every instruction 3 times', 'Give students 3 seconds to line up'], ans: 1, why: 'Waiting 3 seconds gives students processing time. Most instructors repeat too quickly, which actually reduces comprehension.' },
      { q: 'A 6-year-old Tiger is not performing the combination correctly. Best approach?', opts: ['Explain the technique in detail verbally', 'Demonstrate it while giving a 2-step instruction', 'Have them watch a senior student', 'Tell them to practice at home'], ans: 1, why: 'Tigers learn best with combined visual demonstration and short verbal instructions (2 steps max).' }
    ]

  { id: 'emotions', title: 'Managing Big Emotions', icon: '💪', desc: 'Handling meltdowns, anxiety, belt test nerves, and sparring fear.',
    content: [
      { h: 'Emotions Are Not Misbehavior', p: 'When a 4-year-old cries during class, a 7-year-old freezes during sparring, or a 10-year-old melts down after failing a technique, these are not discipline problems. They are nervous system responses. The amygdala — the brain\'s alarm system — has hijacked the thinking brain. In this state, the student literally cannot process instructions, corrections, or reasoning. Your first job is to help them regulate, not educate.' },
      { h: 'The Co-Regulation Approach', p: 'Young children cannot regulate their own emotions yet. They need your calm to find their calm. This is called co-regulation. Lower your voice (do not raise it). Get on their physical level. Use short, calm phrases: "I see you. You are safe. Take a breath with me." Do not say "stop crying" or "you are fine" — these dismiss their experience and delay regulation. A regulated child is ready to learn in 2-3 minutes. A shamed child may not return to class.' },
      { h: 'Belt Test Anxiety', p: 'Testing anxiety is one of the top reasons students quit before testing or leave after failing. Normalize nervousness: "Every black belt you see was nervous at their first test. That feeling means you care." Prepare students with mock testing conditions. Give them a specific physical anchor: "When you feel nervous, take three breaths and feel your feet on the floor." After the test, always acknowledge their courage regardless of outcome: "You stood up and showed what you have been working on. That takes guts."' },
      { h: 'Sparring Fear', p: 'Fear of getting hit is primal and valid. Never shame it. Build exposure gradually: shadow sparring, light touch drills, controlled contact with trusted partners. Give students an out that saves face: "Tap your chest if you need a break" rather than forcing them to say they are scared. Pair anxious students with empathetic partners, not your hardest hitters. Every positive sparring experience builds courage. One bad experience can undo months of progress.' },
      { h: 'On the Mat Tip', p: 'Create a "reset spot" — a specific place on or near the mat where a student can go to take a break without leaving class. It is not a punishment; it is a tool. Teach it proactively: "If you ever feel overwhelmed, go stand on the blue star, take 5 breaths, and come back when you are ready." This gives students agency over their emotions and prevents full meltdowns.' }
    ],
    quiz: [
      { q: 'When a young student is crying during class, what has happened neurologically?', opts: ['They are seeking attention', 'The amygdala has hijacked the thinking brain, preventing rational processing', 'They are not tough enough for martial arts', 'They did not get enough sleep'], ans: 1, why: 'The amygdala triggers a fight-flight-freeze response that literally prevents the prefrontal cortex from processing instructions or reasoning.' },
      { q: 'What is co-regulation?', opts: ['Two students practicing together', 'Using your own calm presence to help a child regulate their emotions', 'Enforcing class rules consistently', 'Having parents intervene during class'], ans: 1, why: 'Children develop emotional regulation by borrowing from a calm adult. Your regulated state helps them find theirs.' },
      { q: 'A student is terrified of sparring. Best approach?', opts: ['Pair them with a strong fighter so they toughen up', 'Remove them from sparring class', 'Build exposure gradually with shadow sparring, light touch drills, and trusted partners', 'Tell them there is nothing to be afraid of'], ans: 2, why: 'Gradual exposure with safety builds courage. One overwhelming experience can undo months of progress.' },
      { q: 'What is the purpose of a "reset spot" in class?', opts: ['Punishment for misbehavior', 'A place where students can self-regulate without leaving class', 'Where students go when they are late', 'A spot for stretching'], ans: 1, why: 'A reset spot gives students agency over their emotions and prevents full meltdowns by providing a proactive coping tool.' }
    ]
  },
  { id: 'coaching', title: 'The Coaching Edge', icon: '⭐', desc: 'Positive reinforcement, corrective feedback, and building confident students.',
    content: [
      { h: 'The 5:1 Ratio', p: 'Research by John Gottman and others shows that healthy relationships thrive at a 5:1 ratio of positive to negative interactions. Apply this to coaching: for every correction, give five acknowledgments. This does not mean giving empty praise. It means actively looking for what students are doing right. "Great chamber on that kick. I see your hands are up. Nice loud kiai." Then: "Now let us work on pivoting that back foot." The correction lands because it is surrounded by safety.' },
      { h: 'Specific Praise vs Generic Praise', p: '"Good job" is the most overused and least effective praise in coaching. It tells the student nothing about what they did well or why it mattered. Switch to specific praise: "Your back kick had perfect balance today" or "I noticed you helped a white belt during free time — that is black belt leadership." Specific praise tells the student what to repeat and shows that you are actually watching them, not just saying words.' },
      { h: 'The Feedback Sandwich', p: 'When delivering corrections, use the sandwich method: positive observation, specific correction, encouraging close. "Your form sequence is getting smoother every week. On your front stance, drive your front knee forward another two inches — it will give you much more stability. Keep up that practice, it is showing." This structure keeps the student open to correction because they do not feel attacked.' },
      { h: 'Correcting Without Crushing', p: 'Never correct a student in front of the class in a way that highlights their failure. Walk over, get close, lower your voice, give the adjustment. Public praise, private correction. If you must address the whole class, make it general: "Everyone check your chamber height" rather than "Tyler, your chamber is too low." Also, never compare students to each other: "Why can she do it and you cannot?" is devastating and teaches nothing.' },
      { h: 'On the Mat Tip', p: 'Start each class by specifically acknowledging one thing you noticed a student improve on since last class. "Marcus, your side kicks have gotten so much sharper." This shows students that their effort is seen between classes, not just during them. Keep a mental or written note of one thing per student to watch for. This single habit will transform your retention.' }
    ],
    quiz: [
      { q: 'What is the recommended ratio of positive to corrective interactions?', opts: ['1:1', '2:1', '5:1', '10:1'], ans: 2, why: 'Research shows a 5:1 ratio of positive to corrective interactions creates an environment where corrections are received openly.' },
      { q: 'Why is "good job" ineffective as praise?', opts: ['It is too informal for martial arts', 'It does not tell the student what they did well or what to repeat', 'It is overused and students do not hear it anymore', 'It should be replaced with a high-five'], ans: 1, why: 'Specific praise tells the student exactly what behavior to repeat and shows you are genuinely paying attention.' },
      { q: 'A student\'s front stance needs correction. Best approach?', opts: ['Call it out in front of the class as a teaching moment', 'Walk over, lower your voice, give the specific adjustment privately', 'Ignore it and hope they self-correct', 'Compare them to a student doing it correctly'], ans: 1, why: 'Public praise, private correction. Walking over and quietly adjusting maintains the student\'s dignity and keeps them open to feedback.' },
      { q: 'What is the feedback sandwich?', opts: ['Positive — correction — positive', 'Correction — praise — correction', 'Instruction — demonstration — practice', 'Warmup — drill — cooldown'], ans: 0, why: 'The sandwich method wraps correction between genuine positive observations, keeping the student open and motivated.' }
    ]
  },
  { id: 'neurodiverse', title: 'Neurodiverse Students', icon: '🌈', desc: 'Practical strategies for ADHD, autism spectrum, and sensory differences.',
    content: [
      { h: 'Neurodiversity Is Common', p: 'Approximately 1 in 5 children has some form of neurodevelopmental difference. In a class of 15, that is likely 3 students. ADHD, autism spectrum, sensory processing differences, and learning disabilities are not rare — they are part of your regular teaching reality. You do not need to be a therapist. You need practical mat-side strategies that help these students thrive. The good news: strategies that help neurodiverse students usually help all students.' },
      { h: 'ADHD on the Mat', p: 'ADHD is not a lack of attention — it is difficulty regulating attention. These students may hyperfocus on something they love and struggle to switch tasks. Strategies: keep instructions short and action-oriented. Use countdowns for transitions: "In 5 seconds we switch. 5, 4, 3, 2, 1, switch." Build in movement between instruction segments — do not make them stand still and listen for 5 minutes. Give them a leadership role (line leader, demo partner) to channel their energy. Avoid punishment-based approaches; they usually backfire with ADHD.' },
      { h: 'Autism Spectrum', p: 'Students on the spectrum often need predictability, clear expectations, and processing time. Post a visual schedule of class structure where they can see it. Warn before transitions: "In 2 minutes we will switch to sparring drills." Be literal — sarcasm and idioms can be confusing. Sensory issues are real: some students cannot tolerate being touched, loud noises, or certain textures. Ask parents what works. Allow modifications like lighter contact or a quieter position in line. Never force eye contact — it can be physically uncomfortable for some students on the spectrum.' },
      { h: 'Sensory Processing', p: 'Some students are sensory seekers (they crash into things, love loud noise, seek deep pressure) and some are sensory avoiders (overwhelmed by noise, light touch, crowded spaces). For seekers: give them heavy work — pushups, pad holding, strong stances. For avoiders: position them at the end of the line, give advance warning before loud kiais, allow them to wear compression clothing under their dobok. A quick parent conversation about sensory preferences can prevent months of struggle.' },
      { h: 'On the Mat Tip', p: 'Create a "first-then" board or verbal routine for students who struggle with transitions. "First we do forms, then we do sparring." This simple structure reduces anxiety because the student knows what comes next. Pair it with a consistent class structure that rarely changes. Predictability is calming for all students, and essential for many neurodiverse learners.' }
    ],
    quiz: [
      { q: 'Approximately what fraction of children have some neurodevelopmental difference?', opts: ['1 in 50', '1 in 20', '1 in 5', '1 in 3'], ans: 2, why: 'About 1 in 5 children has ADHD, autism spectrum, sensory processing differences, or learning disabilities.' },
      { q: 'A student with ADHD cannot stay still during instruction. Best strategy?', opts: ['Give them pushups as consequence', 'Keep instructions short and build movement between segments', 'Remove them from class', 'Seat them at the back of the room'], ans: 1, why: 'Short instructions with movement breaks works with ADHD neurology rather than against it. Punishment typically backfires.' },
      { q: 'Why should you avoid forcing eye contact with a student on the autism spectrum?', opts: ['It is not culturally appropriate', 'It can be physically uncomfortable or even painful for some students on the spectrum', 'They need to watch their feet', 'It is not important in martial arts'], ans: 1, why: 'For some individuals on the autism spectrum, forced eye contact causes genuine physical discomfort and increases anxiety.' },
      { q: 'What is a "sensory seeker" student likely to benefit from?', opts: ['Quiet meditation exercises', 'Heavy work activities like pushups, pad holding, and strong stances', 'Sitting on the sideline to calm down', 'Verbal instructions only'], ans: 1, why: 'Sensory seekers crave deep pressure and physical input. Heavy work activities channel this need productively.' }
    ]
  },
  { id: 'parents', title: 'Parent Communication', icon: '🤝', desc: 'Building parent confidence and handling concerns professionally.',
    content: [
      { h: 'Parents Are Your Partners', p: 'Parents enroll their children in martial arts for many reasons: discipline, confidence, fitness, self-defense, social skills. Your job is to make the invisible visible. Parents cannot see neural pathway development. They can see their child\'s confidence grow if you point it out. Every parent interaction is a retention conversation. A parent who feels informed and valued does not leave. A parent who feels ignored or confused starts looking at other activities.' },
      { h: 'The 30-Second Post-Class Update', p: 'The most powerful retention tool costs nothing and takes 30 seconds. At pickup, find one specific thing to tell a parent about their child: "Aiden tried a spin hook kick for the first time today and did not give up even when he fell. That kind of persistence is going to serve him his whole life." You just gave that parent a story to tell at dinner, evidence that their money is well spent, and a reason to come back tomorrow. Do this for 2-3 different parents per class, rotating through your roster.' },
      { h: 'Handling Concerns', p: 'When a parent has a concern, follow this framework. First, listen completely — do not interrupt or get defensive. Second, validate: "I understand your concern. Thank you for bringing this to me." Third, explain your approach: "Here is what we are working on and why." Fourth, propose next steps: "Let me try this adjustment and let us check in next week." Never dismiss a parent concern, even if it seems minor. To them, it is not minor. If it is beyond your scope, involve your head instructor or Mr./Mrs. Moh.' },

function devSetModule(idx) { state.devActiveModule = idx; state.devQuizAnswers = {}; state.devQuizSubmitted = false; render(); }
function devBackToMenu() { state.devActiveModule = null; render(); }
function devSelectAnswer(qIdx, aIdx) { if (state.devQuizSubmitted) return; state.devQuizAnswers[qIdx] = aIdx; render(); }
function devSubmitQuiz() {
  const mod = DEV_MODULES[state.devActiveModule];
  if (!mod) return;
  const totalQ = mod.quiz.length;
  const answered = Object.keys(state.devQuizAnswers).length;
  if (answered < totalQ) return alert('Please answer all questions before submitting.');
  state.devQuizSubmitted = true;
  let correct = 0;
  mod.quiz.forEach((q, i) => { if (state.devQuizAnswers[i] === q.ans) correct++; });
  const score = Math.round(correct / totalQ * 100);
  const passed = score >= 80;
  fbSet('development/modules/' + mod.id, { score, passed, completedAt: new Date().toISOString() });
  render();
}
function devRetryQuiz() { state.devQuizAnswers = {}; state.devQuizSubmitted = false; render(); }
function devGenerateCert() {
  const name = prompt('Enter your full name for the certificate:');

function seedEMadGoals() {
  // Use full lowercase keys to match the existing format across all locations
  const EMAD_GOALS = {
    january: 18000, february: 18480, march: 18920,
    april: 19140, may: 19580, june: 20020,
    july: 17000, august: 17000, september: 21120,
    october: 21340, november: 35000, december: 24400,
  };
  const ref = fbRef('financials/eastmad/2026');
  ref.once('value', snap => {
    const data = snap.val() || {};
    const updates = {};
    Object.entries(EMAD_GOALS).forEach(([mon, goal]) => {
      if (!data[mon] || !data[mon].goal) {
        updates[mon + '/goal'] = goal;
      }
    });
    // Clean up any short-key duplicates from a previous seed
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(k => {
      if (data[k] && Object.keys(data[k]).length === 1 && data[k].goal) updates[k] = null;
    });
    if (Object.keys(updates).length) ref.update(updates);
  });
}

function getFeedbackMonthKey(offset) {
  const d = new Date();
  d.setMonth(d.getMonth() + (offset !== undefined ? offset : state.feedback.monthOffset));
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getCurrentMonthKey() { return getFeedbackMonthKey(0); }

function getFeedbackMonthLabel() {
  const d = new Date();
  d.setMonth(d.getMonth() + state.feedback.monthOffset);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function feedbackChangeMonth(delta) {
  state.feedback.monthOffset += delta;
  listenFeedbackTracking();
}

function feedbackSetLocationFilter(loc) {

function feedbackToggleInactive() {

function feedbackToggleSelectAll() {
  const sel = state.feedback.selectedStudents || (state.feedback.selectedStudents = new Set());
  const { roster, locationFilter, showInactive } = state.feedback;
  const allStudents = Object.entries(roster).map(([k, v]) => ({ key: k, ...v }));
  const displayed = (locationFilter === 'all' ? allStudents : allStudents.filter(s => s.location === locationFilter))
    .filter(s => (showInactive || s.active !== false) && s.active !== false);
  const allSelected = displayed.every(s => sel.has(s.key));
  displayed.forEach(s => allSelected ? sel.delete(s.key) : sel.add(s.key));
  render();
}

// ── Shared proxy helper ──
async function getReportProxyConfig() {
  const snap = await db.ref('config').once('value').catch(() => ({ val: () => ({}) }));
  const cfg = snap.val() || {};
  let proxyUrl = (cfg.reportProxyUrl || '').trim().replace(/\/$/, '');
  if (!proxyUrl) {
    proxyUrl = prompt('Enter your webhooks server URL to generate reports\n(e.g. https://your-server.com or http://localhost:3001)\n\nThis will be saved for future use:');
    if (!proxyUrl) throw new Error('No proxy URL configured');
    proxyUrl = proxyUrl.trim().replace(/\/$/, '');
    db.ref('config/reportProxyUrl').set(proxyUrl);
  }
  const secret = cfg.webhookSecret || cfg.reportProxySecret || 'lvlup-watchlist-2026';
  return { proxyUrl, secret };
}

async function callReportProxy(studentData, monthLabel) {
  const { proxyUrl, secret } = await getReportProxyConfig();
  const resp = await fetch(proxyUrl + '/generate-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      secret,
      studentName: studentData.name,
      location: studentData.location,
      cycleLabel: monthLabel,
      status: studentData.status || null,
      notes: studentData.notes || '',
      instructorFeedback: studentData.instructorFeedback,
    }),
  });
  if (!resp.ok) {
    const errBody = await resp.json().catch(() => ({}));
    throw new Error(errBody.error || 'Proxy error ' + resp.status);
  }
  const data = await resp.json();
  return data.report;
}

async function feedbackGenerateOneReport(studentKey) {
  const s = state.feedback.roster[studentKey];
  if (!s) return;
  const mk = getFeedbackMonthKey();
  const t = state.feedback.tracking[studentKey] || {};
  const feedback = (t.instructorFeedback || '').trim();
  if (!feedback) { alert('No instructor feedback written for ' + s.name + ' yet.'); return; }

  const btns = document.querySelectorAll('button[onclick*="feedbackGenerateOneReport(\'' + studentKey + '\')"]');
  btns.forEach(b => { b.disabled = true; b.textContent = '⏳'; });

  try {
    const monthLabel = getFeedbackMonthLabel();
    const report = await callReportProxy({ ...s, instructorFeedback: feedback }, monthLabel);
    showReportModal(s.name, monthLabel, report, getReportViewUrl(mk, studentKey), async function(editedReport) {
      await db.ref('studentReports/' + mk + '/' + studentKey).set({
        studentName: s.name, location: s.location, cycleLabel: monthLabel,
        report: editedReport, generatedAt: new Date().toISOString(), instructorFeedback: feedback, status: s.status || null
      });
    });
  } catch(err) {
    alert('Failed to generate report for ' + s.name + ':\n' + err.message);
  } finally {
    btns.forEach(b => { b.disabled = false; b.textContent = '⚡'; });
  }
}

async function feedbackGenerateReports() {
  const mk = getFeedbackMonthKey();
  const monthLabel = getFeedbackMonthLabel();
  const { roster, tracking, locationFilter, selectedStudents } = state.feedback;
  const sel = selectedStudents || new Set();

  const students = Object.entries(roster)
    .filter(([k, s]) => {
      if (s.active === false) return false;
      if (sel.size > 0 && !sel.has(k)) return false;
      if (sel.size === 0 && locationFilter !== 'all' && s.location !== locationFilter) return false;
      return ((tracking[k] || {}).instructorFeedback || '').trim().length > 0;
    })
    .map(([k, s]) => ({ key: k, ...s, instructorFeedback: (tracking[k] || {}).instructorFeedback }));

  if (!students.length) {
    alert('No students have instructor feedback written yet for ' + monthLabel + '.\nWrite feedback first, then generate reports.');
    return;
  }

  const btn = document.querySelector('button[onclick="feedbackGenerateReports()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; }

  let successCount = 0, failCount = 0;
  const failMessages = [];

  const generated = [];
  for (const s of students) {
    try {
      const report = await callReportProxy(s, monthLabel);
      successCount++;
      generated.push({ key: s.key, name: s.name, location: s.location, instructorFeedback: s.instructorFeedback, report });
    } catch(err) {
      console.error('Failed:', s.name, err);
      failCount++;
      failMessages.push(s.name + ': ' + err.message);
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = '⚡ ' + (state.feedback.selectedStudents?.size > 0 ? 'Generate (' + state.feedback.selectedStudents.size + ')' : 'Generate Reports'); }

  if (failCount > 0 && successCount === 0) {
    alert('❌ All reports failed.\n\n' + failMessages.join('\n'));
    return;
  }

  // Show bulk results modal with links
  document.getElementById('reportPreviewModal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'reportPreviewModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.onclick = function(e) { if (e.target === modal) modal.remove(); };

  const rows = generated.map(g =>
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;">' +
      '<span style="font-size:13px;font-weight:600;color:#1a1a2e;">' + esc(g.name) + '</span>' +
      '<div style="display:flex;gap:8px;align-items:center;">' +
        '<span id="savedBadge_' + g.key + '" style="font-size:11px;color:#22c55e;display:none;">✓ Saved</span>' +
        '<button id="viewBtn_' + g.key + '" style="padding:5px 12px;background:#f0f4ff;color:#3730a3;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">✏️ Review & Save</button>' +
        '<a id="linkBtn_' + g.key + '" href="' + esc(getReportViewUrl(mk, g.key)) + '" target="_blank" style="padding:5px 12px;background:#fdf4ff;color:#7c3aed;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:none;">🔗 Link</a>' +
      '</div>' +
    '</div>'
  ).join('');

  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.22);overflow:hidden;">
      <div style="padding:18px 22px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="font-size:15px;font-weight:800;color:#1a1a2e;">⚡ ${successCount} Report${successCount !== 1 ? 's' : ''} Generated</div>
        <button onclick="document.getElementById('reportPreviewModal').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#bbb;padding:0 4px;line-height:1;">✕</button>
      </div>
      <div style="padding:16px 22px;overflow-y:auto;flex:1;">${rows}
        ${failCount ? '<div style="margin-top:14px;padding:10px 14px;background:#fff5f5;border-radius:8px;font-size:12px;color:#c53030;">⚠️ ' + failCount + ' failed: ' + esc(failMessages.join(', ')) + '</div>' : ''}
      </div>
      <div style="padding:14px 22px;border-top:1px solid #f0f0f0;font-size:12px;color:#aaa;flex-shrink:0;">Saved to Firebase · Ready for member portal</div>
    </div>`;

  document.body.appendChild(modal);

  // Wire up Review & Save buttons for each generated report
  generated.forEach(g => {
    const viewBtn = modal.querySelector('#viewBtn_' + g.key);
    if (!viewBtn) return;
    viewBtn.onclick = function() {
      showReportModal(g.name, monthLabel, g.report, getReportViewUrl(mk, g.key), async function(editedReport) {
        await db.ref('studentReports/' + mk + '/' + g.key).set({
          studentName: g.name, location: g.location, cycleLabel: monthLabel,
          report: editedReport, generatedAt: new Date().toISOString(),
          instructorFeedback: g.instructorFeedback, status: null
        });
        // Update bulk list UI to show saved
        const badge = modal.querySelector('#savedBadge_' + g.key);
        const link  = modal.querySelector('#linkBtn_' + g.key);
        if (badge) badge.style.display = 'inline';
        if (link)  link.style.display  = 'inline-block';
        viewBtn.textContent = '✅ Saved';
        viewBtn.style.background = '#f0fdf4';
        viewBtn.style.color = '#166534';
      });
    };
  });
}

function feedbackPublishMonthly(studentKey) {
  const s = state.feedback.roster[studentKey] || {};
  const email = (s.email || '').trim().toLowerCase();
  if (!email) { alert('No parent email on file for this student.'); return; }

  const text = (document.getElementById('fbSendText').value || '').trim();
  const instructor = (document.getElementById('fbSendInstructor').value || '').trim();
  if (!text) { document.getElementById('fbSendStatus').innerHTML = '<span style="color:#ef4444;">Please write a feedback message.</span>'; return; }
  if (!instructor) { document.getElementById('fbSendStatus').innerHTML = '<span style="color:#ef4444;">Please enter your name.</span>'; return; }

  // Cache instructor name for next time
  localStorage.setItem('fbLastInstructor', instructor);

  const LOC_LABELS = { waunakee: 'Waunakee', eastmad: 'East Madison', verona: 'Verona' };
  const emailKey = email.replace(/[.#$[\]/]/g, '_');
  const monthKey = getFeedbackMonthKey();
  const monthLabel = getFeedbackMonthLabel();
  const locLabel = LOC_LABELS[s.location] || s.location || '';

  const statusEl = document.getElementById('fbSendStatus');
  statusEl.innerHTML = '<span style="color:#888;">Publishing…</span>';

  const updates = {};
  // Ensure student record exists for the lookup
  updates['students/' + emailKey] = { name: s.name, location: s.location || '' };
  // Write the monthly feedback card
  updates['feedback/' + emailKey + '/' + monthKey] = {
    monthLabel,
    instructor,
    location: locLabel,
    text,
    publishedAt: Date.now()
  };

  db.ref().update(updates, err => {
    if (err) {
      statusEl.innerHTML = '<span style="color:#ef4444;">Error: ' + err.message + '</span>';
    } else {
      statusEl.innerHTML = '<span style="color:#22c55e;">✓ Published! Student can now view this in the member portal.</span>';
      setTimeout(() => { const m = document.getElementById('fbSendModal'); if (m) m.remove(); }, 1800);
    }
  });
}

function feedbackMarkInactive(studentKey) {
  db.ref('feedbackRoster/' + studentKey + '/active').set(false);
  db.ref('feedbackRoster/' + studentKey + '/inactiveSince').set(getCurrentMonthKey());
}

function feedbackMarkActive(studentKey) {
  db.ref('feedbackRoster/' + studentKey + '/active').set(true);
  db.ref('feedbackRoster/' + studentKey + '/inactiveSince').remove();
}

function feedbackDeleteStudent(studentKey) {
  if (!confirm('Permanently remove this student? Their interaction history will be kept but the student will no longer appear in any view.')) return;
  db.ref('feedbackRoster/' + studentKey).remove();
}

function looksLikeName(str) {
  if (!str) return false;

  // Strip surrounding quotes and whitespace
  str = str.replace(/^["'\s]+|["'\s]+$/g, '').trim();
  if (!str || str.length < 3 || str.length > 45) return false;

  const lower = str.toLowerCase();

  // Reject dates (MM/DD/YYYY or MM-DD-YYYY)
  if (/\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(str)) return false;

  // Reject phone numbers (7+ consecutive digits)
  if (/\d{7,}/.test(str)) return false;

  // Reject anything with brackets, parentheses, or curly braces
  if (/[\[\]{}\(\)]/.test(str)) return false;

  // Reject belt/program descriptions (contain " - " or " / ")
  if (str.includes(' - ') || str.includes(' / ')) return false;

  // Reject strings starting with a digit
  if (/^\d/.test(str)) return false;

  // Reject sentence punctuation (notes, messages)
  if (/[.!?,;:@#]/.test(str)) return false;

  // Reject time references
  if (/\b(AM|PM|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/.test(str)) return false;

  // Reject known non-name lead sources and status words
  const skipPrefixes = [
    'active ','active\t','tiger ','legacy','level ',
    'white -','yellow -','orange -','green -','blue -','purple -',
    'red -','black -','camo -','red / black',
    '1st ','2nd ','3rd ','4th ','5th ','6th ','7th ','8th ','9th ',
    'we\'d love','please','thanks','after ','and we ','but after',
    'or we ','jan ','feb ','mar ','apr ','jun ','jul ','aug ','sep ',
    'oct ','nov ','dec ','ara the',
  ];
  if (skipPrefixes.some(p => lower.startsWith(p))) return false;

  // Reject single words (need at least first + last name)
  const words = str.split(/\s+/).filter(Boolean);
  if (words.length < 2 || words.length > 4) return false;

  // Reject standalone status/source words that slip past prefix check
  const blockedWords = new Set([
    'active','referral','referrals','website','other','event','school',
    'google','search','engine','maps','decided','recommended',
  ]);
  if (words.length === 2 && words.some(w => blockedWords.has(w.toLowerCase()))) return false;

  // Each word must look like a name component:
  // letters, apostrophes, hyphens; optionally wrapped in quotes (nicknames)
  const validWord = w => /^"?[A-Za-zÀ-ÖØ-öø-ÿ][A-Za-zÀ-ÖØ-öø-ÿ'\-]*"?$/.test(w);
  return words.every(validWord);
}

function feedbackSyncPreview() {
  const raw = (document.getElementById('fbSyncText') || {}).value || '';
  const loc = (document.getElementById('fbSyncLoc') || {}).value;
  const previewEl = document.getElementById('fbSyncPreview');
  const confirmBtn = document.getElementById('fbSyncConfirmBtn');
  if (!previewEl || !confirmBtn) return;

  const names = raw.split('\n').map(l => l.trim()).filter(looksLikeName);
  if (!names.length) {
    previewEl.innerHTML = '';
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.5';
    return;
  }

  const normalizedNew = new Set(names.map(n => n.toLowerCase()));
  const existing = Object.entries(state.feedback.roster)
    .filter(([, v]) => v.location === loc)
    .map(([k, v]) => ({ key: k, ...v }));

  const existingActive   = existing.filter(s => s.active !== false);
  const existingInactive = existing.filter(s => s.active === false);

  const toAdd        = names.filter(n => !existingActive.find(s => s.name.toLowerCase() === n.toLowerCase()) && !existingInactive.find(s => s.name.toLowerCase() === n.toLowerCase()));
  const toReactivate = existingInactive.filter(s => normalizedNew.has(s.name.toLowerCase()));
  const toDeactivate = existingActive.filter(s => !normalizedNew.has(s.name.toLowerCase()));
  const unchanged    = existingActive.filter(s => normalizedNew.has(s.name.toLowerCase()));

  let html = '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;font-size:13px;">';
  html += '<div style="font-weight:700;color:#1a1a2e;margin-bottom:10px;">Preview</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';

  const stat = (count, label, color, icon) =>
    '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border-radius:8px;border:1px solid #e8eaf0;">' +
    '<span style="font-size:16px;">' + icon + '</span>' +
    '<div><div style="font-size:16px;font-weight:800;color:' + color + ';">' + count + '</div><div style="font-size:11px;color:#888;font-weight:600;">' + label + '</div></div></div>';

  html += stat(unchanged.length, 'No change', '#94a3b8', '✅');
  html += stat(toAdd.length, 'New students', '#22c55e', '➕');
  html += stat(toReactivate.length, 'Reactivated', '#3b82f6', '🔄');
  html += stat(toDeactivate.length, 'Mark inactive', '#f59e0b', '⏸');
  html += '</div>';

  if (toDeactivate.length) {
    html += '<div style="margin-top:10px;padding:8px 10px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;">';
    html += '<strong>Will be marked inactive:</strong> ' + toDeactivate.map(s => s.name).join(', ');
    html += '</div>';
  }

  html += '</div>';
  previewEl.innerHTML = html;
  confirmBtn.disabled = false;
  confirmBtn.style.opacity = '1';
}

function feedbackSyncConfirm() {
  const raw = document.getElementById('fbSyncText').value;
  const loc = document.getElementById('fbSyncLoc').value;
  const names = raw.split('\n').map(l => l.trim()).filter(looksLikeName);
  if (!names.length) return;

  const normalizedNew = new Set(names.map(n => n.toLowerCase()));
  const existing = Object.entries(state.feedback.roster)
    .filter(([, v]) => v.location === loc)
    .map(([k, v]) => ({ key: k, ...v }));

  const existingActive   = existing.filter(s => s.active !== false);
  const existingInactive = existing.filter(s => s.active === false);
  const allExistingNames = new Set(existing.map(s => s.name.toLowerCase()));

  const updates = {};
  const mk = getCurrentMonthKey();

  // Mark missing active students as inactive
  existingActive.forEach(s => {
    if (!normalizedNew.has(s.name.toLowerCase())) {
      updates['feedbackRoster/' + s.key + '/active'] = false;
      updates['feedbackRoster/' + s.key + '/inactiveSince'] = mk;
    }
  });

  // Reactivate students returning from inactive
  existingInactive.forEach(s => {
    if (normalizedNew.has(s.name.toLowerCase())) {
      updates['feedbackRoster/' + s.key + '/active'] = true;
      updates['feedbackRoster/' + s.key + '/inactiveSince'] = null;
    }
  });

  // Add brand-new students
  names.forEach(name => {
    if (!allExistingNames.has(name.toLowerCase())) {
      const key = 'student_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      updates['feedbackRoster/' + key] = { name, location: loc, active: true, addedDate: mk };
    }
  });

  // Record sync timestamp for this location
  updates['feedbackRosterMeta/' + loc + '/lastSyncedMonth'] = mk;
  updates['feedbackRosterMeta/' + loc + '/lastSyncedAt'] = Date.now();

  db.ref().update(updates, err => {
    if (!err) {
      document.getElementById('fbSyncModal').remove();
    } else {
      alert('Error syncing: ' + err.message);
    }
  });
}

function feedbackAddStudent() {
  const nameEl = document.getElementById('fbNewName');
  const locEl  = document.getElementById('fbNewLoc');
  const name   = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const mk = getCurrentMonthKey();
  const key = 'student_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  db.ref('feedbackRoster/' + key).set({ name, location: locEl.value, active: true, addedDate: mk });
  nameEl.value = '';
}

function renderFeedbackPage() {
  const { roster, tracking, rosterMeta, locationFilter, showInactive } = state.feedback;
  const monthLabel   = getFeedbackMonthLabel();
  const currentMonth = getCurrentMonthKey();
  const isCurrentMonth = getFeedbackMonthKey() === currentMonth;

  const LOC_LABELS = { waunakee: 'Waunakee', eastmad: 'East Madison', verona: 'Verona' };
  const INTERACTIONS = [
    { field: 'postcard',   icon: '📬', label: 'Postcard' },
    { field: 'video',      icon: '🎥', label: 'Video' },
    { field: 'phoneCall',  icon: '📞', label: 'Call' },
    { field: 'conference', icon: '🤝', label: 'Conf.' },
  ];

  // ── Staleness banners (only for current month view) ──
  let stalenessHTML = '';
  if (isCurrentMonth) {
    ['waunakee', 'eastmad', 'verona'].forEach(loc => {
      const meta = rosterMeta[loc] || {};
      const synced = meta.lastSyncedMonth === currentMonth;
      if (!synced) {
        stalenessHTML +=
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:10px;">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
          '<span style="font-size:18px;">📋</span>' +
          '<div><div style="font-size:13px;font-weight:700;color:#92400e;">' + LOC_LABELS[loc] + ' roster not synced for ' + monthLabel + '</div>' +
          '<div style="font-size:12px;color:#b45309;">' + (meta.lastSyncedMonth ? 'Last synced: ' + meta.lastSyncedMonth : 'Never synced') + '</div></div>' +
          '</div>' +
          '<button onclick="feedbackOpenSync(\'' + loc + '\')" style="white-space:nowrap;padding:7px 14px;background:#f59e0b;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">Sync Now →</button>' +
          '</div>';
      }
    });
  }

  // ── Build student list ──
  const allStudents = Object.entries(roster).map(([k, v]) => ({ key: k, ...v }))
    .sort((a, b) => a.name.localeCompare(b.name));
  const byFilter = locationFilter === 'all' ? allStudents : allStudents.filter(s => s.location === locationFilter);
  const activeStudents   = byFilter.filter(s => s.active !== false);
  const inactiveStudents = byFilter.filter(s => s.active === false);
  const displayed = showInactive ? byFilter : activeStudents;

  // ── Stats (active only) ──
  const total = activeStudents.length;
  const counts = {};
  INTERACTIONS.forEach(i => { counts[i.field] = activeStudents.filter(s => (tracking[s.key] || {})[i.field]).length; });
  const contacted = activeStudents.filter(s => { const t = tracking[s.key] || {}; return INTERACTIONS.some(i => t[i.field]); }).length;
  const statusCounts = {
    red:    activeStudents.filter(s => s.status === 'red').length,
    yellow: activeStudents.filter(s => s.status === 'yellow').length,
    green:  activeStudents.filter(s => s.status === 'green').length,
  };
  const feedbackCount = activeStudents.filter(s => !!(((tracking[s.key] || {}).instructorFeedback || '').trim())).length;

  // ── Selection state ──
  const sel = state.feedback.selectedStudents || (state.feedback.selectedStudents = new Set());
  const visibleActiveKeys = displayed.filter(s => s.active !== false).map(s => s.key);
  const allSelected = visibleActiveKeys.length > 0 && visibleActiveKeys.every(k => sel.has(k));
  const selectedCount = visibleActiveKeys.filter(k => sel.has(k)).length;

  // ── Helpers ──
  const pill = (id, label) => {
    const active = locationFilter === id;
    return '<button onclick="feedbackSetLocationFilter(\'' + id + '\')" style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:' + (active ? '#4169E1' : '#f1f3f9') + ';color:' + (active ? '#fff' : '#555') + ';">' + label + '</button>';
  };

  const chk = (studentKey, field, checked, disabled) =>
    '<td style="text-align:center;padding:10px 4px;">' +
    '<input type="checkbox" ' + (checked ? 'checked' : '') + (disabled ? ' disabled' : '') + ' onchange="feedbackToggle(\'' + studentKey + '\',\'' + field + '\')" style="width:17px;height:17px;cursor:' + (disabled ? 'default' : 'pointer') + ';accent-color:#4169E1;opacity:' + (disabled ? '0.3' : '1') + ';">' +
    '</td>';

  const STATUS_ORDER = { red: 0, yellow: 1, '': 2, null: 2, undefined: 2, green: 3 };
  const statusDot = (studentKey, currentStatus, disabled) => {
    const dots = [
      { val: 'red',    color: '#ef4444', label: 'At risk / quitting' },
      { val: 'yellow', color: '#f59e0b', label: 'Unsure / watch' },
      { val: 'green',  color: '#22c55e', label: 'Highly engaged' },
    ];
    return '<td style="text-align:center;padding:8px 6px;white-space:nowrap;">' +
      dots.map(d => {
        const active = currentStatus === d.val;
        return '<button onclick="' + (disabled ? '' : 'feedbackSetStatus(\'' + studentKey + '\',\'' + d.val + '\')') + '" title="' + d.label + '" style="width:14px;height:14px;border-radius:50%;border:2px solid ' + d.color + ';background:' + (active ? d.color : 'transparent') + ';cursor:' + (disabled ? 'default' : 'pointer') + ';margin:0 2px;padding:0;display:inline-block;vertical-align:middle;opacity:' + (disabled ? '0.25' : '1') + ';transition:background 0.15s;"></button>';
      }).join('') +
    '</td>';
  };

  // ── Rows ──
  let rows = '';
  if (!displayed.length) {
    rows = '<tr><td colspan="11" style="text-align:center;padding:36px;color:#999;font-size:13px;">' +
      (Object.keys(roster).length === 0 ? 'No students yet — sync a roster to get started.' : 'No students to display.') +
      '</td></tr>';
  } else {
    const byLoc = { waunakee: [], eastmad: [], verona: [], '': [] };
    displayed.forEach(s => (byLoc[s.location] || byLoc['']).push(s));

    const sortByStatus = (a, b) => {
      const ao = STATUS_ORDER[a.status] !== undefined ? STATUS_ORDER[a.status] : 2;
      const bo = STATUS_ORDER[b.status] !== undefined ? STATUS_ORDER[b.status] : 2;
      return ao !== bo ? ao - bo : a.name.localeCompare(b.name);
    };

    ['waunakee', 'eastmad', 'verona', ''].forEach(loc => {
      const group = byLoc[loc];
      if (!group || !group.length) return;
      group.sort(sortByStatus);
      if (locationFilter === 'all') {
        const activeCount = group.filter(s => s.active !== false).length;
        const redCount    = group.filter(s => s.active !== false && s.status === 'red').length;
        rows += '<tr><td colspan="11" style="padding:8px 12px;background:#f5f7ff;font-size:11px;font-weight:700;color:#4169E1;text-transform:uppercase;letter-spacing:0.5px;">' +
          (LOC_LABELS[loc] || 'Unknown') + ' — ' + activeCount + ' active' +
          (redCount ? ' · <span style="color:#ef4444;">⚠ ' + redCount + ' at risk</span>' : '') +
          (showInactive && group.length > activeCount ? ' · ' + (group.length - activeCount) + ' inactive' : '') +
          '</td></tr>';
      }
      group.forEach(s => {
        const t = tracking[s.key] || {};
        const isInactive = s.active === false;
        const status = s.status || null;
        const rowBg = isInactive ? '#fafafa'
          : status === 'red'    ? '#fff5f5'
          : status === 'yellow' ? '#fffbeb'
          : status === 'green'  ? '#f0fdf4'
          : '#fff';
        const nameStyle = isInactive ? 'color:#bbb;text-decoration:line-through;' : 'color:#1a1a2e;font-weight:600;';
        const hasNotes = !!(s.notes && s.notes.trim());
        const isSelected = sel.has(s.key);
        rows += '<tr style="background:' + (isSelected && !isInactive ? 'rgba(124,58,237,0.06)' : rowBg) + ';outline:' + (isSelected && !isInactive ? '1px solid rgba(124,58,237,0.2)' : 'none') + ';">' +
          '<td style="text-align:center;padding:10px 4px;">' +
            '<input type="checkbox" ' + (isSelected ? 'checked' : '') + (isInactive ? ' disabled' : '') + ' onchange="feedbackToggleSelect(\'' + s.key + '\')" style="width:15px;height:15px;accent-color:#7c3aed;cursor:' + (isInactive ? 'default' : 'pointer') + ';opacity:' + (isInactive ? '0.2' : '1') + ';">' +
          '</td>' +
          statusDot(s.key, status, isInactive) +
          '<td style="padding:10px 10px;font-size:13px;cursor:pointer;" onclick="feedbackOpenNoteModal(\'' + s.key + '\')" title="' + (hasNotes ? 'View/edit notes' : 'Add notes') + '">' +
            '<span style="' + nameStyle + '">' + s.name + '</span>' +
            (isInactive ? ' <span style="font-size:10px;color:#bbb;font-weight:400;">inactive</span>' : '') +
            (hasNotes ? ' <span title="Has notes" style="display:inline-block;width:7px;height:7px;background:#4169E1;border-radius:50%;margin-left:5px;vertical-align:middle;flex-shrink:0;"></span>' : '') +
          '</td>' +
          (locationFilter === 'all' ? '<td style="padding:10px 10px;font-size:12px;color:#aaa;">' + (LOC_LABELS[s.location] || '—') + '</td>' : '') +
          INTERACTIONS.map(i => chk(s.key, i.field, !!t[i.field], isInactive)).join('') +
          (function() {
            const hasFeedback = !!(t.instructorFeedback && t.instructorFeedback.trim());
            return '<td style="text-align:center;padding:10px 4px;white-space:nowrap;">' +
              '<button onclick="' + (isInactive ? '' : 'feedbackOpenCycleFeedbackModal(\'' + s.key + '\')') + '" ' +
              'title="' + (hasFeedback ? 'Edit cycle feedback' : 'Add cycle feedback') + '" ' +
              'style="background:none;border:none;cursor:' + (isInactive ? 'default' : 'pointer') + ';font-size:16px;opacity:' + (isInactive ? '0.2' : '1') + ';padding:2px 3px;">' +
              (hasFeedback ? '✅' : '✏️') +
              '</button>' +
              (hasFeedback && !isInactive
                ? '<button onclick="feedbackGenerateOneReport(\'' + s.key + '\')" title="Generate progress report for ' + s.name + '" style="background:none;border:none;cursor:pointer;font-size:13px;padding:2px 3px;opacity:0.6;" onmouseover="this.style.opacity=\'1\'" onmouseout="this.style.opacity=\'0.6\'">⚡</button>'
                : '') +
              '</td>';
          })() +
          '<td style="padding:10px 6px;text-align:center;white-space:nowrap;">' +
            '<button onclick="feedbackOpenSendModal(\'' + s.key + '\')" title="Send monthly feedback to member portal" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.opacity=\'0.7\'" onmouseout="this.style.opacity=\'1\'">📨</button>' +
            (isInactive
              ? '<button onclick="feedbackMarkActive(\'' + s.key + '\')" title="Reactivate" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 5px;border-radius:4px;font-weight:700;" onmouseover="this.style.color=\'#22c55e\'" onmouseout="this.style.color=\'#ccc\'">↩</button>'
              : '<button onclick="feedbackMarkInactive(\'' + s.key + '\')" title="Mark inactive" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.color=\'#f59e0b\'" onmouseout="this.style.color=\'#ccc\'">⏸</button>') +
            '<button onclick="feedbackDeleteStudent(\'' + s.key + '\')" title="Delete student" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#ccc\'">🗑</button>' +
          '</td>' +
          '</tr>';
      });
    });
  }

  return '<div class="page" style="max-width:920px;">' +

    // ── Header ──
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">' +
      '<div>' +
        '<h2 style="margin:0 0 2px;font-size:18px;font-weight:800;color:#1a1a2e;">Students</h2>' +
        '<p style="margin:0;font-size:13px;color:#888;">Roster, engagement status, monthly outreach tracking, and notes.</p>' +
      '</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<button onclick="feedbackOpenSync()" style="padding:9px 18px;background:#4169E1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">🔄 Sync Roster</button>' +
        '<button onclick="feedbackGenerateReports()" style="padding:9px 18px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">⚡ ' + (selectedCount > 0 ? 'Generate (' + selectedCount + ')' : 'Generate Reports') + '</button>' +
      '</div>' +
    '</div>' +

    // ── Staleness banners ──
    stalenessHTML +

    // ── Month navigator + location filters ──
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">' +
      '<div style="display:flex;align-items:center;gap:6px;background:#f1f3f9;border-radius:10px;padding:3px;">' +
        '<button onclick="feedbackChangeMonth(-1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 10px;border-radius:7px;color:#4169E1;font-weight:700;">‹</button>' +
        '<span style="font-size:14px;font-weight:700;color:#1a1a2e;min-width:140px;text-align:center;">' + monthLabel + '</span>' +
        '<button onclick="feedbackChangeMonth(1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 10px;border-radius:7px;color:#4169E1;font-weight:700;">›</button>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
        pill('all','All') + pill('waunakee','Waunakee') + pill('eastmad','East Madison') + pill('verona','Verona') +
      '</div>' +
    '</div>' +

    // ── Stats ──
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px;">' +
      '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:#1a1a2e;">' + total + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">Active</div>' +
      '</div>' +
      '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (contacted > 0 ? '#22c55e' : '#ccc') + ';">' + contacted + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">Contacted</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.red > 0 ? '#fff5f5' : '#fff') + ';border:1px solid ' + (statusCounts.red > 0 ? '#fecaca' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.red > 0 ? '#ef4444' : '#ccc') + ';">' + statusCounts.red + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🔴 At Risk</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.yellow > 0 ? '#fffbeb' : '#fff') + ';border:1px solid ' + (statusCounts.yellow > 0 ? '#fde68a' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.yellow > 0 ? '#f59e0b' : '#ccc') + ';">' + statusCounts.yellow + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🟡 Watch</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.green > 0 ? '#f0fdf4' : '#fff') + ';border:1px solid ' + (statusCounts.green > 0 ? '#bbf7d0' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.green > 0 ? '#22c55e' : '#ccc') + ';">' + statusCounts.green + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🟢 Engaged</div>' +
      '</div>' +
      INTERACTIONS.map(i =>
        '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
          '<div style="font-size:15px;margin-bottom:2px;">' + i.icon + '</div>' +
          '<div style="font-size:18px;font-weight:800;color:' + (counts[i.field] > 0 ? '#4169E1' : '#ccc') + ';">' + counts[i.field] + '</div>' +
          '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">' + i.label + '</div>' +
        '</div>'
      ).join('') +
      '<div style="background:' + (feedbackCount === total && total > 0 ? '#f0fdf4' : '#fff') + ';border:1px solid ' + (feedbackCount === total && total > 0 ? '#bbf7d0' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (feedbackCount > 0 ? '#4169E1' : '#ccc') + ';">' + feedbackCount + '<span style="font-size:13px;color:#aaa;font-weight:400;">/' + total + '</span></div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">💬 Feedback</div>' +
      '</div>' +
    '</div>' +

    // ── Quick-add + inactive toggle ──
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
      '<input id="fbNewName" placeholder="Add student manually…" style="flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;" onkeydown="if(event.key===\'Enter\')feedbackAddStudent()">' +
      '<select id="fbNewLoc" style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;">' +
        '<option value="waunakee">Waunakee</option><option value="eastmad">East Madison</option><option value="verona">Verona</option>' +
      '</select>' +
      '<button onclick="feedbackAddStudent()" style="padding:8px 14px;background:#f1f3f9;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#4169E1;">+ Add</button>' +
      (inactiveStudents.length > 0 ?
        '<button onclick="feedbackToggleInactive()" style="padding:8px 14px;background:' + (showInactive ? '#fde68a' : '#f1f3f9') + ';border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#555;margin-left:auto;">' +
        (showInactive ? '👁 Hide inactive' : '👁 Show ' + inactiveStudents.length + ' inactive') + '</button>'
      : '') +
    '</div>' +

    // ── Table ──
    '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:12px;">' +
      '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
        '<thead><tr style="background:#f5f7ff;">' +
          // Sticky styles on each th so they float as user scrolls
          '<th style="padding:10px 6px;text-align:center;width:36px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;">' +
            '<input type="checkbox" ' + (allSelected ? 'checked' : '') + ' onchange="feedbackToggleSelectAll()" style="width:15px;height:15px;accent-color:#7c3aed;cursor:pointer;" title="Select all"></th>' +
          '<th style="padding:10px 8px;text-align:center;font-size:11px;font-weight:700;color:#4169E1;text-transform:uppercase;letter-spacing:0.4px;width:60px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;">Status</th>' +
          '<th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:700;color:#4169E1;text-transform:uppercase;letter-spacing:0.4px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;">Name</th>' +
          (locationFilter === 'all' ? '<th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:700;color:#4169E1;text-transform:uppercase;letter-spacing:0.4px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;">Location</th>' : '') +
          INTERACTIONS.map(i => '<th style="padding:10px 6px;text-align:center;font-size:17px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;" title="' + i.label + '">' + i.icon + '</th>').join('') +
          '<th style="padding:10px 6px;text-align:center;font-size:17px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;" title="Instructor Feedback">💬</th>' +
          '<th style="width:80px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;"></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +

    '<p style="font-size:12px;color:#aaa;margin-top:12px;text-align:center;">Interactions save automatically · Roster persists across months · Historical data is never deleted on sync</p>' +

  '</div>';
}

init();
</script>
</body>
</html>
