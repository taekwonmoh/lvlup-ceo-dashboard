function looksLikeName(str) {
  if (!str) return false;

  // Strip surrounding quotes and whitespace
  str = str.replace(/^["'\s]+|["'\s]+$/g, '').trim();
  if (!str || str.length < 3 || str.length > 45) return false;

  const lower = str.toLowerCase();

  // Reject dates (MM/DD/YYYY or MM-DD-YYYY)
  if (/\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(str)) return false;

  // Reject phone numbers (7+ consecutive digits)
  if (/\d{7,}/.test(str)) return false;

  // Reject anything with brackets, parentheses, or curly braces
  if (/[\[\]{}\(\)]/.test(str)) return false;

  // Reject belt/program descriptions (contain " - " or " / ")
  if (str.includes(' - ') || str.includes(' / ')) return false;

  // Reject strings starting with a digit
  if (/^\d/.test(str)) return false;

  // Reject sentence punctuation (notes, messages)
  if (/[.!?,;:@#]/.test(str)) return false;

  // Reject time references
  if (/\b(AM|PM|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/.test(str)) return false;

  // Reject known non-name lead sources and status words
  const skipPrefixes = [
    'active ','active\t','tiger ','legacy','level ',
    'white -','yellow -','orange -','green -','blue -','purple -',
    'red -','black -','camo -','red / black',
    '1st ','2nd ','3rd ','4th ','5th ','6th ','7th ','8th ','9th ',
    'we\'d love','please','thanks','after ','and we ','but after',
    'or we ','jan ','feb ','mar ','apr ','jun ','jul ','aug ','sep ',
    'oct ','nov ','dec ','ara the',
  ];
  if (skipPrefixes.some(p => lower.startsWith(p))) return false;

  // Reject single words (need at least first + last name)
  const words = str.split(/\s+/).filter(Boolean);
  if (words.length < 2 || words.length > 4) return false;

  // Reject standalone status/source words that slip past prefix check
  const blockedWords = new Set([
    'active','referral','referrals','website','other','event','school',
    'google','search','engine','maps','decided','recommended',
  ]);
  if (words.length === 2 && words.some(w => blockedWords.has(w.toLowerCase()))) return false;

  // Each word must look like a name component:
  // letters, apostrophes, hyphens; optionally wrapped in quotes (nicknames)
  const validWord = w => /^"?[A-Za-zÀ-ÖØ-öø-ÿ][A-Za-zÀ-ÖØ-öø-ÿ'\-]*"?$/.test(w);
  return words.every(validWord);
}

function feedbackSyncPreview() {
  const raw = (document.getElementById('fbSyncText') || {}).value || '';
  const loc = (document.getElementById('fbSyncLoc') || {}).value;
  const previewEl = document.getElementById('fbSyncPreview');
  const confirmBtn = document.getElementById('fbSyncConfirmBtn');
  if (!previewEl || !confirmBtn) return;

  const names = raw.split('\n').map(l => l.trim()).filter(looksLikeName);
  if (!names.length) {
    previewEl.innerHTML = '';
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.5';
    return;
  }

  const normalizedNew = new Set(names.map(n => n.toLowerCase()));
  const existing = Object.entries(state.feedback.roster)
    .filter(([, v]) => v.location === loc)
    .map(([k, v]) => ({ key: k, ...v }));

  const existingActive   = existing.filter(s => s.active !== false);
  const existingInactive = existing.filter(s => s.active === false);

  const toAdd        = names.filter(n => !existingActive.find(s => s.name.toLowerCase() === n.toLowerCase()) && !existingInactive.find(s => s.name.toLowerCase() === n.toLowerCase()));
  const toReactivate = existingInactive.filter(s => normalizedNew.has(s.name.toLowerCase()));
  const toDeactivate = existingActive.filter(s => !normalizedNew.has(s.name.toLowerCase()));
  const unchanged    = existingActive.filter(s => normalizedNew.has(s.name.toLowerCase()));

  let html = '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;font-size:13px;">';
  html += '<div style="font-weight:700;color:#1a1a2e;margin-bottom:10px;">Preview</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';

  const stat = (count, label, color, icon) =>
    '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border-radius:8px;border:1px solid #e8eaf0;">' +
    '<span style="font-size:16px;">' + icon + '</span>' +
    '<div><div style="font-size:16px;font-weight:800;color:' + color + ';">' + count + '</div><div style="font-size:11px;color:#888;font-weight:600;">' + label + '</div></div></div>';

  html += stat(unchanged.length, 'No change', '#94a3b8', '✅');
  html += stat(toAdd.length, 'New students', '#22c55e', '➕');
  html += stat(toReactivate.length, 'Reactivated', '#3b82f6', '🔄');
  html += stat(toDeactivate.length, 'Mark inactive', '#f59e0b', '⏸');
  html += '</div>';

  if (toDeactivate.length) {
    html += '<div style="margin-top:10px;padding:8px 10px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;">';
    html += '<strong>Will be marked inactive:</strong> ' + toDeactivate.map(s => s.name).join(', ');
    html += '</div>';
  }

  html += '</div>';
  previewEl.innerHTML = html;
  confirmBtn.disabled = false;
  confirmBtn.style.opacity = '1';
}

function feedbackSyncConfirm() {
  const raw = document.getElementById('fbSyncText').value;
  const loc = document.getElementById('fbSyncLoc').value;
  const names = raw.split('\n').map(l => l.trim()).filter(looksLikeName);
  if (!names.length) return;

  const normalizedNew = new Set(names.map(n => n.toLowerCase()));
  const existing = Object.entries(state.feedback.roster)
    .filter(([, v]) => v.location === loc)
    .map(([k, v]) => ({ key: k, ...v }));

  const existingActive   = existing.filter(s => s.active !== false);
  const existingInactive = existing.filter(s => s.active === false);
  const allExistingNames = new Set(existing.map(s => s.name.toLowerCase()));

  const updates = {};
  const mk = getCurrentMonthKey();

  // Mark missing active students as inactive
  existingActive.forEach(s => {
    if (!normalizedNew.has(s.name.toLowerCase())) {
      updates['feedbackRoster/' + s.key + '/active'] = false;
      updates['feedbackRoster/' + s.key + '/inactiveSince'] = mk;
    }
  });

  // Reactivate students returning from inactive
  existingInactive.forEach(s => {
    if (normalizedNew.has(s.name.toLowerCase())) {
      updates['feedbackRoster/' + s.key + '/active'] = true;
      updates['feedbackRoster/' + s.key + '/inactiveSince'] = null;
    }
  });

  // Add brand-new students
  names.forEach(name => {
    if (!allExistingNames.has(name.toLowerCase())) {
      const key = 'student_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      updates['feedbackRoster/' + key] = { name, location: loc, active: true, addedDate: mk };
    }
  });

  // Record sync timestamp for this location
  updates['feedbackRosterMeta/' + loc + '/lastSyncedMonth'] = mk;
  updates['feedbackRosterMeta/' + loc + '/lastSyncedAt'] = Date.now();

  db.ref().update(updates, err => {
    if (!err) {
      document.getElementById('fbSyncModal').remove();
    } else {
      alert('Error syncing: ' + err.message);
    }
  });
}

const CORR_TYPES = {

function loadStudentLog(studentKey) {
  if (state.feedback.logs[studentKey] !== undefined) return;
  state.feedback.logs[studentKey] = null; // loading sentinel
  db.ref('feedbackCorrespondenceLog/' + studentKey).once('value', snap => {
    state.feedback.logs[studentKey] = snap.val() || {};

}

function feedbackLogCorrespondence(studentKey) {
  const form = state.feedback.logForm;
  if (!form || !form.type) return;
  const ts = form.date ? new Date(form.date + 'T12:00:00').getTime() : Date.now();
  const entry = { type: form.type, ts };
  if (form.note && form.note.trim()) entry.note = form.note.trim();
  const newRef = db.ref('feedbackCorrespondenceLog/' + studentKey).push(entry);
  // Auto-tick the tracking checkbox for this type
  const t = state.feedback.tracking[studentKey] || {};
  if (!t[form.type]) db.ref('feedbackTracking/all/' + studentKey + '/' + form.type).set(true);
  // Update local log cache optimistically
  if (!state.feedback.logs[studentKey]) state.feedback.logs[studentKey] = {};
  state.feedback.logs[studentKey][newRef.key] = entry;
  state.feedback.logForm = null;
  render();
}

function renderStudentLogRow(s, locationFilter, isInactive) {
  if (!state.feedback.expandedStudents.has(s.key)) return '';
  const logs = state.feedback.logs[s.key];
  const form = state.feedback.logForm;
  const showForm = form && form.studentKey === s.key;
  const today = Date.now();

  let content = '';

  if (logs === null) {
    content = '<div style="color:#aaa;font-size:12px;padding:4px 0;">Loading…</div>';
  } else {
    const entries = Object.entries(logs)
      .filter(([, v]) => v && v.type)
      .sort((a, b) => b[1].ts - a[1].ts);

    if (entries.length === 0) {
      content += '<div style="color:#bbb;font-size:12px;font-style:italic;margin-bottom:10px;">No correspondence logged yet.</div>';
    } else {
      // Warn if last contact was more than 30 days ago
      const lastTs = entries[0][1].ts;
      const daysSince = Math.floor((today - lastTs) / 86400000);
      if (daysSince > 30) {
        content += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:7px 12px;font-size:12px;color:#92400e;font-weight:600;margin-bottom:10px;">⚠️ Last contact was ' + daysSince + ' days ago</div>';
      }

      content += '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">';
      entries.forEach(([key, e]) => {
        const li = CORR_TYPES[e.type] || { icon: '📋', label: e.type };
        const dateStr = new Date(e.ts).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        const daysAgo = Math.floor((today - e.ts) / 86400000);
        const daysLabel = daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : daysAgo + ' days ago';
        const isRecent = daysAgo <= 7;
        content +=
          '<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:' + (isRecent ? '#f0fdf4' : '#f8f9fc') + ';border-radius:7px;border-left:3px solid ' + (isRecent ? '#4ade80' : '#e2e8f0') + ';">' +
          '<span style="font-size:15px;flex-shrink:0;">' + li.icon + '</span>' +
          '<div style="flex:1;min-width:0;">' +
            '<span style="font-size:12px;font-weight:700;color:#333;">' + li.label + '</span>' +
            (e.note ? '<span style="font-size:11px;color:#666;margin-left:8px;">' + esc(e.note) + '</span>' : '') +
          '</div>' +
          '<div style="text-align:right;flex-shrink:0;">' +
            '<div style="font-size:11px;font-weight:600;color:#555;">' + dateStr + '</div>' +
            '<div style="font-size:10px;color:' + (daysAgo > 30 ? '#ef4444' : '#aaa') + ';">' + daysLabel + '</div>' +
          '</div>' +
          (!isInactive ? '<button onclick="feedbackDeleteLogEntry(\'' + s.key + '\',\'' + key + '\')" title="Remove" style="background:none;border:none;cursor:pointer;color:#e2e8f0;font-size:11px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#e2e8f0\'">✕</button>' : '') +
          '</div>';
      });
      content += '</div>';
    }

    if (!isInactive) {
      if (!showForm) {
        content += '<button onclick="feedbackStartLogForm(\'' + s.key + '\')" style="padding:5px 12px;background:#f1f3f9;border:1px solid #ddd;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:#4169E1;">+ Log Correspondence</button>';
      } else {
        content +=
          '<div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:10px 12px;background:#f0f4ff;border-radius:8px;border:1px solid #dbeafe;">' +
          '<select onchange="state.feedback.logForm.type=this.value" style="padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;">' +
          Object.entries(CORR_TYPES).map(([val, { icon, label }]) =>
            '<option value="' + val + '"' + (form.type === val ? ' selected' : '') + '>' + icon + ' ' + label + '</option>'
          ).join('') +
          '</select>' +
          '<input type="date" value="' + (form.date || new Date().toISOString().split('T')[0]) + '" onchange="state.feedback.logForm.date=this.value" style="padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;">' +
          '<input type="text" placeholder="Note (optional)" oninput="state.feedback.logForm.note=this.value" style="flex:1;min-width:120px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;">' +
          '<button onclick="feedbackLogCorrespondence(\'' + s.key + '\')" style="padding:5px 12px;background:#4169E1;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">Save</button>' +
          '<button onclick="state.feedback.logForm=null;render()" style="padding:5px 10px;background:#f1f3f9;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer;color:#888;">Cancel</button>' +
          '</div>';
      }
    }
  }

  return '<tr style="background:#f8f9ff;">' +
    '<td colspan="20" style="padding:6px 20px 14px 44px;border-bottom:2px solid #e8eaf0;">' +
    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#4169E1;margin-bottom:8px;">📋 Correspondence History — ' + esc(s.name) + '</div>' +
    content +
    '</td></tr>';
}

function renderFeedbackPage() {
  const { roster, tracking, rosterMeta, locationFilter, showInactive } = state.feedback;
  const monthLabel   = getFeedbackMonthLabel();
  const currentMonth = getCurrentMonthKey();
  const isCurrentMonth = getFeedbackMonthKey() === currentMonth;

  const LOC_LABELS = { waunakee: 'Waunakee', eastmad: 'East Madison', verona: 'Verona' };
  const INTERACTIONS = [
    { field: 'postcard',   icon: '📬', label: 'Postcard' },
    { field: 'video',      icon: '🎥', label: 'Video' },
    { field: 'phoneCall',  icon: '📞', label: 'Call' },
    { field: 'conference', icon: '🤝', label: 'Conf.' },
  ];

  // ── Staleness banners (only for current month view) ──
  let stalenessHTML = '';
  if (isCurrentMonth) {
    ['waunakee', 'eastmad', 'verona'].forEach(loc => {
      const meta = rosterMeta[loc] || {};
      const synced = meta.lastSyncedMonth === currentMonth;
      if (!synced) {
        stalenessHTML +=
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:10px;">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
          '<span style="font-size:18px;">📋</span>' +
          '<div><div style="font-size:13px;font-weight:700;color:#92400e;">' + LOC_LABELS[loc] + ' roster not synced for ' + monthLabel + '</div>' +
          '<div style="font-size:12px;color:#b45309;">' + (meta.lastSyncedMonth ? 'Last synced: ' + meta.lastSyncedMonth : 'Never synced') + '</div></div>' +
          '</div>' +
          '<button onclick="feedbackOpenSync(\'' + loc + '\')" style="white-space:nowrap;padding:7px 14px;background:#f59e0b;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">Sync Now →</button>' +
          '</div>';
      }
    });
  }

  // ── Build student list ──
  const allStudents = Object.entries(roster).map(([k, v]) => ({ key: k, ...v }))
    .sort((a, b) => a.name.localeCompare(b.name));
  const byFilter = locationFilter === 'all' ? allStudents : allStudents.filter(s => s.location === locationFilter);
  const activeStudents   = byFilter.filter(s => s.active !== false);
  const inactiveStudents = byFilter.filter(s => s.active === false);
  const displayed = showInactive ? byFilter : activeStudents;

  // ── Stats (active only) ──
  const total = activeStudents.length;
  const counts = {};
  INTERACTIONS.forEach(i => { counts[i.field] = activeStudents.filter(s => (tracking[s.key] || {})[i.field]).length; });
  const contacted = activeStudents.filter(s => { const t = tracking[s.key] || {}; return INTERACTIONS.some(i => t[i.field]); }).length;
  const statusCounts = {
    red:    activeStudents.filter(s => s.status === 'red').length,
    yellow: activeStudents.filter(s => s.status === 'yellow').length,
    green:  activeStudents.filter(s => s.status === 'green').length,
  };
  const feedbackCount = activeStudents.filter(s => !!(((tracking[s.key] || {}).instructorFeedback || '').trim())).length;

  // ── Selection state ──
  const sel = state.feedback.selectedStudents || (state.feedback.selectedStudents = new Set());
  const visibleActiveKeys = displayed.filter(s => s.active !== false).map(s => s.key);
  const allSelected = visibleActiveKeys.length > 0 && visibleActiveKeys.every(k => sel.has(k));
  const selectedCount = visibleActiveKeys.filter(k => sel.has(k)).length;

  // ── Helpers ──
  const pill = (id, label) => {
    const active = locationFilter === id;
    return '<button onclick="feedbackSetLocationFilter(\'' + id + '\')" style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:' + (active ? '#4169E1' : '#f1f3f9') + ';color:' + (active ? '#fff' : '#555') + ';">' + label + '</button>';
  };

  const chk = (studentKey, field, checked, disabled) =>
    '<td style="text-align:center;padding:10px 4px;">' +
    '<input type="checkbox" ' + (checked ? 'checked' : '') + (disabled ? ' disabled' : '') + ' onchange="feedbackToggle(\'' + studentKey + '\',\'' + field + '\')" style="width:17px;height:17px;cursor:' + (disabled ? 'default' : 'pointer') + ';accent-color:#4169E1;opacity:' + (disabled ? '0.3' : '1') + ';">' +
    '</td>';

  const STATUS_ORDER = { red: 0, yellow: 1, '': 2, null: 2, undefined: 2, green: 3 };
  const statusDot = (studentKey, currentStatus, disabled) => {
    const dots = [
      { val: 'red',    color: '#ef4444', label: 'At risk / quitting' },
      { val: 'yellow', color: '#f59e0b', label: 'Unsure / watch' },
      { val: 'green',  color: '#22c55e', label: 'Highly engaged' },
    ];
    return '<td style="text-align:center;padding:8px 6px;white-space:nowrap;">' +
      dots.map(d => {
        const active = currentStatus === d.val;
        return '<button onclick="' + (disabled ? '' : 'feedbackSetStatus(\'' + studentKey + '\',\'' + d.val + '\')') + '" title="' + d.label + '" style="width:14px;height:14px;border-radius:50%;border:2px solid ' + d.color + ';background:' + (active ? d.color : 'transparent') + ';cursor:' + (disabled ? 'default' : 'pointer') + ';margin:0 2px;padding:0;display:inline-block;vertical-align:middle;opacity:' + (disabled ? '0.25' : '1') + ';transition:background 0.15s;"></button>';
      }).join('') +
    '</td>';
  };

  // ── Rows ──
  let rows = '';
  if (!displayed.length) {
    rows = '<tr><td colspan="11" style="text-align:center;padding:36px;color:#999;font-size:13px;">' +
      (Object.keys(roster).length === 0 ? 'No students yet — sync a roster to get started.' : 'No students to display.') +
      '</td></tr>';
  } else {
    const byLoc = { waunakee: [], eastmad: [], verona: [], '': [] };
    displayed.forEach(s => (byLoc[s.location] || byLoc['']).push(s));

    const sortByStatus = (a, b) => {
      const ao = STATUS_ORDER[a.status] !== undefined ? STATUS_ORDER[a.status] : 2;
      const bo = STATUS_ORDER[b.status] !== undefined ? STATUS_ORDER[b.status] : 2;
      return ao !== bo ? ao - bo : a.name.localeCompare(b.name);
    };

    ['waunakee', 'eastmad', 'verona', ''].forEach(loc => {
      const group = byLoc[loc];
      if (!group || !group.length) return;
      group.sort(sortByStatus);
      if (locationFilter === 'all') {
        const activeCount = group.filter(s => s.active !== false).length;
        const redCount    = group.filter(s => s.active !== false && s.status === 'red').length;
        rows += '<tr><td colspan="11" style="padding:8px 12px;background:#f5f7ff;font-size:11px;font-weight:700;color:#4169E1;text-transform:uppercase;letter-spacing:0.5px;">' +
          (LOC_LABELS[loc] || 'Unknown') + ' — ' + activeCount + ' active' +
          (redCount ? ' · <span style="color:#ef4444;">⚠ ' + redCount + ' at risk</span>' : '') +
          (showInactive && group.length > activeCount ? ' · ' + (group.length - activeCount) + ' inactive' : '') +
          '</td></tr>';
      }
      group.forEach(s => {
        const t = tracking[s.key] || {};
        const isInactive = s.active === false;
        const status = s.status || null;
        const rowBg = isInactive ? '#fafafa'
          : status === 'red'    ? '#fff5f5'
          : status === 'yellow' ? '#fffbeb'
          : status === 'green'  ? '#f0fdf4'
          : '#fff';
        const nameStyle = isInactive ? 'color:#bbb;text-decoration:line-through;' : 'color:#1a1a2e;font-weight:600;';
        const hasNotes = !!(s.notes && s.notes.trim());
        const isSelected = sel.has(s.key);
        const isExpanded = state.feedback.expandedStudents.has(s.key);
        rows += '<tr style="background:' + (isSelected && !isInactive ? 'rgba(124,58,237,0.06)' : rowBg) + ';outline:' + (isSelected && !isInactive ? '1px solid rgba(124,58,237,0.2)' : 'none') + ';">' +
          '<td style="text-align:center;padding:0 4px;width:28px;">' +
            '<button onclick="feedbackToggleExpand(\'' + s.key + '\')" title="Correspondence history" style="background:none;border:none;cursor:pointer;font-size:11px;color:#4169E1;padding:4px;border-radius:4px;line-height:1;opacity:' + (isInactive ? '0.3' : '0.7') + ';" onmouseover="this.style.opacity=\'1\'" onmouseout="this.style.opacity=\'' + (isInactive ? '0.3' : '0.7') + '\'">' + (isExpanded ? '▼' : '▶') + '</button>' +
          '</td>' +
          '<td style="text-align:center;padding:10px 4px;">' +
            '<input type="checkbox" ' + (isSelected ? 'checked' : '') + (isInactive ? ' disabled' : '') + ' onchange="feedbackToggleSelect(\'' + s.key + '\')" style="width:15px;height:15px;accent-color:#7c3aed;cursor:' + (isInactive ? 'default' : 'pointer') + ';opacity:' + (isInactive ? '0.2' : '1') + ';">' +
          '</td>' +
          statusDot(s.key, status, isInactive) +
          '<td style="padding:10px 10px;font-size:13px;cursor:pointer;" onclick="feedbackOpenNoteModal(\'' + s.key + '\')" title="' + (hasNotes ? 'View/edit notes' : 'Add notes') + '">' +
            '<span style="' + nameStyle + '">' + s.name + '</span>' +
            (isInactive ? ' <span style="font-size:10px;color:#bbb;font-weight:400;">inactive</span>' : '') +
            (hasNotes ? ' <span title="Has notes" style="display:inline-block;width:7px;height:7px;background:#4169E1;border-radius:50%;margin-left:5px;vertical-align:middle;flex-shrink:0;"></span>' : '') +
          '</td>' +
          (locationFilter === 'all' ? '<td style="padding:10px 10px;font-size:12px;color:#aaa;">' + (LOC_LABELS[s.location] || '—') + '</td>' : '') +
          INTERACTIONS.map(i => chk(s.key, i.field, !!t[i.field], isInactive)).join('') +
          (function() {
            const hasFeedback = !!(t.instructorFeedback && t.instructorFeedback.trim());
            return '<td style="text-align:center;padding:10px 4px;white-space:nowrap;">' +
              '<button onclick="' + (isInactive ? '' : 'feedbackOpenCycleFeedbackModal(\'' + s.key + '\')') + '" ' +
              'title="' + (hasFeedback ? 'Edit cycle feedback' : 'Add cycle feedback') + '" ' +
              'style="background:none;border:none;cursor:' + (isInactive ? 'default' : 'pointer') + ';font-size:16px;opacity:' + (isInactive ? '0.2' : '1') + ';padding:2px 3px;">' +
              (hasFeedback ? '✅' : '✏️') +
              '</button>' +
              (hasFeedback && !isInactive
                ? '<button onclick="feedbackGenerateOneReport(\'' + s.key + '\')" title="Generate progress report for ' + s.name + '" style="background:none;border:none;cursor:pointer;font-size:13px;padding:2px 3px;opacity:0.6;" onmouseover="this.style.opacity=\'1\'" onmouseout="this.style.opacity=\'0.6\'">⚡</button>'
                : '') +
              '</td>';
          })() +
          '<td style="padding:10px 6px;text-align:center;white-space:nowrap;">' +
            '<button onclick="feedbackOpenSendModal(\'' + s.key + '\')" title="Send monthly feedback to member portal" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.opacity=\'0.7\'" onmouseout="this.style.opacity=\'1\'">📨</button>' +
            (isInactive
              ? '<button onclick="feedbackMarkActive(\'' + s.key + '\')" title="Reactivate" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 5px;border-radius:4px;font-weight:700;" onmouseover="this.style.color=\'#22c55e\'" onmouseout="this.style.color=\'#ccc\'">↩</button>'
              : '<button onclick="feedbackMarkInactive(\'' + s.key + '\')" title="Mark inactive" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.color=\'#f59e0b\'" onmouseout="this.style.color=\'#ccc\'">⏸</button>') +
            '<button onclick="feedbackDeleteStudent(\'' + s.key + '\')" title="Delete student" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 5px;border-radius:4px;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#ccc\'">🗑</button>' +
          '</td>' +
          '</tr>' +
          renderStudentLogRow(s, locationFilter, isInactive);
      });
    });
  }

  return '<div class="page" style="max-width:920px;">' +

    // ── Header ──
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">' +
      '<div>' +
        '<h2 style="margin:0 0 2px;font-size:18px;font-weight:800;color:#1a1a2e;">Students</h2>' +
        '<p style="margin:0;font-size:13px;color:#888;">Roster, engagement status, monthly outreach tracking, and notes.</p>' +
      '</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<button onclick="feedbackOpenSync()" style="padding:9px 18px;background:#4169E1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">🔄 Sync Roster</button>' +
        '<button onclick="feedbackGenerateReports()" style="padding:9px 18px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">⚡ ' + (selectedCount > 0 ? 'Generate (' + selectedCount + ')' : 'Generate Reports') + '</button>' +
      '</div>' +
    '</div>' +

    // ── Staleness banners ──
    stalenessHTML +

    // ── Month navigator + location filters ──
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">' +
      '<div style="display:flex;align-items:center;gap:6px;background:#f1f3f9;border-radius:10px;padding:3px;">' +
        '<button onclick="feedbackChangeMonth(-1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 10px;border-radius:7px;color:#4169E1;font-weight:700;">‹</button>' +
        '<span style="font-size:14px;font-weight:700;color:#1a1a2e;min-width:140px;text-align:center;">' + monthLabel + '</span>' +
        '<button onclick="feedbackChangeMonth(1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 10px;border-radius:7px;color:#4169E1;font-weight:700;">›</button>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
        pill('all','All') + pill('waunakee','Waunakee') + pill('eastmad','East Madison') + pill('verona','Verona') +
      '</div>' +
    '</div>' +

    // ── Stats ──
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px;">' +
      '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:#1a1a2e;">' + total + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">Active</div>' +
      '</div>' +
      '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (contacted > 0 ? '#22c55e' : '#ccc') + ';">' + contacted + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">Contacted</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.red > 0 ? '#fff5f5' : '#fff') + ';border:1px solid ' + (statusCounts.red > 0 ? '#fecaca' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.red > 0 ? '#ef4444' : '#ccc') + ';">' + statusCounts.red + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🔴 At Risk</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.yellow > 0 ? '#fffbeb' : '#fff') + ';border:1px solid ' + (statusCounts.yellow > 0 ? '#fde68a' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.yellow > 0 ? '#f59e0b' : '#ccc') + ';">' + statusCounts.yellow + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🟡 Watch</div>' +
      '</div>' +
      '<div style="background:' + (statusCounts.green > 0 ? '#f0fdf4' : '#fff') + ';border:1px solid ' + (statusCounts.green > 0 ? '#bbf7d0' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (statusCounts.green > 0 ? '#22c55e' : '#ccc') + ';">' + statusCounts.green + '</div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">🟢 Engaged</div>' +
      '</div>' +
      INTERACTIONS.map(i =>
        '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:12px 14px;text-align:center;">' +
          '<div style="font-size:15px;margin-bottom:2px;">' + i.icon + '</div>' +
          '<div style="font-size:18px;font-weight:800;color:' + (counts[i.field] > 0 ? '#4169E1' : '#ccc') + ';">' + counts[i.field] + '</div>' +
          '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">' + i.label + '</div>' +
        '</div>'
      ).join('') +
      '<div style="background:' + (feedbackCount === total && total > 0 ? '#f0fdf4' : '#fff') + ';border:1px solid ' + (feedbackCount === total && total > 0 ? '#bbf7d0' : '#e8eaf0') + ';border-radius:10px;padding:12px 14px;text-align:center;">' +
        '<div style="font-size:20px;font-weight:800;color:' + (feedbackCount > 0 ? '#4169E1' : '#ccc') + ';">' + feedbackCount + '<span style="font-size:13px;color:#aaa;font-weight:400;">/' + total + '</span></div>' +
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">💬 Feedback</div>' +
      '</div>' +
    '</div>' +

    // ── Quick-add + inactive toggle ──
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
      '<input id="fbNewName" placeholder="Add student manually…" style="flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;" onkeydown="if(event.key===\'Enter\')feedbackAddStudent()">' +
      '<select id="fbNewLoc" style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;">' +
        '<option value="waunakee">Waunakee</option><option value="eastmad">East Madison</option><option value="verona">Verona</option>' +
      '</select>' +
      '<button onclick="feedbackAddStudent()" style="padding:8px 14px;background:#f1f3f9;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#4169E1;">+ Add</button>' +
      (inactiveStudents.length > 0 ?
        '<button onclick="feedbackToggleInactive()" style="padding:8px 14px;background:' + (showInactive ? '#fde68a' : '#f1f3f9') + ';border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#555;margin-left:auto;">' +
        (showInactive ? '👁 Hide inactive' : '👁 Show ' + inactiveStudents.length + ' inactive') + '</button>'
      : '') +
    '</div>' +

    // ── Table ──
    '<div style="background:#fff;border:1px solid #e8eaf0;border-radius:12px;">' +
      '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +

          INTERACTIONS.map(i => '<th style="padding:10px 6px;text-align:center;font-size:17px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;" title="' + i.label + '">' + i.icon + '</th>').join('') +
          '<th style="padding:10px 6px;text-align:center;font-size:17px;position:sticky;top:0;z-index:5;background:#f5f7ff;border-bottom:1px solid #e8eaf0;" title="Instructor Feedback">💬</th>' +

        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +

    '<p style="font-size:12px;color:#aaa;margin-top:12px;text-align:center;">Interactions save automatically · Roster persists across months · Historical data is never deleted on sync</p>' +

  '</div>';
}

const ACQ_SOURCES = [
  { key: 'paid',     label: 'Paid',     icon: '💰', hasSpend: true  },
  { key: 'organic',  label: 'Organic',  icon: '🌱', hasSpend: false },
  { key: 'referral', label: 'Referral', icon: '🤝', hasSpend: false },

];

function getAcqMonthKey() {
  const d = new Date();
  d.setMonth(d.getMonth() + state.acq.monthOffset);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function listenAcqPin() {
  db.ref('acq/pin').on('value', snap => {
    state.acq.pinLoaded = true;
    state.acq.pin = snap.val();
    render();
  });
}

function listenAcqData() {
  activeListeners = activeListeners.filter(l => {
    if (l._acqData) { l.ref.off(l.event); return false; }
    return true;
  });
  const mk = getAcqMonthKey();
  state.acq._listeningMk = mk;
  if (!state.acq.data[mk]) state.acq.data[mk] = {};
  const ref = db.ref('acq/data/' + mk);
  ref.on('value', snap => { state.acq.data[mk] = snap.val() || {}; render(); });
  activeListeners.push({ ref, event: 'value', _acqData: true });
  // Load prior month once (for MRR growth)
  const pd = new Date(); pd.setMonth(pd.getMonth() + state.acq.monthOffset - 1);
  const pmk = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');
  if (state.acq.data[pmk] === undefined) {
    state.acq.data[pmk] = {};
    db.ref('acq/data/' + pmk).once('value', snap => { state.acq.data[pmk] = snap.val() || {}; render(); });
  }
}

function acqChangeMonth(delta) { state.acq.monthOffset += delta; listenAcqData(); }

function acqSave(field, value) {
  const mk = getAcqMonthKey();
  clearTimeout(debounceTimers['acq_' + field]);
  debounceTimers['acq_' + field] = setTimeout(() => {
    const val = value === '' ? null : field === 'notes' ? value : (+value || null);
    db.ref('acq/data/' + mk + '/' + field).set(val);
    if (!state.acq.data[mk]) state.acq.data[mk] = {};
    state.acq.data[mk][field] = val;
  }, 600);
}

function acqTryUnlock() {
  const el = document.getElementById('acqPinInput');
  if (!el) return;
  if (el.value === state.acq.pin) {
    state.acq.unlocked = true; state.acq.pinError = false;
    sessionStorage.setItem('acqUnlocked', '1');
    listenAcqData(); render();
  } else { state.acq.pinError = true; render(); }
}

function acqLock() {
  state.acq.unlocked = false;
  sessionStorage.removeItem('acqUnlocked');
  render();
}

function acqConfirmSetPin() {
  const p1 = document.getElementById('acqNewPin1'), p2 = document.getElementById('acqNewPin2');
  if (!p1 || !p2) return;
  const pin = p1.value.trim();
  if (pin.length < 4) { p1.style.borderColor = '#ef4444'; return; }
  if (pin !== p2.value.trim()) { p2.style.borderColor = '#ef4444'; return; }
  db.ref('acq/pin').set(pin);
  state.acq.pin = pin; state.acq.pinLoaded = true;
  state.acq.unlocked = true;
  sessionStorage.setItem('acqUnlocked', '1');
  listenAcqData(); render();
}

function acqResetPin() {
  if (!confirm('Reset your Scale Dashboard PIN? You will need to create a new one.')) return;
  db.ref('acq/pin').set(null);
  state.acq.pin = null; state.acq.unlocked = false;
  sessionStorage.removeItem('acqUnlocked');
  render();
}

/* ── Render entry point ─────────────────────────────────── */
function renderAcqPage() {

    return '<div class="page" style="max-width:400px;margin:80px auto;text-align:center;color:#aaa;font-size:14px;">Loading…</div>';
  }
  if (!state.acq.pin) return renderAcqSetPin();
  if (!state.acq.unlocked) return renderAcqLockScreen();
  return renderAcqDashboard();
}

function renderAcqSetPin() {
  return '<div style="max-width:320px;margin:80px auto;text-align:center;padding:0 20px;">' +
    '<div style="font-size:52px;margin-bottom:16px;">🔐</div>' +
    '<h2 style="font-size:20px;font-weight:800;color:#1a1a2e;margin:0 0 6px;">Set Your PIN</h2>' +

/* ── Main dashboard ─────────────────────────────────────── */
function renderAcqDashboard() {
  const mk = getAcqMonthKey();
  if (state.acq._listeningMk !== mk) listenAcqData();
  const d = state.acq.data[mk] || {};
  const v = f => (d[f] !== undefined && d[f] !== null ? +d[f] : null);

  const viewDate = new Date(); viewDate.setMonth(viewDate.getMonth() + state.acq.monthOffset);
  const monthLabel = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const isCurrent = state.acq.monthOffset === 0;

  /* ── Computed: Financials ── */
  const mrr = v('mrr'), grossRev = v('grossRevenue'), cogs = v('cogs'), opex = v('opex'), headcount = v('headcount');
  const arr        = mrr !== null ? mrr * 12 : null;
  const grossProfit = (grossRev !== null && cogs !== null) ? grossRev - cogs : null;
  const grossMargin = (grossProfit !== null && grossRev) ? grossProfit / grossRev * 100 : null;
  const netProfit   = (grossProfit !== null && opex !== null) ? grossProfit - opex : null;
  const netMargin   = (netProfit !== null && grossRev) ? netProfit / grossRev * 100 : null;
  const revPerEmp   = (grossRev !== null && headcount) ? grossRev / headcount : null;

  /* ── Computed: Funnel ── */
  let tLeads = 0, tTrials = 0, tShows = 0, tCloses = 0, tSpend = 0;
  ACQ_SOURCES.forEach(s => {
    tLeads  += v('f_' + s.key + '_leads')  || 0;
    tTrials += v('f_' + s.key + '_trials') || 0;
    tShows  += v('f_' + s.key + '_shows')  || 0;
    tCloses += v('f_' + s.key + '_closes') || 0;
    if (s.hasSpend) tSpend += v('f_' + s.key + '_spend') || 0;
  });
  const totShowRate  = tTrials  ? tShows  / tTrials  * 100 : null;
  const totCloseRate = tShows   ? tCloses / tShows   * 100 : null;
  const totCAC       = tCloses  ? tSpend  / tCloses        : null;

  /* ── Computed: Retention ── */
  const actMem = v('activeMembers'), newMem = v('newMembers'), cancel = v('cancellations');
  const reactiv = v('reactivations'), avgTenure = v('avgTenure');
  const avgEFT     = (mrr && actMem) ? mrr / actMem : v('avgEFT');
  const churnRate  = (cancel !== null && actMem) ? cancel / actMem * 100 : null;
  const ltv        = (avgEFT !== null && avgTenure) ? avgEFT * avgTenure : null;
  const ltvCac     = (ltv && totCAC) ? ltv / totCAC : null;
  const nrr        = (actMem && cancel !== null) ? ((actMem - cancel + (reactiv || 0)) / actMem * 100) : null;

  /* ── MRR growth vs prior month ── */
  const pd = new Date(); pd.setMonth(pd.getMonth() + state.acq.monthOffset - 1);
  const pmk = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');
  const prevMrr = (state.acq.data[pmk] || {}).mrr !== undefined ? +(state.acq.data[pmk].mrr) : null;
  const mrrGrowth = (mrr !== null && prevMrr) ? (mrr - prevMrr) / prevMrr * 100 : null;

  /* ── Helpers ── */
  const fmt = (n, t) => {
    if (n === null || n === undefined || isNaN(n) || !isFinite(n)) return '—';
    if (t === '$')  return '$' + Math.round(n).toLocaleString();
    if (t === '%')  return (n >= 0 ? '' : '') + n.toFixed(1) + '%';
    if (t === 'x')  return n.toFixed(1) + '×';
    if (t === 'g')  return n >= 0 ? '+' + n.toFixed(1) + '%' : n.toFixed(1) + '%';
    return Math.round(n).toLocaleString();
  };
  const dot = (n, g, y, hi = true) => {
    if (n === null || isNaN(n) || !isFinite(n)) return { d: '⚪', c: '#94a3b8' };
    const good = hi ? n >= g : n <= g;
    const ok   = hi ? n >= y : n <= y;
    return good ? { d: '🟢', c: '#16a34a' } : ok ? { d: '🟡', c: '#ca8a04' } : { d: '🔴', c: '#dc2626' };
  };
  const inp = (f, val, w) =>
    '<input type="number" value="' + (val !== null && val !== undefined ? val : '') + '" ' +
    'oninput="acqSave(\'' + f + '\',this.value)" ' +
    'style="width:' + (w || 90) + 'px;border:1px solid #dde1f0;border-radius:7px;padding:5px 7px;font-size:13px;' +
    'font-weight:500;font-family:inherit;text-align:right;background:#fcfcff;color:#1a1a2e;">';
  const T = k => ACQ_TIPS[k] ? '<span class="acq-tip" data-tip="' + esc(ACQ_TIPS[k]) + '">?</span>' : '';
  const kpi = (label, val, t, benchFn, note, tipKey) => {
    const b = benchFn ? benchFn() : null;
    return '<div style="flex:1;min-width:120px;background:#fff;border:1px solid #dde1f0;border-radius:10px;padding:12px 14px;text-align:center;">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:2px;">' + label + (tipKey ? T(tipKey) : '') + '</div>' +
      '<div style="font-size:20px;font-weight:800;color:' + (b ? b.c : '#1a1a2e') + ';">' + fmt(val, t) + (b ? ' <span style="font-size:13px;">' + b.d + '</span>' : '') + '</div>' +
      (note ? '<div style="font-size:10px;color:#aaa;margin-top:2px;">' + note + '</div>' : '') +
      '</div>';
  };

  let html = '<div class="page" style="max-width:920px;">';

  /* ── Header ── */
  html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">' +
    '<div>' +
      '<h2 style="margin:0 0 2px;font-size:18px;font-weight:800;color:#1a1a2e;">📈 Scale Dashboard</h2>' +
      '<p style="margin:0;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;">ACQ.com Framework · Private</p>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
      '<div style="display:flex;align-items:center;gap:2px;background:#f1f3f9;border-radius:10px;padding:3px;">' +
        '<button onclick="acqChangeMonth(-1)" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px 10px;color:#4169E1;font-weight:700;border-radius:7px;">‹</button>' +
        '<span style="font-size:13px;font-weight:700;color:#1a1a2e;min-width:120px;text-align:center;">' + monthLabel + '</span>' +
        '<button onclick="if(!(' + isCurrent + '))acqChangeMonth(1)" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px 10px;color:' + (isCurrent ? '#ddd' : '#4169E1') + ';font-weight:700;border-radius:7px;">›</button>' +
      '</div>' +
      '<button onclick="acqLock()" style="padding:7px 12px;background:#f8f9fc;border:1px solid #dde1f0;border-radius:8px;font-size:12px;cursor:pointer;color:#888;">🔒 Lock</button>' +
    '</div></div>';

  /* ── Health Score panel ── */
  const bLtvCac  = dot(ltvCac,   3, 2);
  const bChurn   = dot(churnRate, 3, 5, false);
  const bGrossM  = dot(grossMargin, 40, 25);
  const bGrowth  = dot(mrrGrowth, 10, 5);
  html += '<div style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:14px;padding:18px 20px;margin-bottom:18px;">';
  html += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#475569;margin-bottom:12px;">ACQ Health Indicators</div>';
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  [
    { l: 'LTV : CAC',      v: ltvCac,     t: 'x', b: bLtvCac, note: 'Target ≥ 3×',   tip: 'ltvCac'      },
    { l: 'Monthly Churn',  v: churnRate,  t: '%', b: bChurn,  note: 'Target < 3%',   tip: 'churnRate'   },
    { l: 'Gross Margin',   v: grossMargin,t: '%', b: bGrossM, note: 'Target ≥ 40%',  tip: 'grossMargin' },
    { l: 'MRR Growth',     v: mrrGrowth,  t: 'g', b: bGrowth, note: 'vs prior month', tip: 'mrr'        },
  ].forEach(x => {
    html += '<div style="flex:1;min-width:130px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 14px;">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:4px;display:flex;align-items:center;gap:3px;">' + x.l + T(x.tip) + '</div>' +
      '<div style="font-size:22px;font-weight:800;color:' + x.b.c + ';">' + fmt(x.v, x.t) + ' ' + x.b.d + '</div>' +
      '<div style="font-size:10px;color:#475569;margin-top:3px;">' + x.note + '</div>' +
      '</div>';
  });
  html += '</div></div>';

  /* ── Core Financials ── */
  html += '<div style="background:#fff;border:1px solid #dde1f0;border-radius:12px;margin-bottom:14px;overflow:hidden;">';
  html += '<div style="padding:11px 18px;background:#f8f9ff;border-bottom:1px solid #dde1f0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1a1a2e;">💰 Core Financials</div>';
  html += '<div style="padding:16px 18px;">';
  html += '<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;align-items:flex-end;">';
  [
    { f: 'mrr',          l: 'MRR ($)',          tip: 'mrr'          },
    { f: 'grossRevenue', l: 'Gross Revenue ($)', tip: 'grossRevenue' },
    { f: 'cogs',         l: 'COGS ($)',          tip: 'cogs'         },
    { f: 'opex',         l: 'OpEx ($)',          tip: 'opex'         },
    { f: 'headcount',    l: 'Headcount',         tip: 'headcount'    },
  ].forEach(x => {
    html += '<div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:flex;align-items:center;gap:2px;">' + x.l + T(x.tip) + '</div>' + inp(x.f, v(x.f), 110) + '</div>';
  });
  html += '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
  html += kpi('ARR',           arr,        '$', null,                          'MRR × 12',    'arr');
  html += kpi('Gross Profit',  grossProfit,'$', null,                          null,          'grossProfit');
  html += kpi('Gross Margin',  grossMargin,'%', () => dot(grossMargin, 40, 25), null,         'grossMargin');
  html += kpi('Net Profit',    netProfit,  '$', null,                          null,          'netProfit');
  html += kpi('Net Margin',    netMargin,  '%', () => dot(netMargin, 20, 10),  null,          'netMargin');
  html += kpi('Rev / Employee',revPerEmp,  '$', null,                          null,          'revPerEmp');
  html += '</div></div></div>';

  /* ── Acquisition Funnel ── */
  html += '<div style="background:#fff;border:1px solid #dde1f0;border-radius:12px;margin-bottom:14px;overflow:hidden;">';
  html += '<div style="padding:11px 18px;background:#f8f9ff;border-bottom:1px solid #dde1f0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1a1a2e;">🎯 Acquisition Funnel</div>';
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">';
  html += '<table style="width:100%;border-collapse:collapse;font-size:12px;min-width:620px;">';
  html += '<thead><tr style="background:#f5f7ff;">';
  [
    { h: 'Source',   tip: null },
    { h: 'Leads',    tip: 'leads'    },
    { h: 'Trials',   tip: 'trials'   },
    { h: 'Show %',   tip: 'showRate' },
    { h: 'Closes',   tip: 'closes'   },
    { h: 'Close %',  tip: 'closeRate'},
    { h: 'Ad Spend', tip: 'adSpend'  },
    { h: 'CAC',      tip: 'cac'      },
    { h: 'ATV ($)',  tip: 'atv'      },
  ].forEach((col, i) =>
    html += '<th style="padding:9px ' + (i===0?'14':'8') + 'px;text-align:' + (i===0?'left':'center') + ';font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#4169E1;border-bottom:2px solid #dde1f0;">' + col.h + (col.tip ? T(col.tip) : '') + '</th>');
  html += '</tr></thead><tbody>';

  ACQ_SOURCES.forEach((src, idx) => {
    const fk = 'f_' + src.key;
    const leads = v(fk+'_leads'), trials = v(fk+'_trials'), shows = v(fk+'_shows'), closes = v(fk+'_closes');
    const spend = v(fk+'_spend'), atv = v(fk+'_atv');
    const showRate  = (trials && shows !== null) ? shows  / trials * 100 : null;
    const closeRate = (shows  && closes !== null) ? closes / shows  * 100 : null;
    const cac       = (src.hasSpend && spend && closes) ? spend / closes : null;
    const rBg = idx % 2 === 0 ? '#fff' : '#fafbff';
    const pctColor = p => p === null ? '#aaa' : p >= 70 ? '#16a34a' : p >= 45 ? '#ca8a04' : '#dc2626';
    html += '<tr style="background:' + rBg + ';border-bottom:1px solid #f0f2fb;">' +
      '<td style="padding:8px 14px;font-weight:700;color:#1a1a2e;">' + src.icon + ' ' + src.label + '</td>' +
      '<td style="padding:6px 8px;text-align:center;">' + inp(fk+'_leads',  leads,  68) + '</td>' +
      '<td style="padding:6px 8px;text-align:center;">' + inp(fk+'_trials', trials, 68) + '</td>' +
      '<td style="padding:6px 8px;text-align:center;font-weight:700;color:' + pctColor(showRate)  + ';">' + fmt(showRate,  '%') + '</td>' +
      '<td style="padding:6px 8px;text-align:center;">' + inp(fk+'_closes', closes, 68) + '</td>' +
      '<td style="padding:6px 8px;text-align:center;font-weight:700;color:' + pctColor(closeRate) + ';">' + fmt(closeRate, '%') + '</td>' +
      '<td style="padding:6px 8px;text-align:center;">' + (src.hasSpend ? inp(fk+'_spend', spend, 80) : '<span style="color:#ddd;">—</span>') + '</td>' +
      '<td style="padding:6px 8px;text-align:center;font-weight:700;color:#1a1a2e;">' + fmt(cac, '$') + '</td>' +
      '<td style="padding:6px 8px;text-align:center;">' + inp(fk+'_atv', atv, 78) + '</td>' +
      '</tr>';
  });

  const pctColor = p => p === null ? '#94a3b8' : p >= 70 ? '#16a34a' : p >= 45 ? '#ca8a04' : '#dc2626';
  html += '<tr style="background:#f0f4ff;border-top:2px solid #4169E1;font-weight:800;">' +
    '<td style="padding:9px 14px;color:#4169E1;">TOTAL</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#1a1a2e;">' + fmt(tLeads  || null, '#') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#1a1a2e;">' + fmt(tTrials || null, '#') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:' + pctColor(totShowRate)  + ';">' + fmt(totShowRate,  '%') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#1a1a2e;">' + fmt(tCloses || null, '#') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:' + pctColor(totCloseRate) + ';">' + fmt(totCloseRate, '%') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#1a1a2e;">' + fmt(tSpend  || null, '$') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#4169E1;">' + fmt(totCAC, '$') + '</td>' +
    '<td style="padding:9px 8px;text-align:center;color:#94a3b8;">—</td>' +
    '</tr>';

  html += '</tbody></table></div></div>';

  /* ── Retention & LTV ── */
  html += '<div style="background:#fff;border:1px solid #dde1f0;border-radius:12px;margin-bottom:14px;overflow:hidden;">';
  html += '<div style="padding:11px 18px;background:#f8f9ff;border-bottom:1px solid #dde1f0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1a1a2e;">♻️ Retention &amp; LTV</div>';
  html += '<div style="padding:16px 18px;">';
  html += '<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;align-items:flex-end;">';
  [
    { f: 'activeMembers', l: 'Active Members', tip: 'activeMembers' },
    { f: 'newMembers',    l: 'New Members',    tip: 'newMembers'    },
    { f: 'cancellations', l: 'Cancellations',  tip: 'cancellations' },
    { f: 'reactivations', l: 'Reactivations',  tip: 'reactivations' },
    { f: 'avgTenure',     l: 'Avg Tenure (mo)', tip: 'avgTenure'   },
  ].forEach(x => {
    html += '<div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:flex;align-items:center;gap:2px;">' + x.l + T(x.tip) + '</div>' + inp(x.f, v(x.f), 100) + '</div>';
  });
  html += '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
  html += kpi('Monthly Churn',   churnRate, '%', () => dot(churnRate, 3, 5, false), null,          'churnRate');
  html += kpi('Avg EFT / Mo',    avgEFT,    '$', null,                              null,          'avgEFT');
  html += kpi('LTV',             ltv,       '$', null,                              null,          'ltv');
  html += kpi('Blended CAC',     totCAC,    '$', null,                              null,          'totalCAC');
  html += kpi('LTV : CAC',       ltvCac,    'x', () => dot(ltvCac, 3, 2),          'Target ≥ 3×', 'ltvCac');
  html += kpi('Net Revenue Ret', nrr,       '%', () => dot(nrr, 95, 90),           'Target ≥ 95%','nrr');
  html += '</div></div></div>';

  /* ── Month Notes ── */
  html += '<div style="background:#fff;border:1px solid #dde1f0;border-radius:12px;margin-bottom:14px;overflow:hidden;">';
  html += '<div style="padding:11px 18px;background:#f8f9ff;border-bottom:1px solid #dde1f0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1a1a2e;">📝 Month Notes</div>';
  html += '<div style="padding:14px 18px;"><textarea placeholder="Context, wins, bottlenecks, decisions for ' + monthLabel + '…" oninput="acqSave(\'notes\',this.value)" style="width:100%;min-height:80px;border:1px solid #dde1f0;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;color:#1a1a2e;">' + esc(d.notes || '') + '</textarea></div></div>';

  html += '</div>';
  return html;
}

init();
</script>
</body>
</html>
